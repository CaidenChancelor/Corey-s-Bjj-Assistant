  <script type="text/babel">
// Allergy tracker — symptom logs, training impact, and readable statistics.

const ALLERGY_SEVERITIES = [
  { id: "mild", label: "Mild", color: "var(--stripe-mint)" },
  { id: "moderate", label: "Moderate", color: "var(--stripe-cyan)" },
  { id: "severe", label: "Severe", color: "var(--stripe-pink)" },
  { id: "critical", label: "Critical", color: "var(--stripe-pink)" },
];
const ALLERGY_CATEGORIES = ["General", "Seasonal", "Environmental", "Food", "Medication"];
const ALLERGY_SYMPTOMS_LIST = ["Shortness of Breath", "Coughing", "Chest Tightness", "Lightheaded", "Wheezing", "Sneezing", "Hives", "Swelling"];
const ALLERGY_CAUSES = ["Food", "Pollen", "Dust", "Mold", "Pet Dander", "High Heart Rate", "Medication", "Other"];
const ALLERGY_MEDICATIONS = [
  "",
  "Albuterol Inhaler (Red Pumps)",
  "Albuterol Machine (Bubbles)",
  "Formoterol Inhaler (Blue Pumps)",
  "Prednisone",
  "Claritin",
  "Airborne",
];
const ALLERGY_IMPACTS = [
  { id: "none", label: "No impact" },
  { id: "modified", label: "Modified training" },
  { id: "skipped", label: "Skipped class" },
  { id: "left-early", label: "Left early" },
];

function allergyColor(severity) {
  const normalized = severity === "bad" ? "severe" : severity;
  return (ALLERGY_SEVERITIES.find((s) => s.id === normalized) || ALLERGY_SEVERITIES[0]).color;
}
function allergyIdFrom(log) {
  return log.id && String(log.id).startsWith("allergy-") ? log.id : `allergy-${log.id}`;
}
function allergyToday() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}
function allergyNowTime() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
}
function normalizeAllergy(log) {
  return {
    id: allergyIdFrom(log),
    date: log.date || allergyToday(),
    time: log.time || "",
    severity: log.severity === "bad" ? "severe" : (log.severity || "mild"),
    category: log.category || "general",
    trigger: log.trigger || "",
    symptoms: log.symptoms || "",
    medication: log.medication || "",
    training_impact: log.training_impact || "none",
    missed_training: !!log.missed_training,
    createdAt: log.created_at || log.createdAt || log.date || new Date().toISOString(),
  };
}
function allergyTimeBucket(timeText, createdAt) {
  const text = String(timeText || "").toLowerCase();
  if (/\b(night|late)\b/.test(text)) return "night";
  if (/\b(evening|class|training|rolls|open\s*mat)\b/.test(text)) return "evening";
  if (/\b([5-9])(?::[0-5]\d)?\s*pm\b/.test(text)) return "evening";
  if (/\b(10|11)(?::[0-5]\d)?\s*pm\b/.test(text)) return "night";
  if (/\b(afternoon|lunch|midday|noon)\b/.test(text)) return "afternoon";
  if (/\b(12|[1-4])(?::[0-5]\d)?\s*pm\b/.test(text)) return "afternoon";
  if (/\b(morning|wake|breakfast)\b/.test(text)) return "morning";
  if (/\b(1[0-1]|[1-9])(?::[0-5]\d)?\s*am\b/.test(text)) return "morning";
  if (/\b12(?::[0-5]\d)?\s*am\b/.test(text)) return "night";
  const twentyFour = text.match(/\b([01]?\d|2[0-3]):[0-5]\d\b/);
  if (twentyFour) {
    const hour = parseInt(twentyFour[1], 10);
    if (hour >= 5 && hour < 12) return "morning";
    if (hour >= 12 && hour < 17) return "afternoon";
    if (hour >= 17 && hour < 22) return "evening";
    return "night";
  }
  const parsed = Date.parse(createdAt || "");
  if (Number.isFinite(parsed)) {
    const hour = new Date(parsed).getHours();
    if (hour >= 5 && hour < 12) return "morning";
    if (hour >= 12 && hour < 17) return "afternoon";
    if (hour >= 17 && hour < 22) return "evening";
    return "night";
  }
  return null;
}
function allergyStatsFromLogs(logs) {
  const timeBuckets = { morning: 0, afternoon: 0, evening: 0, night: 0 };
  const triggerCounts = {};
  const categoryCounts = {};
  const severityCounts = {};
  logs.forEach((log) => {
    const bucket = allergyTimeBucket(log.time, log.createdAt);
    if (bucket) timeBuckets[bucket] += 1;
    if (log.trigger) triggerCounts[log.trigger.toLowerCase()] = (triggerCounts[log.trigger.toLowerCase()] || 0) + 1;
    categoryCounts[log.category || "general"] = (categoryCounts[log.category || "general"] || 0) + 1;
    severityCounts[log.severity || "mild"] = (severityCounts[log.severity || "mild"] || 0) + 1;
  });
  return {
    total: logs.length,
    last_7_days: logs.filter((l) => Date.parse(l.date) >= Date.now() - 7 * 86400000).length,
    missed_training: logs.filter((l) => l.missed_training || ["skipped", "left-early"].includes(String(l.training_impact || "").toLowerCase())).length,
    time_buckets: timeBuckets,
    top_triggers: Object.entries(triggerCounts).map(([name, count]) => ({ name, count })).sort((a, b) => b.count - a.count).slice(0, 5),
    categories: Object.entries(categoryCounts).map(([name, count]) => ({ name, count })),
    severity_counts: Object.entries(severityCounts).map(([name, count]) => ({ name, count })),
  };
}
function syncAllergyData(logs) {
  window.__bjjdata = window.__bjjdata || {};
  window.__bjjdata.allergies = logs.map((log) => ({
    id: String(log.id || "").startsWith("allergy-") ? String(log.id).replace("allergy-", "") : log.id,
    date: log.date,
    time: log.time,
    severity: log.severity,
    category: log.category,
    trigger: log.trigger,
    symptoms: log.symptoms,
    medication: log.medication,
    training_impact: log.training_impact,
    missed_training: log.missed_training,
    created_at: log.createdAt,
  }));
  window.__bjjdata.allergy_stats = allergyStatsFromLogs(logs);
}

function Allergies({ onBack }) {
  const initial = React.useMemo(() => {
    const live = window.__bjjdata && Array.isArray(window.__bjjdata.allergies) ? window.__bjjdata.allergies : [];
    return live.map(normalizeAllergy);
  }, []);
  const [logs, setLogs] = React.useState(initial);
  const [adding, setAdding] = React.useState(false);
  const [editing, setEditing] = React.useState(null);
  const [confirm, setConfirm] = React.useState(null);
  const stats = React.useMemo(() => allergyStatsFromLogs(logs), [logs]);
  const sorted = logs.slice().sort((a, b) => Date.parse(b.createdAt || b.date) - Date.parse(a.createdAt || a.date));
  const setSyncedLogs = (next) => {
    setLogs((prev) => {
      const value = typeof next === "function" ? next(prev) : next;
      syncAllergyData(value);
      return value;
    });
  };

  const saveLog = async (values, existingId) => {
    if (!values.trigger && !values.symptoms) return;
    if (existingId) {
      setSyncedLogs((prev) => prev.map((l) => l.id === existingId ? { ...l, ...values } : l));
      const serverId = existingId.startsWith("allergy-") ? parseInt(existingId.replace("allergy-", ""), 10) : NaN;
      if (!isNaN(serverId)) await apiCall("PATCH", `/api/allergies/${serverId}`, values);
      setEditing(null);
      return;
    }
    const localId = `allergy-local-${Date.now().toString(36)}`;
    const entry = normalizeAllergy({ ...values, id: localId, created_at: new Date().toISOString() });
    setSyncedLogs((prev) => [entry, ...prev]);
    setAdding(false);
    const response = await apiCall("POST", "/api/allergies", values);
    if (response && response.ok !== false && response.id) {
      setSyncedLogs((prev) => prev.map((l) => l.id === localId ? { ...l, id: `allergy-${response.id}`, createdAt: response.created_at || l.createdAt } : l));
    }
  };

  const deleteLog = async (id) => {
    setSyncedLogs((prev) => prev.filter((l) => l.id !== id));
    setConfirm(null);
    const serverId = id.startsWith("allergy-") ? parseInt(id.replace("allergy-", ""), 10) : NaN;
    if (!isNaN(serverId)) await apiCall("DELETE", `/api/allergies/${serverId}`);
  };

  return (
    <div style={{ minHeight: "100vh", paddingTop: 100, paddingBottom: 120, paddingLeft: "clamp(16px, 4vw, 24px)", paddingRight: "clamp(16px, 4vw, 24px)" }}>
      <div style={{ maxWidth: 860, margin: "0 auto" }}>
        <button onClick={onBack} className="stripe-cta secondary" style={{ marginBottom: 12 }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
        <div style={{ marginBottom: 24 }}>
          <div style={{
            fontFamily: "Inter, var(--font-display)", fontSize: 22, fontWeight: 900,
            letterSpacing: "-0.05em", color: "var(--stripe-ink)",
          }}>Allergies</div>
          <div style={{
            fontFamily: "Inter, var(--font-text)", fontSize: 14,
            color: "var(--stripe-faint)", marginTop: 4,
          }}>{logs.length} log{logs.length !== 1 ? "s" : ""} · {stats.missed_training || 0} missed training</div>
        </div>

        <AllergyStatsPanel stats={stats} />

        <div style={{ display: "flex", flexDirection: "column", gap: 12, marginTop: 22 }}>
          {sorted.map((log) => (
            <AllergyRow key={log.id} log={log} onEdit={() => setEditing(log)} onDelete={() => setConfirm(log)} />
          ))}
          {sorted.length === 0 && (
            <div style={{ textAlign: "center", padding: "48px 24px", fontSize: 15, color: "var(--stripe-faint)", background: "var(--stripe-card)", border: "1px solid var(--stripe-line)", borderRadius: 16 }}>
              No allergy logs yet. Tap + to add the first one.
            </div>
          )}
        </div>
      </div>

      <button onClick={() => setAdding(true)} aria-label="Add allergy log" style={{ position: "fixed", bottom: "calc(32px + env(safe-area-inset-bottom, 0px))", right: 32, zIndex: 50, width: 56, height: 56, borderRadius: "50%", background: "var(--stripe-card)", border: "1px solid var(--stripe-line)", boxShadow: "var(--shadow-pop)", cursor: "pointer", color: "var(--stripe-blue)", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>

      {adding && <AllergyFormModal onCancel={() => setAdding(false)} onSubmit={(values) => saveLog(values)} />}
      {editing && <AllergyFormModal initial={editing} onCancel={() => setEditing(null)} onSubmit={(values) => saveLog(values, editing.id)} />}
      {confirm && <AllergyDeleteConfirm log={confirm} onCancel={() => setConfirm(null)} onConfirm={() => deleteLog(confirm.id)} />}
    </div>
  );
}

function AllergyStatsPanel({ stats }) {
  const buckets = stats.time_buckets || {};
  const maxBucket = Math.max(1, ...Object.values(buckets));
  const bars = stats.top_triggers && stats.top_triggers.length ? stats.top_triggers : stats.categories || [];
  const maxBar = Math.max(1, ...bars.map((b) => b.count));
  return (
    <div style={{ background: "var(--stripe-card)", borderRadius: 16, border: "1px solid var(--stripe-line)", padding: 22, boxShadow: "var(--stripe-shadow)" }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, marginBottom: 22 }}>
        <MiniStat label="Total logs" value={stats.total || 0} accent="var(--stripe-blue)" />
        <MiniStat label="Last 7 days" value={stats.last_7_days || 0} accent="var(--stripe-blue)" />
        <MiniStat label="Missed class" value={stats.missed_training || 0} accent="var(--stripe-pink)" />
      </div>
      <div className="allergy-stats-grid" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>
        <style>{`.allergy-stats-grid { grid-template-columns: 1fr 1fr !important; } @media (max-width: 500px) { .allergy-stats-grid { grid-template-columns: 1fr !important; } }`}</style>
        <div>
          <div style={{ fontFamily: "Inter, var(--font-text)", fontSize: 12, fontWeight: 600, letterSpacing: "0.04em", textTransform: "uppercase", color: "var(--stripe-faint)", marginBottom: 10 }}>Time pattern</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, height: 150, alignItems: "end" }}>
            {["morning", "afternoon", "evening", "night"].map((key) => {
              const count = buckets[key] || 0;
              return (
              <div key={key} style={{ display: "flex", flexDirection: "column", gap: 6, alignItems: "center" }}>
                <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, fontWeight: 600, color: "var(--stripe-faint)" }}>{count}</div>
                <div style={{ width: "100%", height: 100, borderRadius: 8, background: "var(--stripe-card)", border: "1px solid var(--stripe-line)", display: "flex", alignItems: "flex-end", overflow: "hidden" }}>
                  <div style={{ width: "100%", height: `${Math.max(6, (count / maxBucket) * 100)}%`, background: "linear-gradient(180deg, var(--stripe-blue), var(--stripe-pink))", borderRadius: "10px 10px 0 0" }}></div>
                </div>
                <div style={{ fontFamily: "Inter, var(--font-text)", fontSize: 12, fontWeight: 600, letterSpacing: "0.04em", textTransform: "uppercase", color: "var(--stripe-faint)" }}>{({ morning: "AM", afternoon: "PM", evening: "EVE", night: "NT" }[key])}</div>
              </div>
            );})}
          </div>
        </div>
        <div>
          <div style={{ fontFamily: "Inter, var(--font-text)", fontSize: 12, fontWeight: 600, letterSpacing: "0.04em", textTransform: "uppercase", color: "var(--stripe-faint)", marginBottom: 10 }}>Top Causes</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {bars.slice(0, 5).map((bar) => (
              <div key={bar.name}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: "var(--stripe-ink)", marginBottom: 5 }}>
                  <span style={{ textTransform: "capitalize" }}>{bar.name}</span><span style={{ color: "var(--stripe-faint)" }}>{bar.count}</span>
                </div>
                <div className="stripe-meter">
                  <span style={{ width: `${(bar.count / maxBar) * 100}%`, background: "linear-gradient(90deg, var(--stripe-cyan), var(--stripe-blue))" }} />
                </div>
              </div>
            ))}
            {bars.length === 0 && <div style={{ fontSize: 14, color: "var(--stripe-faint)" }}>No cause data yet.</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

function AllergyRow({ log, onEdit, onDelete }) {
  const sev = ALLERGY_SEVERITIES.find((s) => s.id === log.severity) || ALLERGY_SEVERITIES[0];
  return (
    <div style={{ background: "var(--stripe-card)", border: "1px solid var(--stripe-line)", borderRadius: 16, padding: "16px 18px", display: "flex", alignItems: "center", gap: 14, boxShadow: "var(--stripe-shadow)" }}>
      <div style={{ width: 4, height: 42, borderRadius: 999, background: allergyColor(log.severity), flexShrink: 0 }}></div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 15, fontWeight: 600, color: "var(--stripe-ink)", marginBottom: 3, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
          {log.trigger || log.category || "Allergy log"} <span style={{ color: "var(--stripe-faint)", fontWeight: 500 }}>· {sev.label}</span>
        </div>
        <div style={{ fontSize: 13, color: "var(--stripe-faint)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
          {log.date} {log.time ? `· ${log.time}` : ""} · {log.training_impact || "no impact"}{log.missed_training ? " · missed class" : ""}{log.symptoms ? ` · ${log.symptoms}` : ""}
        </div>
      </div>
      <button onClick={onEdit} className="stripe-cta secondary" style={{ padding: "7px 12px", fontSize: 13 }}>Edit</button>
      <button onClick={onDelete} className="stripe-cta secondary" style={{ padding: "7px 12px", fontSize: 13, color: "var(--stripe-pink)" }}>Delete</button>
    </div>
  );
}

function AllergyFormModal({ initial, onCancel, onSubmit }) {
  const [date, setDate] = React.useState(initial?.date || allergyToday());
  const [time, setTime] = React.useState(initial?.time || allergyNowTime());
  const [severity, setSeverity] = React.useState(initial?.severity || "mild");
  const [category, setCategory] = React.useState(initial?.category || "General");
  const [trigger, setTrigger] = React.useState(initial?.trigger || "Food");
  const [symptoms, setSymptoms] = React.useState(initial?.symptoms || "");
  const [medication, setMedication] = React.useState(initial?.medication || "");
  const [impact, setImpact] = React.useState(initial?.training_impact || "none");
  const [missed, setMissed] = React.useState(!!initial?.missed_training);
  const submit = () => onSubmit({ date, time, severity, category, trigger: trigger.trim(), symptoms: symptoms.trim(), medication: medication.trim(), training_impact: impact, missed_training: missed });
  const canSubmit = !!(trigger.trim() || symptoms.trim());
  const trapRef = useModalTrap(true, onCancel);
  const field = { width: "100%", padding: "11px 12px", fontSize: 15, border: "1px solid var(--stripe-line)", borderRadius: 8, outline: "none", fontFamily: "inherit", boxSizing: "border-box", background: "var(--stripe-card)", color: "var(--stripe-ink)" };
  return (
    <div role="dialog" aria-modal="true" ref={trapRef} onClick={onCancel} style={{ position: "fixed", inset: 0, zIndex: 100, background: "rgba(20,20,30,0.32)", backdropFilter: "blur(6px)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxWidth: 520, background: "var(--stripe-card)", borderRadius: 20, padding: 28, border: "1px solid var(--stripe-line)", boxShadow: "0 24px 64px -16px rgba(20,20,40,0.30), 0 1px 0 rgba(255,255,255,0.9) inset", maxHeight: "calc(100dvh - 48px)", overflowY: "auto" }}>
        <div style={{ fontFamily: "Inter, var(--font-display)", fontSize: 22, fontWeight: 900, letterSpacing: "-0.05em", color: "var(--stripe-ink)", marginBottom: 18 }}>{initial ? "Edit allergy log" : "Log allergy symptoms"}</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
          <input type="date" value={date} onChange={(e) => setDate(e.target.value)} style={field} />
          <input value={time} onChange={(e) => setTime(e.target.value)} placeholder="time or context" style={field} />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
          <select value={category} onChange={(e) => setCategory(e.target.value)} style={field}>{ALLERGY_CATEGORIES.map((c) => <option key={c} value={c}>{c}</option>)}</select>
          <select value={trigger} onChange={(e) => setTrigger(e.target.value)} style={field}>{ALLERGY_CAUSES.map((c) => <option key={c} value={c}>{c}</option>)}</select>
        </div>
        <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
          {ALLERGY_SEVERITIES.map((s) => <button key={s.id} onClick={() => setSeverity(s.id)} style={{ flex: 1, padding: "9px 4px", borderRadius: 8, border: severity === s.id ? `1.5px solid ${s.color}` : "1px solid var(--stripe-line)", background: "var(--stripe-card)", color: severity === s.id ? s.color : "var(--stripe-faint)", fontFamily: "Inter, var(--font-text)", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.04em", cursor: "pointer", transition: "all 160ms ease" }}>{s.label}</button>)}
        </div>
        <textarea value={symptoms} onChange={(e) => setSymptoms(e.target.value)} placeholder="Symptoms and what it changed in training" rows={4} style={{ ...field, resize: "vertical", marginBottom: 12 }} />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
          <select value={medication} onChange={(e) => setMedication(e.target.value)} style={field}>{ALLERGY_MEDICATIONS.map((m) => <option key={m || "none"} value={m}>{m || "No medication"}</option>)}</select>
          <select value={impact} onChange={(e) => setImpact(e.target.value)} style={field}>{ALLERGY_IMPACTS.map((i) => <option key={i.id} value={i.id}>{i.label}</option>)}</select>
        </div>
        <label style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 14, color: "var(--stripe-faint)", marginBottom: 22 }}>
          <input type="checkbox" checked={missed} onChange={(e) => setMissed(e.target.checked)} />
          Missed class or skipped training because of this
        </label>
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button onClick={onCancel} className="stripe-cta secondary">Cancel</button>
          <button onClick={submit} disabled={!canSubmit} className="stripe-cta primary" style={!canSubmit ? { opacity: 0.4, cursor: "not-allowed" } : {}}>{initial ? "Save" : "Add"}</button>
        </div>
      </div>
    </div>
  );
}

function AllergyDeleteConfirm({ log, onCancel, onConfirm }) {
  const trapRef = useModalTrap(true, onCancel);
  return (
    <div role="dialog" aria-modal="true" ref={trapRef} onClick={onCancel} style={{ position: "fixed", inset: 0, zIndex: 110, background: "rgba(20,20,30,0.32)", backdropFilter: "blur(6px)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxWidth: 400, background: "var(--stripe-card)", borderRadius: 20, padding: 28, border: "1px solid var(--stripe-line)", boxShadow: "0 24px 64px -16px rgba(20,20,40,0.30), 0 1px 0 rgba(255,255,255,0.9) inset" }}>
        <div style={{ fontFamily: "Inter, var(--font-display)", fontSize: 22, fontWeight: 900, letterSpacing: "-0.05em", color: "var(--stripe-ink)", marginBottom: 8 }}>Delete this allergy log?</div>
        <div style={{ fontSize: 15, color: "var(--stripe-faint)", lineHeight: 1.5, marginBottom: 22 }}>{log.date} · {log.trigger || log.category}</div>
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button onClick={onCancel} className="stripe-cta secondary">Cancel</button>
          <button onClick={onConfirm} className="stripe-cta primary" style={{ background: "var(--stripe-pink)", boxShadow: "0 4px 12px -3px rgba(255,92,154,0.40)" }}>Delete</button>
        </div>
      </div>
    </div>
  );
}

window.Allergies = Allergies;

</script>
  <script type="text/babel">
// Top-level router — Login → Dashboard / Editor (with floating nav)

// =====================================================
// TechniqueLibrary — browse all technique folders
// =====================================================
function TechniqueLibrary({ onBack }) {
  const [selected, setSelected] = React.useState(null);
  const [richTechniques, setRichTechniques] = React.useState(null); // null = loading, [] = empty
  const [loadError, setLoadError] = React.useState(null);

  // List-view techniques fall back to injected data if fetch hasn't completed
  const listTechniques = richTechniques !== null
    ? richTechniques
    : ((window.__bjjdata && Array.isArray(window.__bjjdata.techniques)) ? window.__bjjdata.techniques : []);

  React.useEffect(() => {
    let cancelled = false;
    fetch("/api/technique-history", { credentials: "same-origin" })
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      })
      .then(data => {
        if (!cancelled) {
          // Merge entries from rich data with counts/last_seen from list data
          const listMap = {};
          const base = (window.__bjjdata && Array.isArray(window.__bjjdata.techniques))
            ? window.__bjjdata.techniques : [];
          base.forEach(t => { listMap[t.id] = t; });
          const merged = (data.techniques || []).map(t => ({
            ...listMap[t.id],
            ...t,
          }));
          setRichTechniques(merged);
        }
      })
      .catch(err => {
        if (!cancelled) setLoadError(err.message);
      });
    return () => { cancelled = true; };
  }, []);

  function resolveSelectedTechnique(techniques, selection) {
    if (selection === null) return null;
    const byId = techniques.find((tech, idx) => (tech.id || idx) === selection);
    return byId || techniques[selection] || null;
  }

  function daysSince(lastSeen) {
    if (!lastSeen) return null;
    return (Date.now() - new Date(lastSeen).getTime()) / 86400000;
  }

  function recencyDot(lastSeen) {
    if (!lastSeen) return "#b0b0b8";
    const days = daysSince(lastSeen);
    if (days <= 7)  return "var(--accent-success)";
    if (days <= 30) return "var(--accent-warn)";
    return "#b0b0b8";
  }

  function formatDate(d) {
    if (!d) return "never";
    const dt = new Date(d);
    return dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  }

  function titleCase(s) {
    if (!s) return "";
    return s.replace(/\b\w/g, c => c.toUpperCase());
  }

  function sentimentChip(sentiment) {
    const map = {
      learned: { label: "learned", bg: "rgba(46,109,74,0.12)", color: "var(--accent-success)", border: "rgba(46,109,74,0.28)" },
      struggled: { label: "struggled", bg: "rgba(255,92,154,0.10)", color: "var(--stripe-pink)", border: "rgba(255,92,154,0.28)" },
      worked_on: { label: "worked on", bg: "rgba(0,102,255,0.08)", color: "var(--stripe-blue)", border: "rgba(0,102,255,0.22)" },
    };
    const s = map[sentiment] || map["worked_on"];
    return (
      <span style={{
        display: "inline-flex", alignItems: "center", gap: 4,
        background: s.bg, color: s.color,
        border: `1px solid ${s.border}`,
        fontFamily: "var(--font-text)",
        fontSize: 11, fontWeight: 600, borderRadius: 999,
        padding: "3px 12px", marginTop: 10,
        letterSpacing: "0.04em", textTransform: "uppercase",
      }}>
        {s.label}
      </span>
    );
  }

  const cardSurface = (extra = {}) => ({
    position: "relative",
    borderRadius: 20,
    border: "1px solid var(--stripe-line)",
    background: "var(--stripe-card)",
    boxShadow: "var(--stripe-shadow)",
    ...extra,
  });

  const backBtnStyle = {
    display: "inline-flex", alignItems: "center", gap: 8,
    background: "transparent", border: "none", cursor: "pointer",
    color: "var(--stripe-faint)", fontSize: 14, padding: "8px 0",
    marginBottom: 18, fontFamily: "var(--font-text)",
  };

  const eyebrowStyle = {
    fontFamily: "Inter, var(--font-text)", fontSize: 12, fontWeight: 700,
    letterSpacing: "0.06em", textTransform: "uppercase",
    color: "var(--stripe-faint)", marginBottom: 10,
  };

  const pageTitleStyle = {
    fontFamily: "Inter, var(--font-display)", fontSize: 22, fontWeight: 900,
    letterSpacing: "-0.05em", color: "var(--stripe-ink)",
  };

  const pageSubStyle = {
    fontFamily: "Inter, var(--font-text)", fontSize: 14,
    color: "var(--stripe-faint)", marginTop: 4, lineHeight: 1.5,
  };

  const selectedTechnique = resolveSelectedTechnique(listTechniques, selected);
  const totalSessions = listTechniques.reduce((sum, tech) => sum + (tech.count || 0), 0);
  const totalVideos = listTechniques.reduce((sum, tech) => sum + (tech.video_count || 0), 0);
  const recentTechniques = listTechniques.filter((tech) => {
    const days = daysSince(tech.last_seen);
    return days !== null && days <= 30;
  }).length;

  function loadingRow() {
    return (
      <div style={{
        display: "flex",
        alignItems: "center",
        gap: 12,
        padding: "16px 18px",
        marginBottom: 18,
        color: "var(--stripe-faint)",
        fontSize: 14,
        fontWeight: 500,
        background: "var(--stripe-card)",
        border: "1px solid var(--stripe-line)",
        borderRadius: 12,
        boxShadow: "var(--stripe-shadow)",
      }}>
        <span style={{
          display: "inline-block",
          width: 14,
          height: 14,
          border: "2px solid var(--stripe-line)",
          borderTopColor: "var(--stripe-blue)",
          borderRadius: "50%",
          animation: "gc-spin 0.8s linear infinite",
        }} />
        Loading technique history
      </div>
    );
  }

  function errorRow() {
    if (!loadError) return null;
    return (
      <div style={{
        minHeight: "auto",
        padding: "16px 18px",
        marginBottom: 18,
        borderRadius: 12,
        background: "var(--stripe-card)",
        border: "1px solid var(--stripe-line)",
        color: "var(--stripe-pink)",
        fontSize: 14,
        lineHeight: 1.6,
        boxShadow: "var(--stripe-shadow)",
      }}>
        Couldn't load technique history. The list below may be incomplete.
      </div>
    );
  }

  function listSummaryCard() {
    return (
      <div style={cardSurface({
        minHeight: "auto",
        padding: 22,
        marginBottom: 22,
      })}>
        <div className="tl-stat-strip">
          <div className="tl-stat">
            <div className="tl-stat-value">{listTechniques.length}</div>
            <div className="tl-stat-label">techniques</div>
          </div>
          <div className="tl-stat">
            <div className="tl-stat-value">{recentTechniques}</div>
            <div className="tl-stat-label">worked in 30 days</div>
          </div>
          <div className="tl-stat">
            <div className="tl-stat-value">{totalVideos}</div>
            <div className="tl-stat-label">videos attached</div>
          </div>
        </div>
      </div>
    );
  }

  if (selected !== null) {
    const t = selectedTechnique;
    const entries = (t && Array.isArray(t.entries)) ? t.entries : [];

    if (!t) {
      return (
        <div style={{ minHeight: "100vh", paddingTop: 100, paddingBottom: 120, paddingLeft: "clamp(16px, 4vw, 24px)", paddingRight: "clamp(16px, 4vw, 24px)" }}>
          <div style={{ maxWidth: 860, margin: "0 auto" }}>
            <button onClick={() => setSelected(null)} type="button" className="stripe-cta secondary" style={{ marginBottom: 18 }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
              Back to library
            </button>
            <div style={{ marginBottom: 28 }}>
              <div style={eyebrowStyle}>Technique detail</div>
              <div style={pageTitleStyle}>Technique not found</div>
              <div style={pageSubStyle}>The selected technique is no longer available in the current list.</div>
            </div>
          </div>
        </div>
      );
    }

    const sessionCount = t.count || entries.length;
    const videoCount = t.video_count || 0;
    return (
      <div style={{ minHeight: "100vh", paddingTop: 100, paddingBottom: 120, paddingLeft: "clamp(16px, 4vw, 24px)", paddingRight: "clamp(16px, 4vw, 24px)" }}>
        <div style={{ maxWidth: 860, margin: "0 auto" }}>
          <button onClick={() => setSelected(null)} type="button" className="stripe-cta secondary" style={{ marginBottom: 18 }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            Back to library
          </button>

          {/* Header */}
          <div style={{ marginBottom: 22 }}>
            <div style={eyebrowStyle}>Technique detail</div>
            <div style={pageTitleStyle}>{titleCase(t.name)}</div>
            <div style={pageSubStyle}>
              {sessionCount} {sessionCount === 1 ? "session" : "sessions"}{videoCount > 0 ? ` · ${videoCount} ${videoCount === 1 ? "video" : "videos"}` : ""} · last worked {formatDate(t.last_seen)}
            </div>
          </div>

          {/* Stat strip */}
          <div style={cardSurface({ padding: 22, marginBottom: 18 })}>
            <div className="tl-stat-strip">
              <div className="tl-stat">
                <div className="tl-stat-value">{sessionCount}</div>
                <div className="tl-stat-label">sessions</div>
              </div>
              <div className="tl-stat">
                <div className="tl-stat-value">{videoCount}</div>
                <div className="tl-stat-label">videos</div>
              </div>
              <div className="tl-stat">
                <div className="tl-stat-value" style={{ fontSize: 18 }}>{formatDate(t.last_seen)}</div>
                <div className="tl-stat-label">last worked</div>
              </div>
            </div>
          </div>

          {/* Summary card */}
          <div style={cardSurface({ padding: 24, marginBottom: 18 })}>
            <div style={eyebrowStyle}>Summary</div>
            {t.summary ? (
              <div style={{ color: "var(--stripe-ink)", fontSize: 15, lineHeight: 1.65 }}>
                {t.summary}
              </div>
            ) : (
              <div style={{ color: "var(--stripe-faint)", fontSize: 14, lineHeight: 1.6 }}>
                No summary yet — keep training this technique.
              </div>
            )}
          </div>

          {/* Entries */}
          {entries.length === 0 ? (
            <div style={cardSurface({
              padding: 28,
              textAlign: "center",
              color: "var(--stripe-faint)",
              fontSize: 15,
              lineHeight: 1.6,
            })}>
              No session entries yet.
            </div>
          ) : (
            <div style={{ display: "grid", gap: 14 }}>
              {entries.map((entry, idx) => (
                <article key={idx} style={cardSurface({ padding: 22 })}>
                  <div style={{
                    fontFamily: "Inter, var(--font-text)", fontSize: 12, fontWeight: 700,
                    color: "var(--stripe-faint)", letterSpacing: "0.04em", textTransform: "uppercase",
                    marginBottom: 10,
                  }}>
                    {formatDate(entry.date)}{entry.session ? ` · ${entry.session}` : ""}
                  </div>
                  <div style={{ color: "var(--stripe-ink)", fontSize: 15, lineHeight: 1.65 }}>
                    {entry.notes}
                  </div>
                  {entry.sentiment && sentimentChip(entry.sentiment)}
                  {entry.video_url && (
                    <video
                      controls
                      style={{
                        width: "100%",
                        borderRadius: 14,
                        marginTop: 14,
                        maxHeight: 320,
                        background: "#000",
                        border: "1px solid var(--stripe-line)",
                      }}
                      src={entry.video_url}
                    />
                  )}
                </article>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", paddingTop: 100, paddingBottom: 120, paddingLeft: "clamp(16px, 4vw, 24px)", paddingRight: "clamp(16px, 4vw, 24px)" }}>
      <div style={{ maxWidth: 860, margin: "0 auto" }}>
        <button onClick={onBack} type="button" className="stripe-cta secondary" style={{ marginBottom: 18 }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Back
        </button>

        {/* Compact header */}
        <div style={{ marginBottom: 24 }}>
          <div style={eyebrowStyle}>Training archive</div>
          <div style={pageTitleStyle}>Technique Library</div>
          <div style={pageSubStyle}>
            Browse the techniques you've worked on. Tap any item for its full session history.
          </div>
        </div>

        {richTechniques === null && !loadError && loadingRow()}
        {errorRow()}

        {listTechniques.length === 0 ? (
          <div style={cardSurface({
            padding: 28,
            color: "var(--stripe-faint)",
            fontSize: 15,
            lineHeight: 1.6,
            textAlign: "center",
          })}>
            No techniques yet — they will appear here after your first session debrief.
          </div>
        ) : (
          <>
            {listSummaryCard()}
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {listTechniques.map((t, i) => {
                const label = titleCase(t.name);
                const sessions = t.count || 0;
                const videos = t.video_count || 0;
                const lastSeen = formatDate(t.last_seen);
                return (
                  <button
                    key={t.id || i}
                    type="button"
                    onClick={() => setSelected(t.id || i)}
                    className="tl-row"
                  >
                    <div className="tl-row-dot" style={{
                      background: recencyDot(t.last_seen),
                      boxShadow: `0 0 0 4px ${recencyDot(t.last_seen)}22`,
                    }} />
                    <div className="tl-row-body">
                      <div className="tl-row-name">{label}</div>
                      <div className="tl-row-meta">
                        {sessions} {sessions === 1 ? "session" : "sessions"}{videos > 0 ? ` · ${videos} ${videos === 1 ? "video" : "videos"}` : ""} · last worked {lastSeen}
                      </div>
                    </div>
                    <svg className="tl-row-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
                      <polyline points="9 18 15 12 9 6"/>
                    </svg>
                  </button>
                );
              })}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

window.TechniqueLibrary = TechniqueLibrary;

const { useState: useStateApp } = React;

  const [lessonId, setLessonId] = useStateApp(null); // null = list view; string id = detail view

  return (
    <>
      {!authed ? (
        <>
          <HaloBackground />
          <div data-screen-label="01 Login">
            <Login onContinue={() => setAuthed(true)} />
          </div>
        </>
      ) : (
        <>
          <NavPill active={screen} onChange={(s) => { setScreen(s); setLessonId(null); }} />
          {screen === "dashboard" && (
            <div data-screen-label="02 Dashboard">
              <Dashboard
                onOpenLessons={() => setScreen("bruno")}
                onOpenSchedule={() => setScreen("schedule")}
                onOpenMeals={() => setScreen("meals")}
                onOpenProblems={() => setScreen("problems")}
                onOpenHydration={() => setScreen("hydration")}
                onOpenMicroInjuries={() => setScreen("micro-injuries")}
                onOpenAllergies={() => setScreen("allergies")}
                onOpenTechniqueLibrary={() => setScreen("techniquelibrary")}
                onOpenEditor={() => setScreen("editor")}
              />
            </div>
          )}
          {screen === "editor" && (
            <div data-screen-label="03 Editor"><Editor /></div>
          )}
          {screen === "bruno" && lessonId === null && (
            <div data-screen-label="04 Bruno Lessons">
              <BrunoLessons
                onBack={() => setScreen("dashboard")}
                onOpenDetail={(id) => setLessonId(id)}
              />
            </div>
          )}
          {screen === "bruno" && lessonId !== null && (
            <div data-screen-label="05 Bruno Lesson Detail">
              <BrunoLessonDetail
                lessonId={lessonId}
                onBack={() => setLessonId(null)}
              />
            </div>
          )}
          {screen === "schedule" && (
            <div data-screen-label="06 Schedule">
              <Schedule onBack={() => setScreen("dashboard")} />
            </div>
          )}
          {screen === "meals" && (
            <div data-screen-label="07 Meals">
              <Meals onBack={() => setScreen("dashboard")} />
            </div>
          )}
          {screen === "problems" && (
            <div data-screen-label="08 Problems">
              <Problems onBack={() => setScreen("dashboard")} />
            </div>
          )}
          {screen === "hydration" && (
            <div data-screen-label="09 Hydration">
              <Hydration onBack={() => setScreen("dashboard")} />
            </div>
          )}
          {screen === "micro-injuries" && (
            <div data-screen-label="10 Micro-Injuries">
              <MicroInjuries onBack={() => setScreen("dashboard")} />
            </div>
          )}
          {screen === "allergies" && (
            <div data-screen-label="11 Allergy Tracker">
              <Allergies onBack={() => setScreen("dashboard")} />
            </div>
          )}
          {screen === "techniquelibrary" && (
            <div data-screen-label="12 Technique Library">
              <TechniqueLibrary onBack={() => setScreen("dashboard")} />
            </div>
          )}
        </>
      )}
    </>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  render() {
    if (this.state.error) {
      return React.createElement("div", {
        style: {
          minHeight: "100vh", display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center", padding: 40,
          fontFamily: "Inter, system-ui, sans-serif", color: "var(--ink, #1a1814)",
        }
      },
        React.createElement("div", { style: { fontFamily: "Inter, system-ui", fontSize: 22, fontWeight: 900, letterSpacing: "-0.05em", color: "var(--stripe-ink, #0a2540)", marginBottom: 12 } }, "Something went wrong"),
        React.createElement("div", { style: { fontSize: 15, color: "var(--stripe-faint, #6b7c93)", maxWidth: 400, textAlign: "center", lineHeight: 1.5, marginBottom: 20 } },
          "The dashboard hit an error. Try refreshing the page."),
        React.createElement("button", {
          onClick: () => window.location.reload(),
          className: "stripe-cta primary",
          style: { fontSize: 14 }
        }, "Refresh"),
        React.createElement("pre", { style: { marginTop: 20, fontSize: 12, color: "rgba(26,24,20,0.4)", maxWidth: 500, overflow: "auto" } },
          String(this.state.error))
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary, null, React.createElement(App))
);

</script>
</body>
