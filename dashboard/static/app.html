            marginTop: 28, gridTemplateColumns: "repeat(4, 1fr)",
          }}>
            <div className="stripe-stat">
              <div className="stripe-stat-value">{lastSip && lastSip !== "—" ? formatTimeFriendly(lastSip) : "—"}</div>
              <div className="stripe-stat-label">Last sip</div>
            </div>
            <div className="stripe-stat">
              <div className="stripe-stat-value">{biggest ? formatHydrationAmount(biggest) : "—"}</div>
              <div className="stripe-stat-label">Biggest</div>
            </div>
            <div className="stripe-stat">
              <div className="stripe-stat-value">{log.length || 0}</div>
              <div className="stripe-stat-label">Logs</div>
            </div>
            <div className="stripe-stat">
              <div className="stripe-stat-value">{formatHydrationAmount(avg)}</div>
              <div className="stripe-stat-label">7-day avg</div>
            </div>
          </div>
        </div>

        <div className="hy-body-grid" style={{ display: "grid", gridTemplateColumns: "minmax(0, 1.15fr) 0.85fr", gap: 24, marginBottom: 24, alignItems: "start" }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 24, minWidth: 0 }}>
            <PaceCard total={total} goal={goal} paceTarget={paceTarget} onEdit={() => setPaceEditing(true)} />

            {/* TODAY'S LOG — Stripe-style card */}
            <div className="stripe-card" style={{ padding: 24, borderRadius: 20, minHeight: 0, cursor: "default", animation: "none" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, position: "relative", zIndex: 1 }}>
                <div className="stripe-card-title" style={{ fontSize: 18, marginBottom: 0 }}>Today's log</div>
                <span className="stripe-pill">{displayLog.length} entries</span>
              </div>
              {displayLog.length === 0 ? (
                <div style={{ padding: "18px 0", fontSize: 14, color: "var(--stripe-faint)", position: "relative", zIndex: 1 }}>
                  Nothing logged yet. Add an entry to show today's totals.
                </div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", maxHeight: 360, overflowY: "auto", position: "relative", zIndex: 1 }}>
                  {displayLog.map((entry, i) => (
                    <LogRow key={entry.id} entry={entry} isLast={i === displayLog.length - 1} onDelete={() => removeEntry(entry.id)} />
                  ))}
                </div>
              )}
            </div>
          </div>

          <div style={{ display: "flex", flexDirection: "column", gap: 24, minWidth: 0 }}>
            {/* LAST 7 DAYS — Stripe-style card with cyan→mint gradient bars (green when goal hit) */}
            <div className="stripe-card" style={{ padding: 24, borderRadius: 20, minHeight: 0, cursor: "default", animation: "none" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, position: "relative", zIndex: 1 }}>
                <div className="stripe-card-title" style={{ fontSize: 18, marginBottom: 0 }}>Last 7 days</div>
                <span className="stripe-pill">avg {formatHydrationAmount(avg)}</span>
              </div>
              <div style={{ display: "flex", alignItems: "flex-end", gap: 10, height: 120, position: "relative", zIndex: 1 }}>
                {historyDays.map((d, i) => {
                  const dayPct = Math.min(100, Math.round((d.total / goal) * 100));
                  const hit = d.total >= goal;
                  const isToday = d.date === "Today";
                  return (
                    <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
                      <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: "-0.02em", color: isToday ? "var(--stripe-ink)" : "var(--stripe-faint)", fontVariantNumeric: "tabular-nums" }}>{Math.round(d.total / 100) / 10}L</div>
                      <div style={{
                        position: "relative",
                        width: "100%", maxWidth: 32, flex: 1,
                        background: "rgba(10,37,64,0.05)",
                        borderRadius: 8, overflow: "hidden",
                        display: "flex", alignItems: "flex-end",
                        border: isToday ? "1.5px solid rgba(99,91,255,0.45)" : "1px solid var(--stripe-line)",
                        boxShadow: isToday ? "0 0 0 3px rgba(99,91,255,0.12)" : "none",
                      }}>
                        <div style={{
                          width: "100%", height: `${dayPct}%`,
                          background: hit
                            ? "linear-gradient(180deg, var(--stripe-mint), #19a07a)"
                            : "linear-gradient(180deg, var(--stripe-cyan), var(--stripe-mint))",
                          borderRadius: 6,
                          boxShadow: "inset 0 1px 0 rgba(255,255,255,0.3)",
                          transition: "height 320ms cubic-bezier(0.32,0.72,0,1)",
                        }}></div>
                      </div>
                      <div style={{ fontSize: 11, fontWeight: isToday ? 800 : 700, color: isToday ? "var(--stripe-ink)" : "var(--stripe-faint)", letterSpacing: "0" }}>{d.date}</div>
                    </div>
                  );
                })}
              </div>
            </div>
            <InsightsTile total={total} goal={goal} avg={avg} streak={streak} />
          </div>
        </div>
      </div>

      {/* Custom add modal */}
      {customOpen && (
        <AddEntryModal
          onSubmit={submitCustom}
          onCancel={() => setCustomOpen(false)}
        />
      )}

      {/* Goal-edit modal */}
      {goalEditing && (
        <GoalEditModal
          goal={goalDraft}
          onChange={(v) => { setGoalDraft(v); setGoalError(""); }}
          onCancel={() => { setGoalEditing(false); setGoalError(""); }}
          onSave={saveGoal}
          error={goalError}
        />
      )}

      {/* Pace-edit modal */}
      {paceEditing && (
        <PaceEditModal
          paceTarget={paceTarget}
          goal={goal}
          total={total}
          onSave={(t) => { setPaceTarget(t); setPaceEditing(false); }}
          onCancel={() => setPaceEditing(false)}
        />
      )}

      <style>{`
        @keyframes stripeModalFade { from { opacity: 0; } to { opacity: 1; } }
        @keyframes stripeModalPop  { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes waveSlide { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        @keyframes bobble { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        @keyframes droplet { 0% { transform: translateY(-6px) scale(0.4); opacity: 0; } 30% { opacity: 1; } 100% { transform: translateY(36px) scale(0.9); opacity: 0; } }

        .hy-back-btn:hover { color: var(--stripe-ink) !important; }

        /* Hydration page stripe-cards are containers, not bento tiles —
           neutralize the hover-lift, shimmer, and pointer from .stripe-card */
        .hy-page .stripe-card { cursor: default; }
        .hy-page .stripe-card:hover {
          transform: none;
          border-color: rgba(10,37,64,0.08);
          box-shadow: var(--stripe-shadow);
        }
        .hy-page .stripe-card::before,
        .hy-page .stripe-card:hover::before { display: none; }

        @media (max-width: 920px) {
          .hy-hero-grid { grid-template-columns: 1fr !important; gap: 18px !important; }
          .hy-hero-grid > :nth-child(2) { display: none !important; }
          .hy-hero-stats { grid-template-columns: repeat(2, 1fr) !important; row-gap: 14px !important; }
          .hy-body-grid { grid-template-columns: 1fr !important; }
          .hy-hero-card { padding: 24px !important; }
        }
        .nav-pill-tab { min-height: 44px !important; display: flex !important; align-items: center !important; }
        @media (hover: none) { .lesson-row-actions { opacity: 1 !important; } }
      `}</style>
    </div>
  );
}

// ---------- Animated bottle visual ----------
function BottleVisual({ pct }) {
  // bottle shape: 200x260; water fills bottom-up
  const fillH = (pct / 100) * 200; // out of 200 inner height
  return (
    <div className="hy-hero-bottle" style={{
      position: "relative", width: 280, height: 330, margin: "0 auto",
      display: "flex", alignItems: "center", justifyContent: "center",
      animation: "bobble 4.5s ease-in-out infinite",
    }}>
      {/* glow halo */}
      <div style={{
        position: "absolute", inset: -18,
        background: "radial-gradient(closest-side, rgba(0,212,255,0.30), rgba(99,91,255,0.18) 55%, transparent 78%)",
        filter: "blur(10px)",
      }}></div>

      <svg viewBox="0 0 200 260" width="280" height="330" style={{ position: "relative", zIndex: 1, overflow: "visible" }}>
        <defs>
          <linearGradient id="bottleGlass" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="rgba(255,255,255,0.95)"/>
            <stop offset="100%" stopColor="rgba(255,255,255,0.55)"/>
          </linearGradient>
          <linearGradient id="waterFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="var(--stripe-cyan)"/>
            <stop offset="50%" stopColor="var(--stripe-blue)"/>
            <stop offset="100%" stopColor="var(--stripe-ink)"/>
          </linearGradient>
          <clipPath id="bottleClip">
            <path d="M70 50 L70 30 Q70 22 78 22 L122 22 Q130 22 130 30 L130 50 L150 70 Q160 80 160 95 L160 220 Q160 240 140 240 L60 240 Q40 240 40 220 L40 95 Q40 80 50 70 Z"/>
          </clipPath>
          {/* wavy band — wider than viewBox so it can scroll */}
          <path id="wave" d="M0,10 Q25,0 50,10 T100,10 T150,10 T200,10 T250,10 T300,10 L300,30 L0,30 Z"/>
        </defs>

        {/* Glass body */}
        <path
          d="M70 50 L70 30 Q70 22 78 22 L122 22 Q130 22 130 30 L130 50 L150 70 Q160 80 160 95 L160 220 Q160 240 140 240 L60 240 Q40 240 40 220 L40 95 Q40 80 50 70 Z"
          fill="url(#bottleGlass)"
          stroke="rgba(10,37,64,0.18)"
          strokeWidth="2"
        />

        {/* Water + waves clipped to bottle */}
        <g clipPath="url(#bottleClip)">
          <rect x="40" y={240 - fillH} width="120" height={fillH} fill="url(#waterFill)"/>
          {/* Two wave layers on the surface */}
          <g style={{ transform: `translateY(${240 - fillH - 12}px)` }}>
            <g style={{ animation: "waveSlide 4s linear infinite" }}>
              <use href="#wave" x="-50" fill="rgba(255,255,255,0.45)"/>
              <use href="#wave" x="100" fill="rgba(255,255,255,0.45)"/>
            </g>
            <g style={{ animation: "waveSlide 6s linear infinite reverse" }}>
              <use href="#wave" x="-30" y="4" fill="rgba(255,255,255,0.28)"/>
              <use href="#wave" x="120" y="4" fill="rgba(255,255,255,0.28)"/>
            </g>
          </g>
          {/* Bubbles */}
          {pct > 5 && (
            <g>
              <circle cx="70" cy="220" r="2.5" fill="rgba(255,255,255,0.6)" style={{ animation: "droplet 2.6s ease-in infinite", animationDelay: "0s" }}/>
              <circle cx="100" cy="220" r="1.8" fill="rgba(255,255,255,0.5)" style={{ animation: "droplet 3.4s ease-in infinite", animationDelay: "0.8s" }}/>
              <circle cx="130" cy="220" r="2.2" fill="rgba(255,255,255,0.55)" style={{ animation: "droplet 3.0s ease-in infinite", animationDelay: "1.6s" }}/>
            </g>
          )}
        </g>

        {/* Highlight stripe */}
        <path d="M55 90 Q52 110 52 160 L52 200" fill="none" stroke="rgba(255,255,255,0.7)" strokeWidth="3" strokeLinecap="round"/>

        {/* Cap */}
        <rect x="70" y="14" width="60" height="14" rx="4" fill="var(--stripe-ink)" opacity="0.9"/>
      </svg>

      {/* Centered % readout */}
      <div style={{
        position: "absolute", inset: 0,
        display: "flex", alignItems: "center", justifyContent: "center",
        pointerEvents: "none",
      }}>
        <div style={{
          fontFamily: "Inter, var(--font-display)",
          fontSize: 32, fontWeight: 900,
          color: "#fff",
          letterSpacing: "-0.05em",
          textShadow: "0 2px 8px rgba(10,37,64,0.55)",
          fontVariantNumeric: "tabular-nums",
        }}>{pct}%</div>
      </div>
    </div>
  );
}

// ---------- Insights tile ----------
function InsightsTile({ total, goal, avg, streak }) {
  const remaining = Math.max(0, goal - total);
  const cupSize = 250;
  const cupsLeft = Math.ceil(remaining / cupSize);
  const vsAvgPct = avg > 0 ? Math.round(((total - avg) / avg) * 100) : 0;
  const ahead = vsAvgPct >= 0;

  const bullets = [
    {
      icon: (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M8 2v4M16 2v4M3 10h18M5 6h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z"/>
        </svg>
      ),
      title: streak > 0 ? `${streak} day${streak === 1 ? "" : "s"} on streak` : "No streak yet",
      detail: streak > 0 ? "Hit your goal again to keep it moving." : "Reach your goal to activate tracking.",
    },
    {
      icon: (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M3 17l6-6 4 4 8-8"/><polyline points="14 7 21 7 21 14"/>
        </svg>
      ),
      title: ahead ? `+${vsAvgPct}% vs your average` : `${vsAvgPct}% vs your average`,
      detail: ahead ? "You're sipping more than usual today." : "Below your typical pace — top up.",
    },
    {
      icon: (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M8 2v3M16 2v3M5 8h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2z"/>
          <path d="M9 14l2 2 4-4"/>
        </svg>
      ),
      title: cupsLeft > 0 ? `${cupsLeft} more cup${cupsLeft === 1 ? "" : "s"}` : "Goal hit",
      detail: cupsLeft > 0 ? `${formatHydrationAmount(cupSize)} cups · ${formatHydrationAmount(remaining)} left` : "Anything else is a bonus.",
    },
  ];

  return (
    <div className="stripe-card" style={{
      position: "relative",
      borderRadius: 20, padding: 24,
      minHeight: 0, cursor: "default", animation: "none",
    }}>
      <div className="stripe-card-title" style={{ fontSize: 18, marginBottom: 16, position: "relative", zIndex: 1 }}>Insights</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 14, position: "relative", zIndex: 1 }}>
        {bullets.map((b, i) => (
          <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 12 }}>
            <div style={{
              width: 32, height: 32, borderRadius: 10,
              background: "rgba(99,91,255,0.10)",
              border: "1px solid rgba(99,91,255,0.22)",
              display: "flex", alignItems: "center", justifyContent: "center",
              color: "var(--stripe-blue)", flexShrink: 0,
            }}>{b.icon}</div>
            <div style={{ flex: 1 }}>
              <div style={{
                fontSize: 14, fontWeight: 800, color: "var(--stripe-ink)",
                letterSpacing: "-0.02em", marginBottom: 3,
              }}>{b.title}</div>
              <div style={{ fontSize: 12, color: "var(--stripe-faint)", fontWeight: 600 }}>{b.detail}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ---------- Pace card — "Drink X by Y" ----------
function PaceCard({ total, goal, paceTarget, onEdit }) {
  const remaining = Math.max(0, goal - total);
  const onTrack = remaining === 0;

  // Compute hours from now until target
  const now = new Date();
  const [th, tm] = (paceTarget || "21:00").split(":").map(Number);
  const target = new Date(now);
  target.setHours(th, tm, 0, 0);
  const minsLeft = Math.round((target - now) / 60000);
  const hoursLeft = minsLeft / 60;
  const past = minsLeft <= 0;

  // Recommend per-hour pace
  let perHour = 0;
  if (!onTrack && !past && hoursLeft > 0) {
    perHour = Math.round((remaining / hoursLeft) / 50) * 50; // round to nearest 50ml
  }

  // Build a sip schedule — one sip per hour from now until target (capped at 6 marks)
  const schedule = [];
  if (!onTrack && !past && hoursLeft >= 0.25) {
    const slots = Math.min(6, Math.max(2, Math.ceil(hoursLeft)));
    const stepMins = minsLeft / slots;
    const perSlot = Math.round((remaining / slots) / 50) * 50;
    for (let i = 1; i <= slots; i++) {
      const slot = new Date(now.getTime() + stepMins * i * 60000);
      const hh = String(slot.getHours()).padStart(2, "0");
      const mm = String(slot.getMinutes()).padStart(2, "0");
      schedule.push({ time: `${hh}:${mm}`, amount: perSlot });
    }
  }

  return (
    <div className="stripe-card" style={{
      position: "relative",
      borderRadius: 20, padding: 24,
      minHeight: 0, cursor: "default", animation: "none",
    }}>
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 16, marginBottom: schedule.length ? 20 : 0, position: "relative", zIndex: 1 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div className="stripe-card-title" style={{ fontSize: 14, fontWeight: 800, color: "var(--stripe-blue)", letterSpacing: "0", marginBottom: 10 }}>Finish-by plan</div>

          {onTrack ? (
            <React.Fragment>
              <div style={{
                fontFamily: "Inter, var(--font-display)", fontSize: 26, fontWeight: 900,
                letterSpacing: "-0.04em", color: "var(--stripe-ink)", lineHeight: 1.15,
              }}>You've hit your goal — nice.</div>
              <div style={{ fontSize: 14, color: "var(--stripe-faint)", marginTop: 6, fontWeight: 700 }}>
                Keep sipping if you're heading to practice.
              </div>
            </React.Fragment>
          ) : past ? (
            <React.Fragment>
              <div style={{
                fontFamily: "Inter, var(--font-display)", fontSize: 22, fontWeight: 900,
                letterSpacing: "-0.04em", color: "var(--stripe-ink)", lineHeight: 1.2,
              }}>
                {formatHydrationAmount(remaining)} to go · target was {formatTimeFriendly(paceTarget)}
              </div>
              <div style={{ fontSize: 14, color: "var(--stripe-faint)", marginTop: 6, fontWeight: 700 }}>
                Tap edit to set a new finish time.
              </div>
            </React.Fragment>
          ) : (
            <React.Fragment>
              <div style={{
                fontFamily: "Inter, var(--font-display)", fontSize: 26, fontWeight: 900,
                letterSpacing: "-0.04em", color: "var(--stripe-ink)", lineHeight: 1.2,
              }}>
                Drink <span style={{ color: "var(--stripe-blue)" }}>{formatHydrationAmount(remaining)}</span> by <span style={{ color: "var(--stripe-blue)" }}>{formatTimeFriendly(paceTarget)}</span>
              </div>
              <div style={{ fontSize: 14, color: "var(--stripe-faint)", marginTop: 6, fontWeight: 700 }}>
                {hoursLeft >= 1
                  ? `≈ ${formatHydrationAmount(perHour)} per hour for the next ${hoursLeft.toFixed(1)} h`
                  : `${minsLeft} min left — better get sipping`}
              </div>
            </React.Fragment>
          )}
        </div>

        <button onClick={onEdit} aria-label="Edit finish time" className="stripe-cta secondary" style={{
          minHeight: 36, padding: "0 14px", fontSize: 13, flexShrink: 0,
        }}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z"/>
          </svg>
          Edit
        </button>
      </div>

      {/* Sip schedule chips */}
      {schedule.length > 0 && (
        <div style={{ position: "relative", zIndex: 1 }}>
          <div style={{
            fontSize: 12, fontWeight: 800,
            letterSpacing: "0", color: "var(--stripe-faint)", marginBottom: 10,
          }}>SIP PLAN</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {schedule.map((s, i) => (
              <span key={i} style={{
                display: "inline-flex", alignItems: "center", gap: 8,
                padding: "7px 14px", borderRadius: 999,
                border: "1px solid var(--stripe-line)",
                background: "rgba(255,255,255,0.86)",
              }}>
                <span style={{
                  fontSize: 12, fontWeight: 800, color: "var(--stripe-ink)",
                  fontVariantNumeric: "tabular-nums", letterSpacing: "-0.01em",
                }}>{formatTimeFriendly(s.time)}</span>
                <span style={{
                  fontSize: 11, color: "var(--stripe-faint)", fontWeight: 700,
                }}>{formatHydrationAmount(s.amount)}</span>
              </span>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function WaterHero({ onClick }) {
  const { log, total, goal, paceTarget, setLog } = useHydrationStore();
  const [hover, setHover] = React.useState(false);
  const [customOpen, setCustomOpen] = React.useState(false);
  const pct = Math.min(100, Math.round((total / goal) * 100));
  const remaining = Math.max(0, goal - total);

  // Streak — count consecutive history days hitting goal, plus today if hit
  const historyDays = (() => {
    const live = window.__bjjdata && Array.isArray(window.__bjjdata.daily_water_7d)
      ? window.__bjjdata.daily_water_7d.map(d => ({ date: d.date, total: Math.round((d.liters || 0) * 1000) }))
      : [];
    return [...live, { date: "Today", total }];
  })();
  let streak = 0;
  for (let i = historyDays.length - 1; i >= 0; i--) {
    if (historyDays[i].total >= goal) streak++;
    else break;
  }

  // Last sip + biggest + 7-day avg
  const sortedLog = [...log].sort((a, b) => (b.time || "").localeCompare(a.time || ""));
  const lastSip = sortedLog[0]?.time || null;
  const biggest = sortedLog.reduce((max, e) => Math.max(max, e.amount), 0);
  const avg = Math.round(historyDays.reduce((s, d) => s + d.total, 0) / historyDays.length);

  // Pace — drink X by Y, ~Z/hr
  const now = new Date();
  const [th, tm] = (paceTarget || "21:00").split(":").map(Number);
  const target = new Date(now);
  target.setHours(th, tm, 0, 0);
  const minsLeft = Math.round((target - now) / 60000);
  const hoursLeft = minsLeft / 60;
  const pacePast = minsLeft <= 0;
  let perHour = 0;
  if (remaining > 0 && !pacePast && hoursLeft > 0) {
    perHour = Math.round((remaining / hoursLeft) / 50) * 50;
  }

  // Dot timeline — sips along the bar
  const dayStart = 6 * 60;   // 6:00 AM in minutes
  const dayEnd = 22 * 60;    // 10:00 PM
  const daySpan = dayEnd - dayStart;
  const sipDots = sortedLog.slice().reverse().map((e, i) => {
    const [hh, mm] = (e.time || "12:00").split(":").map(Number);
    const t = hh * 60 + mm;
    const x = Math.max(0, Math.min(100, ((t - dayStart) / daySpan) * 100));
    return { id: e.id || i, x, amount: e.amount };
  });

  const quickAdd = (e, ml) => {
    e.stopPropagation();
    const id = "log-" + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
    setLog((prev) => [...prev, { id, amount: ml, time: nowTimeLabel() }]);
    apiCall("POST", "/api/water/add", { amount_l: ml / 1000 });
  };

  const openCustom = (e) => {
    e.stopPropagation();
    setCustomOpen(true);
  };

  const submitCustom = ({ amount, time }) => {
    const id = "log-" + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
    setLog((prev) => [...prev, { id, amount, time }]);
    apiCall("POST", "/api/water/add", { amount_l: amount / 1000 });
    setCustomOpen(false);
  };

  return (
    <React.Fragment>
    <GlassCard hero rainbow radius={28} padding={36} className="dash-hero-card" style={{
      position: "relative", overflow: "hidden", cursor: "pointer",
      background: "var(--bg-paper)",
      backdropFilter: "none", WebkitBackdropFilter: "none",
      transform: hover ? "translateY(-2px)" : "translateY(0)",
      transition: "transform 200ms cubic-bezier(0.32,0.72,0,1)",
    }}
    onClick={onClick}
    onMouseEnter={() => setHover(true)}
    onMouseLeave={() => setHover(false)}>

      {/* halo glow behind the number */}
      <div style={{
        position: "absolute", left: -40, top: -40, width: 360, height: 360,
        background: "radial-gradient(closest-side, rgba(199,154,58,0.22), rgba(28,44,90,0.10) 50%, transparent 75%)",
        filter: "blur(8px)", pointerEvents: "none",
      }}></div>

      {/* 2-column: stats left, mini bottle right */}
      <div className="dash-hero-inner" style={{ position: "relative", display: "grid", gridTemplateColumns: "minmax(0,1fr) 130px", gap: 24, alignItems: "stretch" }}>
        <div style={{ minWidth: 0 }}>
          {/* Eyebrow + streak chip */}
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
            <Eyebrow>hydration · today</Eyebrow>
            {streak > 0 && (
              <div style={{
                display: "inline-flex", alignItems: "center", gap: 6,
                padding: "3px 10px 3px 8px", borderRadius: 999,
                background: "linear-gradient(120deg, rgba(110,19,32,0.15), rgba(28,44,90,0.15) 60%, rgba(199,154,58,0.15))",
                border: "1px solid rgba(28,44,90,0.25)",
                fontSize: 10, fontWeight: 600, letterSpacing: "0.04em",
                color: "var(--accent-cobalt)", textTransform: "uppercase",
              }}>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c1 4-3 6-3 10a3 3 0 0 0 6 0c0-2-1-3-2-4 0 1.5-1 2-2 2.5C12 8 14 6 12 2z"/></svg>
                {streak}-day streak
              </div>
            )}
          </div>

          <div style={{ display: "flex", alignItems: "baseline", flexWrap: "wrap", columnGap: 14, rowGap: 4, marginBottom: 8 }}>
            <span style={{
              position: "relative",
              fontFamily: "var(--font-display)", fontSize: "clamp(48px, 9vw, 88px)", fontWeight: 600,
              letterSpacing: "-0.04em", lineHeight: 1, color: "var(--accent-cobalt)",
              whiteSpace: "nowrap",
            }}>{formatHydrationAmount(total)}</span>
            <span style={{
              fontFamily: "var(--font-display)", fontSize: 20, fontWeight: 400,
              color: "var(--ink-faint)", letterSpacing: "-0.02em",
              whiteSpace: "nowrap",
            }}>of {formatHydrationAmount(goal)} goal</span>
          </div>
          <div style={{ fontSize: 14, color: "var(--ink-muted)", marginBottom: 18, width: "100%" }}>
            {remaining > 0
              ? `${formatHydrationAmount(remaining)} to go · ${pct}%`
              : `Goal hit — +${formatHydrationAmount(total - goal)} over`}
          </div>

          {/* progress bar — blue fill, rainbow OUTLINE, with sip dots over it */}
          <div style={{ position: "relative", height: 16, borderRadius: 999 }}>
            <div style={{
              position: "absolute", inset: 0, borderRadius: 999,
              padding: 1.5,
              background: "linear-gradient(120deg, var(--accent-oxblood) 0%, var(--accent-cobalt) 55%, var(--accent-gold) 100%)",
              WebkitMask: "linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0)",
              mask: "linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0)",
              WebkitMaskComposite: "xor", maskComposite: "exclude",
              pointerEvents: "none",
            }}></div>
            <div style={{
              position: "absolute", left: 2, top: 2, bottom: 2,
              width: `calc(${pct}% - 4px)`, borderRadius: 999,
              background: pct >= 100
                ? "linear-gradient(180deg, #4ed7a8 0%, #2cc296 50%, #19a07a 100%)"
                : "linear-gradient(180deg, var(--accent-cobalt) 0%, var(--accent-cobalt) 50%, var(--accent-oxblood) 100%)",
              boxShadow: pct >= 100
                ? "inset 0 1px 0 rgba(255,255,255,0.45), 0 0 12px rgba(44,194,150,0.5)"
                : "inset 0 1px 0 rgba(255,255,255,0.45), 0 0 12px rgba(28,44,90,0.5)",
              transition: "width 320ms cubic-bezier(0.32,0.72,0,1), background 320ms ease",
            }}></div>

          </div>

          {/* Pace nudge line removed per user request */}

          <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginTop: 18, alignItems: "center" }}>
            <GlassButton onClick={(e) => quickAdd(e, 250)}>+ 250 ml</GlassButton>
            <GlassButton onClick={(e) => quickAdd(e, 500)}>+ 500 ml</GlassButton>
            <GlassButton onClick={(e) => quickAdd(e, 1000)}>+ 1 L</GlassButton>
            <GlassButton onClick={openCustom}>
              <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round">
                  <line x1="12" y1="5" x2="12" y2="19"/>
                  <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Custom
              </span>
            </GlassButton>
            {log.length > 0 && log.some(e => !isBotEntry(e.id)) ? (
              <button
                onClick={(e) => {
                  e.stopPropagation();
                  const sorted = [...log].sort((a, b) => (b.time || "").localeCompare(a.time || ""));
                  const last = sorted[0];
                  if (last) {
                    setLog((prev) => prev.filter((x) => x.id !== last.id));
                    const entryId = parseInt(last.id, 10);
                    if (!isNaN(entryId)) apiCall("DELETE", `/api/water/entry/${entryId}`);
                  }
                }}
                style={{
                  display: "inline-flex", alignItems: "center", gap: 6,
                  padding: "10px 14px", borderRadius: 999,
                  fontFamily: "var(--font-text)", fontSize: 13, fontWeight: 500,
                  color: "var(--ink-muted)",
                  background: "transparent",
                  border: "1px solid var(--bg-hairline)",
                  cursor: "pointer",
                }}
                title="Undo last sip">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M3 7v6h6"/>
                  <path d="M3 13a9 9 0 1 0 3-7.7L3 8"/>
                </svg>
                Undo last
              </button>
            ) : (
              <button
                disabled
                onClick={(e) => e.stopPropagation()}
                style={{
                  display: "inline-flex", alignItems: "center", gap: 6,
                  padding: "10px 14px", borderRadius: 999,
                  fontFamily: "var(--font-text)", fontSize: 13, fontWeight: 500,
                  color: "var(--fg-5)",
                  background: "transparent",
                  border: "1px solid var(--bg-hairline)",
                  cursor: "not-allowed",
                }}
                title="No sips to undo">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M3 7v6h6"/>
                  <path d="M3 13a9 9 0 1 0 3-7.7L3 8"/>
                </svg>
                Undo last
              </button>
            )}
          </div>
        </div>

        {/* Mini bottle on the right */}
        <MiniBottle pct={pct} hit={pct >= 100} />
      </div>

      {/* Stat strip across bottom */}
      <div className="dash-hero-stats" style={{
        marginTop: 22, paddingTop: 18,
        borderTop: "1px solid rgba(0,0,0,0.06)",
        display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16,
      }}>
        <MiniStatHero label="Sips today" value={log.length ? `${log.length}` : "0"} accent="var(--accent-cobalt)" />

        <MiniStatHero label="7-day avg" value={formatHydrationAmount(avg)} accent="var(--accent-oxblood)" />
      </div>
    </GlassCard>
    {customOpen && (
      <AddEntryModal
        onSubmit={submitCustom}
        onCancel={() => setCustomOpen(false)}
      />
    )}
    </React.Fragment>
  );
}

    ? window.__bjjdata.injuries_active
    : null;
  const useLive = liveInjuries && liveInjuries.length > 0;

  // Map bot severity to React tile's severity vocabulary
  const sevMap = { minor: "watch", moderate: "fresh", severe: "critical", watch: "watch", fresh: "fresh", critical: "critical", managing: "managing" };
  const liveAsTileShape = useLive
    ? liveInjuries.map((inj, i) => ({
        id: `bot-injury-${i}`,
        name: inj.body_part,
        region: "torso",  // safe default for silhouette
        severity: sevMap[inj.severity] || "watch",
        notes: inj.notes,
      }))
    : null;

  const sorted = useLive ? liveAsTileShape : sortMicroInjuries(rawInjuries, pinned);

  // Decorate with x/y/color for the silhouette + row dot
  const tones = {
    critical: { bg: "rgba(196,50,79,0.10)", fg: "var(--accent-critical)", label: "critical" },
    fresh:    { bg: "rgba(224,38,74,0.08)",  fg: "var(--accent-danger-bright)", label: "fresh"    },
    watch:    { bg: "rgba(201,122,0,0.10)",  fg: "var(--accent-warn)", label: "watch"    },
    managing: { bg: "rgba(21,168,107,0.10)", fg: "var(--accent-success)", label: "managing" },
  };
  const decorated = sorted.map((inj) => {
    const region = microInjuriesRegion(inj.region);
    return {
      ...inj,
      x: region.x,
      y: region.y,
      color: microInjuriesTierColor(inj.severity),
    };
  });

  // Headline + sub derived from store
  const total = decorated.length;
  const criticalCount = decorated.filter((i) => i.severity === "critical").length;
  const freshCount = decorated.filter((i) => i.severity === "fresh").length;
  const watchCount = decorated.filter((i) => i.severity === "watch").length;
  const headline = total === 0 ? "All clear" : `${total} tracked`;
  const subParts = [];
  if (criticalCount > 0) subParts.push(`${criticalCount} critical`);
  if (freshCount > 0) subParts.push(`${freshCount} fresh`);
  if (watchCount > 0) subParts.push(`${watchCount} on watch`);
  const sub = total === 0 ? "no active injuries" : `this week · ${subParts.join(" · ") || "monitoring"}`;

  // Pick advice from the most-acute injury, else null
  const top =
    decorated.find((i) => i.severity === "critical") ||
    decorated.find((i) => i.severity === "fresh") ||
    decorated.find((i) => i.severity === "watch");
  const adviceTone = top?.severity === "critical"
    ? { bg: "rgba(196,50,79,0.07)", border: "rgba(196,50,79,0.25)", color: "#8a1f35" }
    : { bg: "rgba(201,122,0,0.07)", border: "rgba(201,122,0,0.20)", color: "#8a5500" };
  const advice = top ? `Avoid aggravating the ${microInjuriesRegion(top.region).label.toLowerCase()} for now.` : null;

  return (
    <div
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
      background: "rgba(255,252,245,0.78)", borderRadius: 20,
      border: "1px solid rgba(26,22,19,0.07)",
      cursor: onClick ? "pointer" : "default",
      boxShadow: "var(--shadow-card)",
      transition: "all 200ms cubic-bezier(0.32,0.72,0,1)",
      overflow: "hidden",
    }}>
      <div className="mi-grid" style={{ display: "grid", gridTemplateColumns: "200px 1fr", gap: 0 }}>
        <div style={{
          position: "relative",
          background: "linear-gradient(160deg, rgba(28,44,90,0.04), rgba(199,154,58,0.03))",
          padding: "18px 12px",
          borderRight: "1px solid rgba(0,0,0,0.05)",
          display: "flex", flexDirection: "column", alignItems: "center",
          overflow: "hidden",
        }}>
          {/* soft cobalt halo behind silhouette */}
          <div style={{
            position: "absolute", top: "50%", left: "50%",
            width: 220, height: 220, transform: "translate(-50%, -50%)",
            background: "radial-gradient(circle, rgba(110,19,32,0.10) 0%, rgba(28,44,90,0.06) 35%, transparent 70%)",
            pointerEvents: "none",
          }}></div>
          <div style={{ position: "relative", width: "100%", flex: 1 }}>
            <BodySilhouette injuries={decorated} />
          </div>
          {/* legend strip below silhouette */}
          <div style={{
            position: "relative",
            display: "flex", alignItems: "center", justifyContent: "center",
            gap: 10, paddingTop: 8, flexWrap: "wrap",
          }}>
            {criticalCount > 0 && <LegendDot color="var(--accent-critical)" label={`${criticalCount} critical`} />}
            {freshCount > 0    && <LegendDot color="var(--accent-danger-bright)" label={`${freshCount} fresh`} />}
            {watchCount > 0    && <LegendDot color="var(--accent-warn)" label={`${watchCount} watch`} />}
          </div>
        </div>
        <div style={{ padding: "20px 22px", display: "flex", flexDirection: "column", gap: 14 }}>
          <div>
            <div style={{
              fontFamily: "var(--font-display)", fontSize: 32, fontWeight: 600,
              letterSpacing: "-0.02em", lineHeight: 1, color: "var(--ink)",
            }}>{headline}</div>
            <div style={{ fontSize: 13, color: "var(--ink-faint)", marginTop: 8 }}>{sub}</div>
          </div>

          {/* Stat strip — 3 mini-cards */}
          {total > 0 && (
            <div className="mi-mini-stats" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
              <MiniStat label="Active" value={total} accent="var(--accent-cobalt)" />
              <MiniStat
                label="Most acute"
                value={top ? (MICRO_INJURIES_TIERS.find((t) => t.id === top.severity)?.label || top.severity) : "—"}
                accent={top ? microInjuriesTierColor(top.severity) : "#1c2c5a"}
              />
              <MiniStat
                label="Region"
                value={top ? microInjuriesRegion(top.region).label : "—"}
                accent="var(--accent-gold)"
              />
            </div>
          )}

          {advice && (
            <div style={{
              padding: "11px 14px",
              background: adviceTone.bg,
              border: `1px solid ${adviceTone.border}`,
              borderRadius: 12,
              fontSize: 13, color: adviceTone.color, lineHeight: 1.5,

              <span>{advice}</span>

        </div>
      </div>
      <div style={{ borderTop: "1px solid rgba(0,0,0,0.05)" }}>
        {decorated.length === 0 && (

    </div>
  );
}

function useCountUp(target, duration) {
  duration = duration || 1200;
  const ref = React.useRef(0);
  const [value, setValue] = React.useState(0);
  React.useEffect(() => {
    if (!target && target !== 0) { setValue(0); return; }
    const from = ref.current;
    const startTime = performance.now();
    const step = (now) => {
      const progress = Math.min((now - startTime) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      const current = Math.round(from + (target - from) * eased);
      setValue(current);
      if (progress < 1) requestAnimationFrame(step);
      else ref.current = target;
    };
    requestAnimationFrame(step);
  }, [target]);
  return value;
}

function ProgressRing({ radius, stroke, progress, color }) {
  const normalizedRadius = radius - stroke;
  const circumference = normalizedRadius * 2 * Math.PI;
  const offset = circumference - (Math.min(progress, 100) / 100) * circumference;
  return (
    <svg width={radius * 2} height={radius * 2} style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -55%)" }}>
      <circle className="ed-ring-track" cx={radius} cy={radius} r={normalizedRadius} strokeWidth={stroke} />
      <circle className="ed-ring-fill" cx={radius} cy={radius} r={normalizedRadius} strokeWidth={stroke} stroke={color}
        strokeDasharray={circumference + " " + circumference}
        strokeDashoffset={offset}
        style={{ transform: "rotate(-90deg)", transformOrigin: "50% 50%" }} />
    </svg>
  );
}

function Dashboard({ onOpenLessons, onOpenSchedule, onOpenMeals, onOpenProblems, onOpenHydration, onOpenMicroInjuries, onOpenAllergies, onOpenTechniqueLibrary, onOpenEditor }) {
  const d = window.__bjjdata || {};
  const botError = d && d.error;
  const waterGoal = typeof d.water_goal === "number" ? d.water_goal : 3;
  const waterToday = typeof d.water_today === "number" ? d.water_today : 0;
  const waterPct = Math.max(0, Math.min(100, Math.round((waterToday / Math.max(0.1, waterGoal)) * 100)));
  const calorieGoal = typeof d.calorie_goal === "number" ? d.calorie_goal : 2800;
  const calorieToday = typeof d.calorie_today === "number" ? d.calorie_today : 0;
  const caloriePct = Math.max(0, Math.min(100, Math.round((calorieToday / Math.max(1, calorieGoal)) * 100)));
  const todaySchedule = Array.isArray(d.today_schedule) ? d.today_schedule : [];
  const journalEntries = Array.isArray(d.journal) ? d.journal : [];
  const todayDateKey = new Date().toLocaleDateString("en-CA", { timeZone: "America/New_York" });
  const todayJournal = journalEntries.filter((entry) => entry && entry.date === todayDateKey);
  const completedSessions = todayJournal.filter((entry) => {
    const text = `${entry.session || ""} ${entry.notes || ""}`.toLowerCase();
    return !/(skip|skipp|missed|left early|left-early|couldn't|could not)/.test(text);
  }).length;
  const totalSessionsToday = todaySchedule.length;
  const sessionProgressPct = totalSessionsToday > 0
    ? Math.max(0, Math.min(100, Math.round((completedSessions / totalSessionsToday) * 100)))
    : 100;
  const injuries = Array.isArray(d.injuries_active) ? d.injuries_active : [];
  const allInjuries = Array.isArray(d.all_injuries) ? d.all_injuries : injuries;
  const allergies = Array.isArray(d.allergies) ? d.allergies : [];
  const allergyStats = d.allergy_stats || {};
  const injuryStats = d.injury_stats || {};
  const criticalInjuries = injuries.filter((inj) => ["severe", "critical"].includes(String(inj.severity || "").toLowerCase())).length;
  const moderateInjuries = injuries.filter((inj) => ["moderate", "fresh", "managing"].includes(String(inj.severity || "").toLowerCase())).length;
  const readiness = criticalInjuries > 0
    ? { label: "Modify training", tone: "var(--accent-danger)", meta: `${criticalInjuries} high-risk item${criticalInjuries === 1 ? "" : "s"} active` }
    : moderateInjuries > 0
      ? { label: "Train smart", tone: "var(--accent-warn)", meta: `${moderateInjuries} item${moderateInjuries === 1 ? "" : "s"} need attention` }
      : { label: "Clear to build", tone: "var(--accent-success)", meta: "No major blockers logged" };
  const next = d.next_up || "Nothing else for today.";

function renderContent(text) {
  // Process triple-backtick code blocks first
  let html = '';
  const parts = text.split(/(```[\s\S]*?```)/g);
  parts.forEach((part) => {
    if (part.startsWith('```') && part.endsWith('```')) {
      const inner = part.slice(3, -3);
      // Strip optional language identifier on first line
      const newlineIdx = inner.indexOf('\n');
      const code = newlineIdx !== -1 ? inner.slice(newlineIdx + 1) : inner;
      const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const id = 'cb_' + Math.random().toString(36).slice(2);
      html += `<div style="position:relative;margin:8px 0;">` +
        `<pre id="${id}" style="background:var(--bg-parchment);padding:12px;border-radius:8px;font-family:var(--font-mono);font-size:13px;overflow-x:auto;white-space:pre-wrap;margin:0;">${escaped}</pre>` +
        `<button onclick="(function(){var el=document.getElementById('${id}');navigator.clipboard.writeText(el.innerText);})()" ` +
          `style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.07);border:none;border-radius:5px;padding:3px 8px;font-size:11px;cursor:pointer;color:var(--stripe-faint);font-family:var(--font-mono);">Copy</button>` +
        `</div>`;
    } else {
      // Escape HTML first to prevent XSS
      let s = part.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      // Inline backticks
      s = s.replace(/`([^`]+)`/g, (_, c) => {
        return `<code style="background:var(--bg-parchment);padding:2px 5px;border-radius:4px;font-family:var(--font-mono);font-size:13px;">${c}</code>`;
      });
      // Bold
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      // Newlines
      s = s.replace(/\n/g, '<br/>');
      html += s;
    }
  });
  return html;
}

          }

}

function Editor() {
  const [focused, setFocused] = useStateEd(false);
  const [value, setValue] = useStateEd("");
  const [messages, setMessages] = useStateEd([]);
  const [loading, setLoading] = useStateEd(false);
  const messagesEndRef = useRefEd(null);
  // Feature 2: track deploy-done state per message index
  const [deployDoneMap, setDeployDoneMap] = useStateEd({});
  const deployTimers = useRefEd({});
  // Feature 3: voice input
  const [listening, setListening] = useStateEd(false);
  // Feature 4: session title (first 40 chars of first user message sent this session)
  const [sessionTitle, setSessionTitle] = useStateEd(null);
  const hasSetTitle = useRefEd(false);

  useEffectEd(() => {
    fetch("/editor/history")
      .then(r => r.json())
      .then(data => {
        if (data.messages && data.messages.length > 0) {
          setMessages(data.messages.map(m => ({
            role: m.role === "assistant" ? "claude" : m.role,
            body: m.content,
            toolEvents: [],
          })));
          setTimeout(() => {
            if (messagesEndRef.current) messagesEndRef.current.scrollIntoView({ behavior: "smooth" });
          }, 150);
        }
      })
      .catch(() => {});
  }, []);

  // Feature 2: when messages change, set up deploy timers for any new write_file messages
  useEffectEd(() => {
    messages.forEach((m, i) => {
      if (
        m.role === "claude" &&
        m.toolEvents && m.toolEvents.some(e => e.tool === "write_file") &&
        deployDoneMap[i] === undefined &&
        !deployTimers.current[i]
      ) {
        deployTimers.current[i] = setTimeout(() => {
          setDeployDoneMap(prev => ({ ...prev, [i]: true }));
        }, 62000);
        setDeployDoneMap(prev => ({ ...prev, [i]: false }));
      }
    });
  }, [messages]);

  const handleSend = async (overrideText) => {
    const text = (typeof overrideText === "string" ? overrideText : value).trim();
    if (!text) return;
    // Feature 4: set session title from first user message sent this session
    if (!hasSetTitle.current) {
      setSessionTitle(text.slice(0, 40));
      hasSetTitle.current = true;
    }
    setMessages(prev => [...prev, { role: "user", body: text }]);
    setValue("");
    setLoading(true);
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 120000); // 2 min timeout
    try {
      const res = await fetch("/editor/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
        signal: controller.signal,
      });
      clearTimeout(timeoutId);
      const data = await res.json();
      const reply = data.reply || data;
      const toolEvents = data.tool_events || [];
      setMessages(prev => [...prev, {
        role: "claude",
        body: typeof reply === "string" ? reply : (reply.reply || String(reply)),
        toolEvents: toolEvents,
      }]);
      setTimeout(() => {
        if (messagesEndRef.current) messagesEndRef.current.scrollIntoView({ behavior: "smooth" });
      }, 100);
    } catch (e) {
      clearTimeout(timeoutId);
      const msg = e.name === "AbortError" ? "Request timed out — Claude took too long. Try a simpler request." : "Failed to reach server.";
      setMessages(prev => [...prev, { role: "claude", body: msg }]);
    } finally {
      setLoading(false);
    }
  };

  const clearHistory = async () => {
    await fetch("/editor/clear", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
    });
    setMessages([]);
    setDeployDoneMap({});
    deployTimers.current = {};
    setSessionTitle(null);
    hasSetTitle.current = false;
  };

  // Feature 3: voice input handler
  const handleVoice = () => {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      setMessages(prev => [...prev, { role: "claude", body: "Voice input isn't supported in this browser. Try Chrome or Safari." }]);
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      setValue(prev => prev + (prev ? ' ' : '') + transcript);
    };
    recognition.start();
    setListening(true);
    recognition.onend = () => setListening(false);
    recognition.onerror = () => setListening(false);
  };

  const onSend = handleSend;
  // Feature 1: always show quick actions (especially important on mobile where
  // the keyboard hides the empty state before the user can see chips)
  const showQuickActions = true;

  return (
    <div style={{
      paddingTop: "calc(88px + env(safe-area-inset-top, 0px))",
      paddingBottom: "calc(40px + env(safe-area-inset-bottom, 0px))",
      paddingLeft: "clamp(16px, 4vw, 24px)",
      paddingRight: "clamp(16px, 4vw, 24px)",
      minHeight: "100vh", boxSizing: "border-box",
      display: "flex", flexDirection: "column",
    }}>
      <div style={{ maxWidth: 760, margin: "0 auto", width: "100%", flex: 1, display: "flex", flexDirection: "column" }}>
        {/* Compact editor header */}
        <div style={{ marginBottom: 20, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0 }}>
            <SparkleLogo size={22} />
            <span style={{
              fontFamily: "var(--font-display)",
              fontSize: 18, fontWeight: 600,
              letterSpacing: "-0.02em",
              color: "var(--ink)",
            }}>{sessionTitle ? `"${sessionTitle}${sessionTitle.length >= 40 ? "…" : ""}"` : "Editor"}</span>
          </div>
          {messages.length > 0 && (
            <button onClick={clearHistory} style={{
              background: "none", border: "1px solid var(--stripe-line)", borderRadius: 8,
              padding: "6px 14px", fontSize: 12, fontFamily: "var(--font-text)", fontWeight: 500,
              color: "var(--stripe-faint)", cursor: "pointer", letterSpacing: "0.02em",
              transition: "all 0.15s ease",
            }}>Clear</button>
          )}
        </div>

        <div style={{ flex: 1, marginBottom: 24, minHeight: 360 }}>
          {messages.length === 0 ? (
            <div style={{
              height: "100%", minHeight: 360,
              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
              gap: 16,
            }}>
              <SparkleLogo size={48} glow />
              <div style={{
                fontFamily: "var(--font-display)", fontSize: 20, fontWeight: 600,
                letterSpacing: "-0.02em", color: "var(--ink)",
              }}>What's on your mind?</div>
              <div style={{
                fontFamily: "var(--font-text)", fontSize: 14,
                color: "var(--stripe-faint)", maxWidth: 340, textAlign: "center",
                lineHeight: 1.5,
              }}>Ask about your schedule, log injuries, review training notes, or chat about anything.</div>
            </div>
          ) : (
            <>
              {messages.map((m, i) => (
                <ChatMessage
                  key={i}
                  role={m.role}
                  body={m.body}
                  toolEvents={m.toolEvents}
                  deployDone={deployDoneMap[i]}
                />
              ))}
              {loading && <ChatMessage role="claude" body="" loading={true} />}
              <div ref={messagesEndRef} />
            </>
          )}
        </div>

        {/* Feature 1: Quick action chips — always visible, scrollable on mobile */}
        {showQuickActions && (
          <div
            className="editor-chips"
            style={{
              display: "flex", gap: 8, overflowX: "auto", paddingBottom: 10,
              scrollbarWidth: "none", WebkitOverflowScrolling: "touch",
              scrollSnapType: "x proximity",
              WebkitOverflowScrolling: "touch",
            }}
          >
            <style>{`
              .editor-chips::-webkit-scrollbar { display: none; }
              .editor-chips { -ms-overflow-style: none; scrollbar-width: none; }
              .quick-chip:hover { background: var(--stripe-card) !important; border-color: var(--stripe-blue) !important; }
            `}</style>
            {QUICK_ACTIONS.map((action) => (
              <button
                key={action}
                className="quick-chip"
                onClick={() => handleSend(action)}
                style={{
                  flexShrink: 0,
                  scrollSnapAlign: "start",
                  padding: "9px 16px",
                  minHeight: 36,
                  borderRadius: 999,
                  background: "var(--stripe-card)",
                  border: "1px solid var(--stripe-line)",
                  fontSize: 14,
                  color: "var(--stripe-blue)",
                  letterSpacing: "-0.01em",
                  cursor: "pointer",
                  fontFamily: "var(--font-text)",
                  whiteSpace: "nowrap",
                  transition: "background 0.15s ease, border-color 0.15s ease",
                  WebkitTapHighlightColor: "transparent",
                  touchAction: "manipulation",
                }}
              >{action}</button>
            ))}
          </div>
        )}

        <Composer
          focused={focused}
          setFocused={setFocused}
          value={value}
          setValue={setValue}
          onSend={onSend}
          listening={listening}
          onVoice={handleVoice}
        />
        <div style={{ fontSize: 12, color: "var(--stripe-faint)", textAlign: "center", marginTop: 12 }}>
          Enter to send · Shift + Enter for a new line
        </div>
      </div>
    </div>
  );
}

window.Editor = Editor;

</script>
  <script type="text/babel">
// Bruno Private Lessons — list of all lessons + detail drill-down
// Reads/writes shared brunoStore. Pin (star), edit (pencil), delete (trash),
// and add via floating + button. Tap a row to open detail modal.

const { useState: useStateBL } = React;

function BrunoLessons({ onBack, onOpenDetail }) {
  const { lessons, pinned, setLessons, setPinned } = useBrunoStore();
  const [confirmId, setConfirmId] = useStateBL(null);
  const [adding, setAdding] = useStateBL(false);
  const [editingId, setEditingId] = useStateBL(null);
  const [sortMode, setSortMode] = useStateBL(() => {
    try { return localStorage.getItem("bruno_sort") || "newest"; } catch { return "newest"; }
  });
  const updateSort = (m) => {
    setSortMode(m);
    try { localStorage.setItem("bruno_sort", m); } catch {}
  };

  const togglePin = (id) => {
    setPinned((prev) => prev.includes(id) ? prev.filter((x) => x !== id) : [id, ...prev]);
  };
  const deleteLesson = (id) => {
    setLessons((prev) => prev.filter((l) => l.id !== id));
    setPinned((prev) => prev.filter((x) => x !== id));
    setConfirmId(null);
  };
  const addLesson = (data) => {
    const id = "L-" + Date.now().toString(36);
    // newest first → unshift
    setLessons((prev) => [{ ...data, id }, ...prev]);
    setAdding(false);
  };
  const updateLesson = (id, data) => {
    setLessons((prev) => prev.map((l) => l.id === id ? { ...l, ...data } : l));
    setEditingId(null);
  };

  const sorted = sortBrunoLessons(lessons, pinned, sortMode);
  const confirmLesson = lessons.find((l) => l.id === confirmId);
  const editingLesson = lessons.find((l) => l.id === editingId);

  return (
    <div style={{ paddingTop: 100, paddingBottom: 120, paddingLeft: "clamp(16px, 4vw, 24px)", paddingRight: "clamp(16px, 4vw, 24px)" }}>
      <div style={{ maxWidth: 880, margin: "0 auto" }}>
        {/* Back */}
        <button
          onClick={onBack}
          className="stripe-cta secondary"
          style={{ marginBottom: 18 }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Back
        </button>

        {/* Compact header */}
        <div style={{ marginBottom: 28, display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 12 }}>
          <div>
            <div style={{
              fontFamily: "Inter, var(--font-display)", fontSize: 22, fontWeight: 700,
              letterSpacing: "-0.04em", color: "var(--stripe-ink)",
            }}>Bruno Lessons</div>
            <div style={{
              fontFamily: "Inter, var(--font-text)", fontSize: 14,
              color: "var(--stripe-faint)", marginTop: 4,
            }}>{lessons.length} lesson{lessons.length !== 1 ? "s" : ""} logged</div>
          </div>
        </div>

        {/* Sort */}
        <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 14 }}>
          <SortMenu value={sortMode} onChange={updateSort} options={BRUNO_SORT_OPTIONS} />
        </div>

        {/* List */}
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {sorted.map((l) => (
            <LessonRow
              key={l.id}
              lesson={l}
              isPinned={pinned.includes(l.id)}
              onClick={() => onOpenDetail(l.id)}
              onTogglePin={() => togglePin(l.id)}
              onRequestEdit={() => setEditingId(l.id)}
              onRequestDelete={() => setConfirmId(l.id)}
            />
          ))}
        </div>

        {sorted.length === 0 && (
          <div style={{
            textAlign: "center", padding: "48px 24px",
            fontSize: 15, color: "var(--stripe-faint)",
          }}>
            No lessons yet. Tap + to add one.
          </div>
        )}
      </div>

      {/* Floating + button — transparent fill, rainbow border */}
      <button
        onClick={() => setAdding(true)}
        aria-label="Add lesson"
        style={{
          position: "fixed", bottom: "calc(32px + env(safe-area-inset-bottom, 0px))", right: 32, zIndex: 50,
          width: 56, height: 56, borderRadius: "50%",
          background: "var(--stripe-card)",
          border: "1px solid var(--stripe-line)", padding: 0, cursor: "pointer",
          color: "var(--stripe-blue)",
          boxShadow: "var(--shadow-pop)",
          display: "flex", alignItems: "center", justifyContent: "center",
          transition: "transform 160ms cubic-bezier(0.32,0.72,0,1)",
        }}
        onMouseEnter={(e) => { e.currentTarget.style.transform = "scale(1.06)"; }}
        onMouseLeave={(e) => { e.currentTarget.style.transform = "scale(1)"; }}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" style={{ position: "relative" }}>
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>

      {/* Add modal */}
      {adding && (
        <LessonFormModal
          mode="add"
          onCancel={() => setAdding(false)}
          onSubmit={(data) => addLesson(data)}
        />
      )}

      {/* Edit modal */}
      {editingLesson && (
        <LessonFormModal
          mode="edit"
          initial={editingLesson}
          onCancel={() => setEditingId(null)}
          onSubmit={(data) => updateLesson(editingLesson.id, data)}
        />
      )}

      {/* Confirm-delete modal */}
      {confirmLesson && (
        <DeleteLessonConfirm
          lesson={confirmLesson}
          onCancel={() => setConfirmId(null)}
          onConfirm={() => deleteLesson(confirmLesson.id)}
        />
      )}
    </div>
  );
}

// =====================================================
// Add / Edit modal
// =====================================================
function LessonFormModal({ mode, initial, onCancel, onSubmit }) {
  const [week, setWeek] = useStateBL(initial?.week ?? "");
  const [date, setDate] = useStateBL(initial?.date ?? "");
  const [summary, setSummary] = useStateBL(initial?.summary ?? "");
  const [description, setDescription] = useStateBL(initial?.description ?? "");
  const [notesText, setNotesText] = useStateBL(
    initial ? (initial.notes || []).join("\n") : ""
  );
  const trapRef = useModalTrap(true, onCancel);

  const submit = () => {
    if (!summary.trim()) return;
    const notes = notesText.split("\n").map((n) => n.trim()).filter(Boolean);
    onSubmit({
      week: week.trim() || "—",
      date: date.trim() || "—",
      summary: summary.trim(),
      description: description.trim(),
      notes,
    });
  };

  return (
    <div
      role="dialog"
      aria-modal="true"
      ref={trapRef}
      onClick={onCancel}
      style={{
        position: "fixed", inset: 0, zIndex: 100,
        background: "rgba(20,20,30,0.32)", backdropFilter: "blur(6px)",
        display: "flex", alignItems: "center", justifyContent: "center", padding: 24,
        animation: "blFadeIn 160ms ease both",
      }}>
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: "100%", maxWidth: 520, maxHeight: "calc(100dvh - 48px)",
          overflowY: "auto",
          background: "var(--stripe-card)", borderRadius: 20, padding: 28,
          border: "1px solid var(--stripe-line)",
          boxShadow: "0 24px 64px -16px rgba(20,20,40,0.22), 0 1px 0 rgba(255,255,255,0.6) inset",
          animation: "blPopIn 220ms cubic-bezier(0.32,0.72,0,1) both",
        }}>
        <div style={{
          fontFamily: "Inter, var(--font-display)", fontSize: 22, fontWeight: 900,
          letterSpacing: "-0.05em", color: "var(--stripe-ink)", marginBottom: 6,
        }}>{mode === "edit" ? "Edit lesson" : "Add a lesson"}</div>
        <div style={{ fontSize: 14, color: "var(--stripe-faint)", marginBottom: 18 }}>
          {mode === "edit" ? "Update any field below." : "Capture today's session with Bruno."}
        </div>

        {/* Week + Date row */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
          <FormField label="Week">
            <input
              value={week}
              onChange={(e) => setWeek(e.target.value)}
              placeholder="Week 15"
              style={inputStyle}
            />
          </FormField>
          <FormField label="Date">
            <input
              value={date}
              onChange={(e) => setDate(e.target.value)}
              placeholder="Tue, Apr 29"
              style={inputStyle}
            />
          </FormField>
        </div>

        {/* Summary */}
        <FormField label="Headline" style={{ marginBottom: 12 }}>
          <input
            autoFocus
            value={summary}
            onChange={(e) => setSummary(e.target.value)}
            placeholder="e.g. Collar drag re-grip clicked"
            style={inputStyle}
          />
        </FormField>

        {/* Description */}
        <FormField label="One-liner" style={{ marginBottom: 12 }}>
          <textarea
            value={description}
            onChange={(e) => setDescription(e.target.value)}
            placeholder="The big takeaway in a sentence or two."
            rows={3}
            style={{ ...inputStyle, resize: "vertical", minHeight: 70, lineHeight: 1.5 }}
          />
        </FormField>

        {/* Notes — line-per-bullet */}
        <FormField
          label="Full notes"
          hint="One line per bullet. Wrap text in **double-asterisks** to bold it."
          style={{ marginBottom: 22 }}>
          <textarea
            value={notesText}
            onChange={(e) => setNotesText(e.target.value)}
            placeholder={"**Set-up.** What grip did you start with?\n**Key insight.** What clicked?\n**Drilled:** rounds × time"}
            rows={7}
            style={{ ...inputStyle, resize: "vertical", minHeight: 130, lineHeight: 1.5, fontFamily: "var(--font-text)" }}
          />
        </FormField>

        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button onClick={onCancel} className="stripe-cta secondary">Cancel</button>
          {summary.trim() ? (
            <button onClick={submit} className="stripe-cta primary">{mode === "edit" ? "Save" : "Add lesson"}</button>
          ) : (
            <button disabled className="stripe-cta primary" style={{ opacity: 0.4, cursor: "not-allowed" }}>{mode === "edit" ? "Save" : "Add lesson"}</button>
          )}
        </div>
      </div>
      <style>{`
        @keyframes blFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes blPopIn  { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
      `}</style>
    </div>
  );
}

const inputStyle = {
  width: "100%", padding: "11px 14px", fontSize: 16,
  border: "1px solid var(--stripe-line)", borderRadius: 8,
  outline: "none", fontFamily: "Inter, var(--font-text)", boxSizing: "border-box",
  color: "var(--stripe-ink)",
  background: "var(--stripe-card)",
};

function FormField({ label, hint, children, style = {} }) {
  return (
    <div style={style}>
      <div style={{
        fontFamily: "Inter, var(--font-text)", fontSize: 12, fontWeight: 700,
        letterSpacing: "0.04em", textTransform: "uppercase",
        color: "var(--stripe-faint)", marginBottom: 6,
      }}>{label}</div>
      {children}
      {hint && (
        <div style={{ fontSize: 12, color: "var(--stripe-faint)", marginTop: 6, lineHeight: 1.4 }}>
          {hint}
        </div>
      )}
    </div>
  );
}

// =====================================================
// Delete confirm
// =====================================================
function DeleteLessonConfirm({ lesson, onCancel, onConfirm }) {
  const trapRef = useModalTrap(true, onCancel);
  return (
    <div
      role="dialog"
      aria-modal="true"
      ref={trapRef}
      onClick={onCancel}
      style={{
        position: "fixed", inset: 0, zIndex: 110,
        background: "rgba(20,20,30,0.42)",
        backdropFilter: "blur(8px)", WebkitBackdropFilter: "blur(8px)",
        display: "flex", alignItems: "center", justifyContent: "center",
        padding: 24,
        animation: "blFadeIn 160ms ease both",
      }}>
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: 420, maxWidth: "100%",
          background: "var(--stripe-card)",
          borderRadius: 20,
          padding: "28px 28px 22px",
          border: "1px solid var(--stripe-line)",
          boxShadow: "0 24px 64px -16px rgba(20,20,40,0.22), 0 1px 0 rgba(255,255,255,0.6) inset",
          animation: "blPopIn 220ms cubic-bezier(0.32,0.72,0,1) both",
        }}>
        <div style={{
          width: 48, height: 48, borderRadius: "50%",
          background: "rgba(224,38,74,0.10)",
          display: "flex", alignItems: "center", justifyContent: "center",
          marginBottom: 16,
          color: "var(--accent-danger-bright)",
        }}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            <line x1="10" y1="11" x2="10" y2="17"/>
            <line x1="14" y1="11" x2="14" y2="17"/>
          </svg>
        </div>

        <div style={{
          fontFamily: "Inter, var(--font-display)", fontSize: 22, fontWeight: 900,
          letterSpacing: "-0.05em", color: "var(--stripe-ink)", lineHeight: 1.2,
          marginBottom: 8,
        }}>Delete this lesson note?</div>
        <div style={{ fontSize: 15, color: "var(--stripe-faint)", lineHeight: 1.5, marginBottom: 20 }}>
          <strong style={{ color: "var(--stripe-ink)", fontWeight: 700 }}>{lesson.week} — {lesson.summary}</strong> will be removed from your log. This can't be undone.
        </div>

        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button onClick={onCancel} className="stripe-cta secondary">Cancel</button>
          <button onClick={onConfirm} className="stripe-cta primary" style={{ background: "var(--stripe-pink)", boxShadow: "0 4px 12px -3px rgba(255,92,154,0.40)" }}>Delete</button>
        </div>
      </div>
    </div>
  );
}

// =====================================================
// Lesson row — pinned-rainbow border, hover star/pencil/trash
// =====================================================
function LessonRow({ lesson, isPinned, onClick, onTogglePin, onRequestEdit, onRequestDelete }) {
  const [hover, setHover] = useStateBL(false);
  const [trashHover, setTrashHover] = useStateBL(false);
  const [editHover, setEditHover] = useStateBL(false);
  const showStar = hover || isPinned;
  const showActions = hover;

  return (
    <div
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        position: "relative",
        cursor: "pointer",
        borderRadius: 20,
        padding: isPinned ? 1.5 : 0,
        background: isPinned
          ? "var(--ai-gradient)"
          : "transparent",
        boxShadow: hover ? "var(--shadow-pop)" : "var(--shadow-card)",
        transform: hover ? "translateY(-1px)" : "translateY(0)",
        transition: "all 200ms cubic-bezier(0.32,0.72,0,1)",
      }}>
      <div style={{
        background: "var(--stripe-card)",
        borderRadius: isPinned ? 18.5 : 20,
        padding: "22px 24px",
        border: isPinned ? "none" : "1px solid var(--stripe-line)",
        display: "flex", alignItems: "flex-start", gap: 16,
        position: "relative",
      }}>
        {/* Date column */}
        <div style={{ flexShrink: 0, paddingTop: 2, minWidth: 88 }}>
          <div style={{
            fontFamily: "Inter, var(--font-display)", fontSize: 15, fontWeight: 600,
            letterSpacing: "-0.02em", color: "var(--stripe-ink)",
          }}>{lesson.week}</div>
          <div style={{ fontSize: 13, color: "var(--stripe-faint)", marginTop: 2 }}>{lesson.date}</div>
        </div>

        {/* Body column */}
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{
            display: "flex", alignItems: "center", gap: 10, marginBottom: 6, flexWrap: "wrap",
          }}>
            <div style={{
              fontFamily: "Inter, var(--font-display)", fontSize: 20, fontWeight: 600,
              letterSpacing: "-0.02em", color: "var(--stripe-ink)", lineHeight: 1.3,
            }}>{lesson.summary}</div>
            {isPinned && (
              <span className="stripe-pill" style={{
                fontSize: 11, fontWeight: 600, letterSpacing: "0.04em",
                textTransform: "uppercase",
              }}>pinned</span>
            )}
          </div>
          <div style={{ fontSize: 15, color: "var(--stripe-faint)", lineHeight: 1.5 }}>
            {lesson.description}
          </div>
        </div>

}

// =====================================================
// Lesson detail page — full notes for one lesson
// =====================================================
function BrunoLessonDetail({ lessonId, onBack }) {
  const { lessons, pinned, setLessons, setPinned } = useBrunoStore();
  const lesson = lessons.find((l) => l.id === lessonId);
  const [editing, setEditing] = useStateBL(false);
  const [confirming, setConfirming] = useStateBL(false);
  const isPinned = pinned.includes(lesson?.id);

  const togglePin = () => setPinned((prev) =>
    prev.includes(lesson.id) ? prev.filter((x) => x !== lesson.id) : [lesson.id, ...prev]
  );
  const updateLesson = (data) => {
    setLessons((prev) => prev.map((l) => l.id === lesson.id ? { ...l, ...data } : l));
    setEditing(false);
  };
  const deleteLesson = () => {
    setLessons((prev) => prev.filter((l) => l.id !== lesson.id));
    setPinned((prev) => prev.filter((x) => x !== lesson.id));
    onBack();
  };

  if (!lesson) {
    return (
      <div style={{ paddingTop: 100, paddingLeft: "clamp(16px, 4vw, 24px)", paddingRight: "clamp(16px, 4vw, 24px)", textAlign: "center" }}>

            onClick={onBack}
            className="stripe-cta secondary">

              <path d="M19 12H5M12 19l-7-7 7-7"/>

          {/* Star · Pencil · Trash */}
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <button

                cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                color: isPinned ? "var(--stripe-cyan)" : "var(--stripe-faint)",
                transition: "all 160ms ease",
              }}>
              <svg width="20" height="20" viewBox="0 0 24 24"
                   fill={isPinned ? "currentColor" : "none"}
                   stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
            </button>
            <button
              onClick={() => setEditing(true)}
              aria-label="Edit lesson"
              style={{
                width: 40, height: 40, borderRadius: "50%", border: "none",
                background: "transparent",
                cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                color: "var(--stripe-faint)",
                transition: "all 160ms ease",
              }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>
            </button>
            <button
              onClick={() => setConfirming(true)}
              aria-label="Delete lesson"
              style={{
                width: 40, height: 40, borderRadius: "50%", border: "none",
                background: "transparent",
                cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                color: "var(--stripe-pink)",
                transition: "all 160ms ease",
              }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                <line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
              </svg>
            </button>
          </div>
        </div>

        {/* Header */}
        <div style={{ marginBottom: 32, paddingLeft: 4 }}>
          <Eyebrow style={{ marginBottom: 10 }}>{lesson.week} · {lesson.date}</Eyebrow>
          <div style={{
            fontFamily: "Inter, var(--font-display)", fontSize: "clamp(26px, 5vw, 36px)", fontWeight: 900,
            letterSpacing: "-0.05em", color: "var(--stripe-ink)", lineHeight: 1.2,
            marginBottom: 14,
          }}>{lesson.summary}</div>
          <div style={{ fontSize: 16, color: "var(--stripe-faint)", lineHeight: 1.5, maxWidth: 600 }}>
            {lesson.description}
          </div>
        </div>

        {/* Notes card */}
        <div style={{
          background: "var(--stripe-card)",
          borderRadius: 20,
          padding: "28px 32px",
          border: "1px solid var(--stripe-line)",
          boxShadow: "var(--stripe-shadow)",
        }}>
          <Eyebrow style={{ marginBottom: 18 }}>full notes</Eyebrow>
          {lesson.notes && lesson.notes.length > 0 ? (
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {lesson.notes.map((n, i) => (
                <div key={i} style={{
                  fontSize: 15, lineHeight: 1.6,
                  color: "var(--stripe-ink)", letterSpacing: "-0.01em",
                }}>{renderInline(n)}</div>
              ))}
            </div>
          ) : (
            <div style={{ fontSize: 15, color: "var(--stripe-faint)", fontStyle: "normal" }}>
              No detailed notes yet — tap edit to add some.
            </div>
          )}
        </div>
      </div>

      {editing && (
        <LessonFormModal
          mode="edit"
          initial={lesson}
          onCancel={() => setEditing(false)}
          onSubmit={updateLesson}
        />
      )}
      {confirming && (
        <DeleteLessonConfirm
          lesson={lesson}
          onCancel={() => setConfirming(false)}
          onConfirm={deleteLesson}
        />
      )}
    </div>
  );
}

window.BrunoLessons = BrunoLessons;
window.BrunoLessonDetail = BrunoLessonDetail;
window.LessonFormModal = LessonFormModal;
window.DeleteLessonConfirm = DeleteLessonConfirm;
