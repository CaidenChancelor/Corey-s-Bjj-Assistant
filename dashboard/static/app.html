  <script type="text/babel">
// Today's Schedule — full day timeline with current-time indicator

const { useState: useStateSched, useEffect: useEffectSched } = React;

const TODAY_SCHEDULE = (
  window.__bjjdata && Array.isArray(window.__bjjdata.today_schedule) && window.__bjjdata.today_schedule.length > 0
    ? window.__bjjdata.today_schedule
    : []
);

const KIND_DOT = {
  training: "linear-gradient(135deg, var(--stripe-pink), var(--stripe-blue), var(--stripe-cyan))",
  work:     "var(--stripe-blue)",
  wellness: "var(--stripe-mint)",
};

function useNow() {
  const [now, setNow] = useStateSched(new Date());
  useEffectSched(() => {
    const id = setInterval(() => setNow(new Date()), 30 * 1000);
    return () => clearInterval(id);
  }, []);
  return now;
}

function fmtTime(d) {
  let h = d.getHours();
  const m = d.getMinutes();
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12; if (h === 0) h = 12;
  return `${h}:${m.toString().padStart(2, "0")} ${ampm}`;
}

function fmtDate(d) {
  return d.toLocaleDateString(undefined, {
    weekday: "long", month: "long", day: "numeric",
  });
}

// Convert "19:00" → minutes since midnight
function toMins(t) { const [h, m] = t.split(":").map(Number); return h * 60 + m; }

function Schedule({ onBack }) {
  const now = useNow();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const nextIdx = TODAY_SCHEDULE.findIndex((s) => toMins(s.time) > nowMins);

  return (
    <div style={{
      paddingTop: "calc(88px + env(safe-area-inset-top, 0px))",
      paddingBottom: "calc(80px + env(safe-area-inset-bottom, 0px))",
      paddingLeft: "clamp(16px, 4vw, 24px)",
      paddingRight: "clamp(16px, 4vw, 24px)",
    }}>
      <div style={{ maxWidth: 720, margin: "0 auto" }}>
        {/* Back */}
        <button
          onClick={onBack}
          className="stripe-cta secondary"
          style={{ marginBottom: 18 }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Back
        </button>

        {/* Compact header */}
        <div style={{ marginBottom: 28, display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 12 }}>
          <div>
            <div style={{
              fontFamily: "Inter, var(--font-display)", fontSize: 22, fontWeight: 900,
              letterSpacing: "-0.05em", color: "var(--stripe-ink)",
            }}>Schedule</div>
            <div style={{
              fontFamily: "Inter, var(--font-text)", fontSize: 14,
              color: "var(--stripe-faint)", marginTop: 4, lineHeight: 1.4,
            }}>
              {nextIdx === -1
                ? "Done for today."
                : <>Next: <span style={{ color: "var(--stripe-ink)", fontWeight: 500 }}>{TODAY_SCHEDULE[nextIdx].label}</span> at {TODAY_SCHEDULE[nextIdx].time}</>}
            </div>
          </div>
          <div style={{
            fontFamily: "var(--font-mono)", fontSize: 13,
            color: "var(--stripe-faint)", fontVariantNumeric: "tabular-nums",
          }}>{fmtTime(now)}</div>
        </div>

        {/* Schedule list */}
        <div style={{
          background: "var(--stripe-card)",
          borderRadius: 20,
          padding: "10px 8px",
          border: "1px solid var(--stripe-line)",
          boxShadow: "var(--stripe-shadow)",
        }}>
          {TODAY_SCHEDULE.map((s, i) => {
            const mins = toMins(s.time);
            const isPast = mins <= nowMins;
            const isNext = i === nextIdx;
            return (
              <React.Fragment key={i}>
                {/* "Now" rule — sits between past and next */}
                {isNext && <NowRule time={fmtTime(now)} />}
                <ScheduleRow item={s} isPast={isPast} isNext={isNext} />
                {i < TODAY_SCHEDULE.length - 1 && (
                  <div style={{
                    height: 1, marginLeft: 96, marginRight: 16,
                    background: "var(--stripe-line)",
                  }}></div>
                )}
              </React.Fragment>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function NowRule({ time }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 12,
      padding: "10px 18px 10px 22px",
      position: "relative",
    }}>
      <div style={{
        fontFamily: "Inter, var(--font-display)", fontSize: 12, fontWeight: 700,
        color: "var(--stripe-pink)", letterSpacing: "0.04em", textTransform: "uppercase",
        flexShrink: 0,
      }}>now · {time}</div>
      <div style={{
        flex: 1, height: 2, borderRadius: 2,
        background: "linear-gradient(90deg, var(--stripe-pink) 0%, var(--stripe-blue) 60%, transparent 100%)",
      }}></div>
    </div>
  );
}

function ScheduleRow({ item, isPast, isNext }) {
  return (
    <div style={{
      display: "flex", alignItems: "flex-start", gap: 16,
      padding: "16px 18px",
      opacity: isPast && !isNext ? 0.45 : 1,
      transition: "opacity 200ms ease",
    }}>
      {/* Time column */}
      <div style={{
        flexShrink: 0, minWidth: 64,
        fontFamily: "var(--font-display)", fontSize: 15, fontWeight: 600,
        color: isNext ? "var(--stripe-ink)" : "var(--stripe-faint)",
        letterSpacing: "-0.01em", paddingTop: 2,
        fontVariantNumeric: "tabular-nums",
      }}>{item.time}</div>

      {/* Dot */}
      <div style={{
        flexShrink: 0, paddingTop: 6,
      }}>
        <div style={{
          width: 12, height: 12, borderRadius: "50%",
          background: KIND_DOT[item.kind] || KIND_DOT.work,
          boxShadow: isNext ? "0 0 0 4px rgba(var(--stripe-blue-rgb, 0,66,255),0.18), 0 0 14px rgba(var(--stripe-blue-rgb, 0,66,255),0.40)" : "none",
        }}></div>
      </div>

      {/* Body */}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          fontFamily: "var(--font-display)", fontSize: 16,
          fontWeight: isNext ? 700 : 500,
          letterSpacing: "-0.02em", color: "var(--stripe-ink)", lineHeight: 1.3,
          marginBottom: 2,
        }}>
          {item.label}
          {isNext && (
            <span className="stripe-pill" style={{
              marginLeft: 10,
              fontSize: 11, fontWeight: 600, letterSpacing: "0.04em",
              verticalAlign: "middle",
            }}>up next</span>
          )}
        </div>
        <div style={{
          fontSize: 14, color: "var(--stripe-faint)", lineHeight: 1.5,
        }}>{item.meta}</div>
      </div>
    </div>
  );
}

window.Schedule = Schedule;

</script>

// Today's Meals — list of every meal eaten today with calories
// Mirrors the Bruno lesson-notes page: hover row to reveal edit (pencil)
// and delete (trash). Tap a row to open a detail modal. Floating + button
// opens an Add modal. Edit modal lets you tweak food items, calories, macros.

const { useState: useStateMeals } = React;

const MEALS_DEFAULT = [
  {
    id: "M1",
    time: "07:00",
    label: "Breakfast",
    items: ["Oats with banana + almond butter", "Two eggs scrambled", "Black coffee"],

    items: ["Grilled salmon", "Quinoa + roasted veg", "Olive oil + lemon"],
    calories: 680,

    notes: "Best meal of the day. Salmon was the move — recovered fast for evening drilling.",

  {

    time: "17:30",
    label: "Pre-training meal",

    calories: 620,
    macros: { p: 48, c: 72, f: 12 },
    notes: "90 min before sparring. Felt heavy on the first round, dialed in by round three.",
  },
];

const CAL_GOAL = 2800;

function Meals({ onBack }) {
  const [meals, setMeals] = useStateMeals(() => {
    const liveMeals = window.__bjjdata && Array.isArray(window.__bjjdata.meals_today) && window.__bjjdata.meals_today.length > 0
      ? window.__bjjdata.meals_today.map(m => ({
          id: String(m.id),
          time: m.time || "00:00",
          label: m.name,
          calories: m.calories || 0,
          macros: { p: 0, c: 0, f: 0 },
          items: [m.name],
          notes: m.notes || "",
          kind: m.kind || "other",
        }))
      : null;
    if (liveMeals) return liveMeals;
    try {
      const raw = localStorage.getItem("meals_today_v2");
      if (raw) return JSON.parse(raw);
    } catch {}
    return [];
  });
  const [confirmId, setConfirmId] = useStateMeals(null);
  const [editingId, setEditingId] = useStateMeals(null);
  const [detailId, setDetailId] = useStateMeals(null);
  const [adding, setAdding] = useStateMeals(false);

  const persist = (next) => {
    setMeals(next);
    try { localStorage.setItem("meals_today_v2", JSON.stringify(next)); } catch {}
  };

  const total  = meals.reduce((s, m) => s + (Number(m.calories) || 0), 0);
  const remaining = Math.max(0, CAL_GOAL - total);
  const pct = Math.min(100, Math.round((total / CAL_GOAL) * 100));
  const totalP = meals.reduce((s, m) => s + (Number(m.macros?.p) || 0), 0);
  const totalC = meals.reduce((s, m) => s + (Number(m.macros?.c) || 0), 0);
  const totalF = meals.reduce((s, m) => s + (Number(m.macros?.f) || 0), 0);

  const deleteMeal = (id) => {
    const confirmMeal = meals.find((m) => m.id === id);
    persist(meals.filter((m) => m.id !== id));
    setConfirmId(null);
    if (detailId === id) setDetailId(null);
    if (confirmMeal) {
      const mealId = parseInt(confirmMeal.id, 10);
      if (!isNaN(mealId)) apiCall("DELETE", `/api/meals/${mealId}`);
    }
  };
  const updateMeal = (id, data) => {
    const editingMeal = meals.find((m) => m.id === id);
    persist(meals.map((m) => m.id === id ? { ...m, ...data } : m));
    setEditingId(null);
    if (editingMeal) {
      const mealId = parseInt(editingMeal.id, 10);
      if (!isNaN(mealId)) {
        apiCall("PATCH", `/api/meals/${mealId}`, {
          name: data.label || data.name || "",
          calories: data.calories || 0,
          kind: data.kind || "other",
          notes: data.notes || "",
          time: data.time || "",
        });
      }
    }
  };
  const addMeal = (data) => {
    const id = "M-" + Date.now().toString(36);
    // Sort by time after adding
    const next = [...meals, { ...data, id }].sort((a, b) => (a.time || "").localeCompare(b.time || ""));
    persist(next);
    setAdding(false);
    apiCall("POST", "/api/meals", {
      name: data.label || data.name || "",
      calories: data.calories || 0,
      kind: data.kind || "other",
      notes: data.notes || "",
      time: data.time || "",
    });
  };

  const confirmMeal  = confirmId ? meals.find((m) => m.id === confirmId) : null;
  const editingMeal  = editingId ? meals.find((m) => m.id === editingId) : null;
  const detailMeal   = detailId  ? meals.find((m) => m.id === detailId)  : null;

  return (
    <div style={{ paddingTop: 100, paddingBottom: 120, paddingLeft: "clamp(16px, 4vw, 24px)", paddingRight: "clamp(16px, 4vw, 24px)" }}>
      <div style={{ maxWidth: 880, margin: "0 auto" }}>
        {/* Back */}
        <button
          onClick={onBack}
          className="stripe-cta secondary"
          style={{ marginBottom: 18 }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Back
        </button>

        {/* Compact header with key metric */}
        <div style={{ marginBottom: 28 }}>
          <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 12, marginBottom: 14 }}>
            <div>
              <div style={{
                fontFamily: "Inter, var(--font-display)", fontSize: 22, fontWeight: 900,
                letterSpacing: "-0.05em", color: "var(--stripe-ink)",
              }}>Meals</div>
              <div style={{
                fontFamily: "Inter, var(--font-text)", fontSize: 14,
                color: "var(--stripe-faint)", marginTop: 4,
              }}>{remaining > 0 ? `${remaining} kcal remaining` : "Goal reached"}</div>
            </div>
            <div style={{
              fontFamily: "Inter, var(--font-display)", fontSize: 32, fontWeight: 900,
              letterSpacing: "-0.05em", color: "var(--stripe-ink)",
              fontVariantNumeric: "tabular-nums",
            }}>{total}<span style={{ color: "var(--stripe-faint)", fontWeight: 400, fontSize: 14, marginLeft: 4 }}>/ {CAL_GOAL}</span></div>
          </div>

          {/* Calorie progress bar — stripe meter */}
          <div className="stripe-meter" style={{ marginTop: 16, marginBottom: 18, maxWidth: 520 }}>
            <span style={{
              width: `${pct}%`,
              background: pct >= 75 ? "var(--stripe-mint)" : "linear-gradient(90deg, var(--stripe-pink), var(--stripe-orange))",
              transition: "width 0.4s cubic-bezier(0.32,0.72,0,1)",
            }} />
          </div>

          {/* Macros row */}
          <div style={{ display: "flex", gap: 24, fontVariantNumeric: "tabular-nums" }}>
            <MacroChip label="protein" value={totalP} unit="g" color="var(--stripe-pink)" />
            <MacroChip label="carbs"   value={totalC} unit="g" color="var(--stripe-blue)" />
            <MacroChip label="fat"     value={totalF} unit="g" color="var(--stripe-cyan)" />
          </div>
        </div>

        {/* Meals list */}
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {meals.map((m) => (
            <MealRow
              key={m.id}
              meal={m}
              onClick={() => setDetailId(m.id)}
              onRequestEdit={() => setEditingId(m.id)}
              onRequestDelete={() => setConfirmId(m.id)}
            />
          ))}
        </div>

        {meals.length === 0 && (
          <div style={{
            textAlign: "center", padding: "48px 24px",
            fontSize: 15, color: "var(--stripe-faint)",
          }}>
            No meals logged today. Tap + to add one.
          </div>
        )}
      </div>

      {/* Floating + button — transparent fill, rainbow border */}
      <button
        onClick={() => setAdding(true)}
        aria-label="Add meal"
        style={{
          position: "fixed", bottom: "calc(32px + env(safe-area-inset-bottom, 0px))", right: 32, zIndex: 50,
          width: 56, height: 56, borderRadius: "50%",
          background: "var(--stripe-card)",
          border: "1px solid var(--stripe-line)", padding: 0, cursor: "pointer",
          color: "var(--stripe-blue)",
          boxShadow: "var(--shadow-pop)",
          display: "flex", alignItems: "center", justifyContent: "center",
          transition: "transform 160ms cubic-bezier(0.32,0.72,0,1)",
        }}
        onMouseEnter={(e) => { e.currentTarget.style.transform = "scale(1.06)"; }}
        onMouseLeave={(e) => { e.currentTarget.style.transform = "scale(1)"; }}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" style={{ position: "relative" }}>
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>

      {/* Detail modal */}
      {detailMeal && (
        <MealDetailModal
          meal={detailMeal}
          onClose={() => setDetailId(null)}
          onEdit={() => { setEditingId(detailMeal.id); setDetailId(null); }}
          onDelete={() => { setConfirmId(detailMeal.id); }}
        />
      )}

      {/* Add modal */}
      {adding && (
        <MealFormModal
          mode="add"
          onCancel={() => setAdding(false)}
          onSubmit={(data) => addMeal(data)}
        />
      )}

      {/* Edit modal */}
      {editingMeal && (
        <MealFormModal
          mode="edit"
          initial={editingMeal}
          onCancel={() => setEditingId(null)}
          onSubmit={(data) => updateMeal(editingMeal.id, data)}
        />
      )}

      {/* Delete confirm */}
      {confirmMeal && (
        <MealDeleteConfirm
          meal={confirmMeal}
          onCancel={() => setConfirmId(null)}
          onConfirm={() => deleteMeal(confirmMeal.id)}
        />
      )}
    </div>
  );
}

function MacroChip({ label, value, unit, color }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <div style={{ width: 8, height: 8, borderRadius: "50%", background: color, flexShrink: 0 }}></div>
      <div>
        <div style={{
          fontFamily: "Inter, var(--font-display)", fontSize: 18, fontWeight: 900,
          letterSpacing: "-0.05em", color: "var(--stripe-ink)", lineHeight: 1.2,

        <div style={{ fontSize: 12, color: "var(--stripe-faint)", textTransform: "uppercase", letterSpacing: "0.04em", marginTop: 2 }}>{label}</div>
      </div>
    </div>
  );
}

// =====================================================
// Meal row — hover reveals pencil + trash. No star.
// =====================================================

      {/* Body */}

        }}>
          <div style={{
            fontFamily: "Inter, var(--font-display)", fontSize: 16, fontWeight: 600,
            letterSpacing: "-0.02em", color: "var(--stripe-ink)", minWidth: 0,
          }}>{meal.label}</div>
          <div className="stripe-pill" style={{
            flexShrink: 0,
            padding: "6px 14px",
            fontFamily: "Inter, var(--font-display)", fontSize: 15, fontWeight: 600,
            letterSpacing: "-0.01em", color: "var(--stripe-blue)",
            fontVariantNumeric: "tabular-nums",
          }}>{meal.calories} cal</div>
        </div>
        <ul style={{ margin: 0, padding: 0, listStyle: "none" }}>
          {(meal.items || []).map((it, i) => (
            <li key={i} style={{
              fontSize: 15, color: "var(--stripe-faint)", lineHeight: 1.5,
              paddingLeft: 14, position: "relative",
            }}>

          <span>P {meal.macros?.p ?? 0}g</span>

      </div>

}

// =====================================================
// Detail modal — full breakdown of one meal
// =====================================================
function MealDetailModal({ meal, onClose, onEdit, onDelete }) {
  const trapRef = useModalTrap(true, onClose);
  const calGoalPct = Math.min(100, Math.round((meal.calories / CAL_GOAL) * 100));
  const macroTotal = (meal.macros?.p || 0) + (meal.macros?.c || 0) + (meal.macros?.f || 0);
  const pPct = macroTotal ? Math.round(((meal.macros?.p || 0) / macroTotal) * 100) : 0;
  const cPct = macroTotal ? Math.round(((meal.macros?.c || 0) / macroTotal) * 100) : 0;
  const fPct = macroTotal ? 100 - pPct - cPct : 0;

  return (
    <div
      ref={trapRef}
      role="dialog"
      aria-modal="true"
      onClick={onClose}
      style={{
        position: "fixed", inset: 0, zIndex: 100,
        background: "rgba(20,20,30,0.32)", backdropFilter: "blur(6px)",
        display: "flex", alignItems: "center", justifyContent: "center", padding: 24,
        animation: "mealFadeIn 160ms ease both",
      }}>
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: "100%", maxWidth: 540, maxHeight: "calc(100dvh - 48px)",
          overflowY: "auto",
          background: "var(--stripe-card)", borderRadius: 20, padding: "28px 32px 24px",
          border: "1px solid var(--stripe-line)",
          boxShadow: "0 24px 64px -16px rgba(20,20,40,0.22), 0 1px 0 rgba(255,255,255,0.6) inset",
          animation: "mealPopIn 220ms cubic-bezier(0.32,0.72,0,1) both",
          position: "relative",
        }}>
        {/* Close */}
        <button
          onClick={onClose}
          aria-label="Close"
          style={{
            position: "absolute", top: 14, right: 14,
            width: 32, height: 32, borderRadius: "50%",
            border: "none", background: "transparent", cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
            color: "var(--stripe-faint)",
          }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>

        <Eyebrow style={{ marginBottom: 10 }}>{meal.time} · today</Eyebrow>
        <div style={{
          fontFamily: "Inter, var(--font-display)", fontSize: 28, fontWeight: 900,
          letterSpacing: "-0.05em", color: "var(--stripe-ink)", lineHeight: 1.2,
          marginBottom: 6,
        }}>{meal.label}</div>

        {/* Calories headline */}
        <div style={{
          display: "flex", alignItems: "baseline", gap: 8, marginTop: 14, marginBottom: 6,
        }}>
          <div style={{
            fontFamily: "Inter, var(--font-display)", fontSize: 32, fontWeight: 900,
            letterSpacing: "-0.05em", color: "var(--stripe-ink)", lineHeight: 1,
          }}>{meal.calories}</div>
          <div style={{ fontSize: 15, color: "var(--stripe-faint)" }}>cal</div>
          <div style={{ fontSize: 13, color: "var(--stripe-faint)", marginLeft: 8, fontVariantNumeric: "tabular-nums" }}>
            ≈ {calGoalPct}% of daily goal
          </div>
        </div>

        {/* Macro stacked bar */}
        {macroTotal > 0 && (
          <div style={{ marginTop: 14, marginBottom: 4 }}>
            <div style={{
              display: "flex", height: 10, borderRadius: 999, overflow: "hidden",
              border: "1px solid var(--stripe-line)",
            }}>
              <div style={{ width: `${pPct}%`, background: "var(--stripe-pink)" }} />
              <div style={{ width: `${cPct}%`, background: "var(--stripe-blue)" }} />
              <div style={{ width: `${fPct}%`, background: "var(--stripe-cyan)" }} />
            </div>
            <div style={{ display: "flex", gap: 16, marginTop: 10, fontVariantNumeric: "tabular-nums" }}>
              <MacroLegend color="var(--stripe-pink)" label="protein" value={meal.macros?.p || 0} pct={pPct} />
              <MacroLegend color="var(--stripe-blue)" label="carbs"   value={meal.macros?.c || 0} pct={cPct} />
              <MacroLegend color="var(--stripe-cyan)" label="fat"     value={meal.macros?.f || 0} pct={fPct} />
            </div>
          </div>
        )}

        {/* Items list */}
        <div style={{ marginTop: 22 }}>
          <Eyebrow style={{ marginBottom: 12 }}>what i ate</Eyebrow>
          <ul style={{ margin: 0, padding: 0, listStyle: "none", display: "flex", flexDirection: "column", gap: 8 }}>
            {(meal.items || []).map((it, i) => (
              <li key={i} style={{
                fontSize: 15, color: "var(--stripe-ink)", lineHeight: 1.5,
                paddingLeft: 18, position: "relative",
              }}>
                <span style={{
                  position: "absolute", left: 2, top: 9, width: 5, height: 5, borderRadius: "50%",
                  background: "linear-gradient(135deg, var(--stripe-blue), var(--stripe-cyan))",
                }}></span>
                {it}
              </li>
            ))}
          </ul>
        </div>

        {/* Notes */}
        {meal.notes && meal.notes.trim() && (
          <div style={{
            marginTop: 22, padding: "14px 16px",
            background: "var(--stripe-card)",
            border: "1px solid var(--stripe-line)",
            borderRadius: 12,
            fontSize: 15, color: "var(--stripe-ink)", lineHeight: 1.5,
          }}>
            {meal.notes}
          </div>
        )}

        {/* Actions */}
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 24 }}>
          <button onClick={onDelete} className="stripe-cta secondary" style={{ color: "var(--stripe-pink)" }}>Delete</button>
          <button onClick={onEdit} className="stripe-cta primary">Edit meal</button>
        </div>
      </div>
      <style>{`
        @keyframes mealFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes mealPopIn  { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
      `}</style>
    </div>
  );
}

function MacroLegend({ color, label, value, pct }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <div style={{ width: 8, height: 8, borderRadius: "50%", background: color, flexShrink: 0 }} />
      <div style={{ fontSize: 13, color: "var(--stripe-faint)" }}>
        <span style={{ fontWeight: 700, color: "var(--stripe-ink)" }}>{value}g</span>
        <span style={{ marginLeft: 4, color: "var(--stripe-faint)" }}>{label} · {pct}%</span>
      </div>
    </div>
  );
}

// =====================================================
// Add / Edit form modal
// =====================================================
function MealFormModal({ mode, initial, onCancel, onSubmit }) {
  const [time, setTime] = useStateMeals(initial?.time ?? "");
  const [label, setLabel] = useStateMeals(initial?.label ?? "");
  const [calories, setCalories] = useStateMeals(initial?.calories ?? "");
  const [protein, setProtein] = useStateMeals(initial?.macros?.p ?? "");
  const [carbs, setCarbs] = useStateMeals(initial?.macros?.c ?? "");
  const [fat, setFat] = useStateMeals(initial?.macros?.f ?? "");
  const [itemsText, setItemsText] = useStateMeals(
    initial ? (initial.items || []).join("\n") : ""
  );
  const [notes, setNotes] = useStateMeals(initial?.notes ?? "");

  const submit = () => {
    if (!label.trim()) return;
    const items = itemsText.split("\n").map((n) => n.trim()).filter(Boolean);
    onSubmit({
      time: (time || "").trim() || "—",
      label: label.trim(),
      items,
      calories: Number(calories) || 0,
      macros: {
        p: Number(protein) || 0,
        c: Number(carbs) || 0,
        f: Number(fat) || 0,
      },
      notes: notes.trim(),
    });
  };

  return (
    <div
      onClick={onCancel}
      style={{
        position: "fixed", inset: 0, zIndex: 110,
        background: "rgba(20,20,30,0.32)", backdropFilter: "blur(6px)",
        display: "flex", alignItems: "center", justifyContent: "center", padding: 24,
        animation: "mealFadeIn 160ms ease both",
      }}>
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: "100%", maxWidth: 520, maxHeight: "calc(100dvh - 48px)",
          overflowY: "auto",
          background: "var(--stripe-card)", borderRadius: 20, padding: 28,
          border: "1px solid var(--stripe-line)",
          boxShadow: "0 24px 64px -16px rgba(20,20,40,0.22), 0 1px 0 rgba(255,255,255,0.6) inset",
          animation: "mealPopIn 220ms cubic-bezier(0.32,0.72,0,1) both",
        }}>
        <div style={{
          fontFamily: "Inter, var(--font-display)", fontSize: 22, fontWeight: 900,
          letterSpacing: "-0.05em", color: "var(--stripe-ink)", marginBottom: 6,
        }}>{mode === "edit" ? "Edit meal" : "Add a meal"}</div>
        <div style={{ fontSize: 14, color: "var(--stripe-faint)", marginBottom: 18 }}>
          {mode === "edit" ? "Update any field below." : "Log what you ate, when, and how much."}
        </div>

        {/* Time + Label */}
        <div style={{ display: "grid", gridTemplateColumns: "minmax(80px, 120px) 1fr", gap: 10, marginBottom: 12 }}>
          <MealField label="Time">
            <input
              value={time}
              onChange={(e) => setTime(e.target.value)}
              placeholder="12:45"
              style={mealInputStyle}
            />
          </MealField>
          <MealField label="Meal name">
            <input
              autoFocus
              value={label}
              onChange={(e) => setLabel(e.target.value)}
              placeholder="Lunch"
              style={mealInputStyle}
            />
          </MealField>
        </div>

        {/* Items */}
        <MealField
          label="What you ate"
          hint="One item per line."
          style={{ marginBottom: 12 }}>
          <textarea
            value={itemsText}
            onChange={(e) => setItemsText(e.target.value)}
            placeholder={"Grilled salmon\nQuinoa + roasted veg\nOlive oil + lemon"}
            rows={4}
            style={{ ...mealInputStyle, resize: "vertical", minHeight: 90, lineHeight: 1.5, fontFamily: "var(--font-text)" }}
          />
        </MealField>

        {/* Calories */}
        <MealField label="Calories" style={{ marginBottom: 12 }}>
          <input
            type="number"
            inputMode="numeric"
            value={calories}
            onChange={(e) => setCalories(e.target.value)}
            placeholder="680"
            style={mealInputStyle}
          />
        </MealField>

        {/* Macros */}
        <div style={{ marginBottom: 12 }}>
          <div style={{
            fontSize: 12, fontWeight: 600, letterSpacing: "0.04em",
            textTransform: "uppercase", color: "var(--stripe-faint)",
            marginBottom: 6,
          }}>Macros (grams)</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
            <MacroInput color="var(--stripe-pink)" label="protein" value={protein} onChange={setProtein} />
            <MacroInput color="var(--stripe-blue)" label="carbs"   value={carbs}   onChange={setCarbs}   />
            <MacroInput color="var(--stripe-cyan)" label="fat"     value={fat}     onChange={setFat}     />
          </div>
        </div>

        {/* Notes */}
        <MealField label="Notes" hint="Optional — how it sat, energy level, anything to remember." style={{ marginBottom: 22 }}>
          <textarea
            value={notes}
            onChange={(e) => setNotes(e.target.value)}
            placeholder="Felt great rolling after this one."
            rows={2}
            style={{ ...mealInputStyle, resize: "vertical", minHeight: 56, lineHeight: 1.5 }}
          />
        </MealField>

        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button onClick={onCancel} className="stripe-cta secondary">Cancel</button>
          {label.trim() ? (
            <button onClick={submit} className="stripe-cta primary">{mode === "edit" ? "Save" : "Add meal"}</button>
          ) : (
            <button disabled className="stripe-cta primary" style={{ opacity: 0.4, cursor: "not-allowed" }}>{mode === "edit" ? "Save" : "Add meal"}</button>
          )}
        </div>
      </div>
    </div>
  );
}

  border: "1px solid var(--stripe-line)", borderRadius: 8,

        fontSize: 11, fontWeight: 600, letterSpacing: "0.04em",
        color: "var(--stripe-faint)",
        marginBottom: 4,

        <span style={{ width: 6, height: 6, borderRadius: "50%", background: color }} />
        {label}

// =====================================================
// Delete confirm
// =====================================================

      }}>
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: 420, maxWidth: "100%",
          background: "var(--stripe-card)",

          padding: "28px 28px 22px",
          border: "1px solid var(--stripe-line)",
          boxShadow: "0 24px 64px -16px rgba(20,20,40,0.22), 0 1px 0 rgba(255,255,255,0.6) inset",

        }}>
        <div style={{

        }}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            <line x1="10" y1="11" x2="10" y2="17"/>

  <script type="text/babel">
// Upcoming problems — full page. Reads/writes shared problemsStore.
// Pin (star), edit (pencil), delete (trash), and add via floating + button.
// Tap a row to open detail with the description.

const { useState: useStateP, useEffect: useEffectP } = React;

// ---------- Page ----------
function Problems({ onBack }) {
  const { problems, pinned, setProblems, setPinned } = useProblemsStore();
  const [confirmId, setConfirmId] = useStateP(null);
  const [adding, setAdding] = useStateP(false);
  const [editingId, setEditingId] = useStateP(null);
  const [detailId, setDetailId] = useStateP(null);
  const [sortMode, setSortMode] = useStateP(() => {
    try { return localStorage.getItem("problems_sort") || "priority"; } catch { return "priority"; }
  });
  const updateSort = (m) => {
    setSortMode(m);
    try { localStorage.setItem("problems_sort", m); } catch {}
  };

  const togglePin = (id) => {
    setPinned((prev) => prev.includes(id) ? prev.filter((x) => x !== id) : [...prev, id]);
  };
  const deleteProblem = (id) => {
    const probId = id.startsWith("bot-problem-")
      ? parseInt(id.replace("bot-problem-", ""), 10)
      : NaN;
    setProblems((prev) => prev.filter((p) => p.id !== id));
    setPinned((prev) => prev.filter((x) => x !== id));
    setConfirmId(null);
    if (detailId === id) setDetailId(null);
    if (!isNaN(probId)) apiCall("DELETE", `/api/problems/${probId}`);
  };
  const addProblem = (name, tier, description) => {
    const id = name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "")
      + "-" + Date.now().toString(36);
    setProblems((prev) => [...prev, { id, name, tier, description }]);
    setAdding(false);
    apiCall("POST", "/api/problems", { name, tier, description });
  };
  const updateProblem = (id, name, tier, description) => {
    const probId = id.startsWith("bot-problem-")
      ? parseInt(id.replace("bot-problem-", ""), 10)
      : NaN;
    setProblems((prev) => prev.map((p) => p.id === id ? { ...p, name, tier, description } : p));
    setEditingId(null);
    if (!isNaN(probId)) {
      apiCall("PATCH", `/api/problems/${probId}`, { name, tier, description });
    }
  };

  const liveProblems = window.__bjjdata && Array.isArray(window.__bjjdata.all_problems) && window.__bjjdata.all_problems.length > 0
    ? window.__bjjdata.all_problems.map((p, i) => ({
        id: `bot-problem-${i}`,
        name: p.name,
        tier: p.tier || "med",
        description: p.source === "active" ? "Currently flagged for your next Bruno session." : "Extracted from recent training notes.",
      }))
    : null;
  const sorted = sortProblems(liveProblems || problems, pinned, sortMode);
  const confirmProblem = problems.find((p) => p.id === confirmId);
  const editingProblem = problems.find((p) => p.id === editingId);
  const detailProblem  = problems.find((p) => p.id === detailId);

  return (
    <div className="upcoming-page">
      <div className="upcoming-page-inner">
        {/* Back link */}
        <button className="upcoming-back" onClick={onBack}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Back
        </button>

        {/* Page header — eyebrow + title + subtitle */}
        <div className="upcoming-header">
          <div>
            <div className="upcoming-eyebrow">Upcoming problems</div>
            <h1 className="upcoming-title">Positions to fix</h1>
            <div className="upcoming-subtitle">
              {sorted.length} position{sorted.length !== 1 ? "s" : ""} tracked
            </div>
          </div>
        </div>

        {/* Sort */}
        <div className="upcoming-toolbar">
          <SortMenu value={sortMode} onChange={updateSort} options={PROBLEMS_SORT_OPTIONS} />
        </div>

        {/* List */}
        <div className="upcoming-list">
          {sorted.map((p, i) => (
            <ProblemRow
              key={p.id}
              problem={p}
              isPinned={pinned.includes(p.id)}
              index={i}
              onClick={() => setDetailId(p.id)}
              onTogglePin={() => togglePin(p.id)}
              onRequestEdit={() => setEditingId(p.id)}
              onRequestDelete={() => setConfirmId(p.id)}
            />
          ))}
        </div>

        {sorted.length === 0 && (
          <div className="upcoming-empty">
            <div className="upcoming-empty-icon">○</div>
            <p>No problems on the list. Tap + to add one.</p>
          </div>
        )}
      </div>

      {/* Floating + button — rainbow ring + cream paper center */}
      <button
        className="upcoming-fab"
        onClick={() => setAdding(true)}
        aria-label="Add problem">
        <span className="upcoming-fab-inner">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </span>
      </button>

      {/* Detail modal */}
      {detailProblem && (
        <ProblemDetailModal
          problem={detailProblem}
          isPinned={pinned.includes(detailProblem.id)}
          onClose={() => setDetailId(null)}
          onTogglePin={() => togglePin(detailProblem.id)}
          onEdit={() => { setDetailId(null); setEditingId(detailProblem.id); }}
          onRequestDelete={() => setConfirmId(detailProblem.id)}
        />
      )}

      {/* Add modal */}
      {adding && (
        <ProblemFormModal
          mode="add"
          onCancel={() => setAdding(false)}
          onSubmit={(name, tier, description) => addProblem(name, tier, description)}
        />
      )}

      {/* Edit modal */}
      {editingProblem && (
        <ProblemFormModal
          mode="edit"
          initial={editingProblem}
          onCancel={() => setEditingId(null)}
          onSubmit={(name, tier, description) => updateProblem(editingProblem.id, name, tier, description)}
        />
      )}

      {/* Delete confirm */}
      {confirmProblem && (
        <DeleteProblemConfirm
          problem={confirmProblem}
          onCancel={() => setConfirmId(null)}
          onConfirm={() => deleteProblem(confirmProblem.id)}
        />
      )}
    </div>
  );
}

// ---------- Row ----------
function ProblemRow({ problem, isPinned, index = 0, onClick, onTogglePin, onRequestEdit, onRequestDelete }) {
  const isUrgent = problem.tier === "urgent";
  const tier = problem.tier || "med";
  const rowAnim = { animation: `upcomingRowIn 380ms cubic-bezier(0.32,0.72,0,1) ${index * 50}ms both` };

  const inner = (
    <div className="upcoming-row" style={isPinned ? rowAnim : undefined}>
      <div className={"upcoming-row-name" + (isUrgent ? " urgent" : "")}>{problem.name}</div>
      <div className={"upcoming-tier " + tier}>{problem.tier}</div>
    </div>
  );

  if (isPinned) {
    return (
      <div className="upcoming-row-pinned" onClick={onClick} style={rowAnim}>
        {inner}
      </div>
    );
  }

  return (
    <div onClick={onClick} style={rowAnim}>
      {inner}
    </div>
  );
}

// ---------- Detail modal ----------
function ProblemDetailModal({ problem, isPinned, onClose, onTogglePin, onEdit, onRequestDelete }) {
  const trapRef = useModalTrap(true, onClose);
  const isUrgent = problem.tier === "urgent";
  const tier = problem.tier || "med";

  return (
    <div
      ref={trapRef}
      role="dialog"
      aria-modal="true"
      onClick={onClose}
      className="upcoming-modal-scrim">
      <div
        onClick={(e) => e.stopPropagation()}
        className="upcoming-modal"
        style={{ maxWidth: 540 }}>

        {/* Close */}
        <button
          onClick={onClose}
          aria-label="Close"
          className="upcoming-modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>

        {/* Tier badge */}
        <div className={"upcoming-detail-tier " + tier}>{problem.tier}</div>

        {/* Title */}
        <div className={"upcoming-modal-title" + (isUrgent ? " urgent" : "")}>{problem.name}</div>

        {/* Description */}
        <div className={"upcoming-modal-body" + (problem.description ? "" : " empty")}>
          {problem.description || "No description yet — tap edit to add one."}
        </div>

        {/* Actions */}
        <div className="upcoming-modal-actions">
          <button
            onClick={onTogglePin}
            className={"upcoming-btn upcoming-btn-ghost" + (isPinned ? " pinned" : "")}>
            <svg width="14" height="14" viewBox="0 0 24 24"
                 fill={isPinned ? "currentColor" : "none"}
                 stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            {isPinned ? "Pinned" : "Pin"}
          </button>

          <button
            onClick={onRequestDelete}
            className="upcoming-btn upcoming-btn-ghost danger">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
            Delete
          </button>

          <div style={{ flex: 1 }}></div>

          <button
            onClick={onEdit}
            className="upcoming-btn upcoming-btn-primary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M12 20h9"/>
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
            Edit
          </button>
        </div>
      </div>
    </div>
  );
}

// ---------- Add / Edit modal ----------
function ProblemFormModal({ mode, initial, onCancel, onSubmit }) {
  const [name, setName] = useStateP(initial?.name ?? "");
  const [tier, setTier] = useStateP(initial?.tier ?? "med");
  const [description, setDescription] = useStateP(initial?.description ?? "");
  const trapRef = useModalTrap(true, onCancel);

  const submit = () => {
    if (name.trim()) onSubmit(name.trim(), tier, description.trim());
  };
  const canSubmit = !!name.trim();

  return (
    <div
      role="dialog"
      aria-modal="true"
      ref={trapRef}
      onClick={onCancel}
      className="upcoming-modal-scrim">
      <div
        onClick={(e) => e.stopPropagation()}
        className="upcoming-modal"
        style={{ maxWidth: 460, padding: 28 }}>
        <div className="upcoming-modal-title" style={{ fontSize: 22, marginBottom: 6, paddingRight: 0 }}>
          {mode === "edit" ? "Edit problem" : "Add a problem"}
        </div>
        <div className="upcoming-modal-sub">
          {mode === "edit" ? "Update the name, priority, or notes." : "What position keeps catching you?"}
        </div>

        {/* Name */}
        <input
          autoFocus
          value={name}
          onChange={(e) => setName(e.target.value)}
          onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) submit(); }}
          placeholder="e.g. Half-guard bottom"
          className="upcoming-input"
          style={{ marginBottom: 12 }}
        />

        {/* Description */}
        <textarea
          value={description}
          onChange={(e) => setDescription(e.target.value)}
          placeholder="What's the issue? Where does it break down?"
          rows={4}
          className="upcoming-textarea"
          style={{ marginBottom: 16 }}
        />

        {/* Tier picker */}
        <div className="upcoming-tier-picker">
          {PROBLEMS_TIERS.map((t) => {
            const active = tier === t.id;
            return (
              <button
                key={t.id}
                onClick={() => setTier(t.id)}
                className={"upcoming-tier-option " + t.id + (active ? " active" : "")}>
                {t.label}
              </button>
            );
          })}
        </div>

        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button onClick={onCancel} className="upcoming-btn upcoming-btn-ghost">Cancel</button>
          <button
            onClick={canSubmit ? submit : undefined}
            disabled={!canSubmit}
            className="upcoming-btn upcoming-btn-primary">
            {mode === "edit" ? "Save" : "Add"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ---------- Delete confirm ----------
function DeleteProblemConfirm({ problem, onCancel, onConfirm }) {
  const trapRef = useModalTrap(true, onCancel);
  return (
    <div
      role="dialog"
      aria-modal="true"
      ref={trapRef}
      onClick={onCancel}
      className="upcoming-modal-scrim"
      style={{ zIndex: 110 }}>
      <div
        onClick={(e) => e.stopPropagation()}
        className="upcoming-modal"
        style={{ maxWidth: 400, padding: 28 }}>
        <div className="upcoming-modal-title" style={{ fontSize: 22, marginBottom: 8, paddingRight: 0 }}>
          Delete this problem?
        </div>
        <div style={{ fontSize: 15, color: "var(--fg-2)", lineHeight: 1.5, marginBottom: 22 }}>
          <strong style={{ color: "var(--fg-1)", fontWeight: 600 }}>{problem.name}</strong> will be removed from your list.
        </div>
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button onClick={onCancel} className="upcoming-btn upcoming-btn-ghost">Cancel</button>
          <button onClick={onConfirm} className="upcoming-btn upcoming-btn-danger">Delete</button>
        </div>
      </div>
    </div>
  );
}

window.Problems = Problems;

</script>
  <script type="text/babel">
// Micro-Injuries — full page. Reads/writes shared microInjuriesStore.
// Pin (star), edit (pencil), delete (trash), and add via floating + button.
// Tap a row to open detail with the description.
// Mirrors Problems.jsx structure.

const { useState: useStateMI, useEffect: useEffectMI } = React;

function microInjuryTimeBucketFromText(whenHappened) {
  // Three buckets only: morning / afternoon / evening.
  // Night & late text fold into "evening" (night class window).
  const text = String(whenHappened || "").toLowerCase().trim();
  if (!text) return null;
  if (/\b(night|late|evening|class|competition|rolls|open\s*mat)\b/.test(text)) return "evening";
  if (/\b([5-9]|1[01])(?::[0-5]\d)?\s*pm\b/.test(text)) return "evening";
  if (/\b(afternoon|private|bruno|lunch|midday|noon)\b/.test(text)) return "afternoon";
  if (/\b(12|[1-4])(?::[0-5]\d)?\s*pm\b/.test(text)) return "afternoon";
  if (/\b(morning|drilling|strength)\b/.test(text) || text.includes("s&c")) return "morning";
  if (/\b(1[0-1]|[1-9])(?::[0-5]\d)?\s*am\b/.test(text)) return "morning";
  if (/\b12(?::[0-5]\d)?\s*am\b/.test(text)) return "evening";
  return null;
}

function buildMicroInjuryStats(injuries, serverStats) {
  const safeStats = serverStats || {};
  const normalized = Array.isArray(injuries) ? injuries : [];
  if (safeStats.total > 0) {
    return {
      total: safeStats.total || normalized.length,
      active: safeStats.active ?? normalized.filter((i) => !i.resolved).length,
      resolved: safeStats.resolved ?? normalized.filter((i) => i.resolved).length,
      top_partners: safeStats.top_partners || [],
      top_body_parts: safeStats.top_body_parts || [],
      time_buckets: safeStats.time_buckets || { morning: 0, afternoon: 0, evening: 0 },
    };
  }

  const countBy = (items, getKey) => {
    const map = new Map();
    items.forEach((item) => {
      const key = String(getKey(item) || "").trim();
      if (!key || key.toLowerCase() === "solo") return;
      const canonical = key.toLowerCase();
      const current = map.get(canonical) || { name: key, count: 0 };
      current.count += 1;
      map.set(canonical, current);
    });
    return Array.from(map.values()).sort((a, b) => b.count - a.count).slice(0, 5);
  };

  const timeBuckets = { morning: 0, afternoon: 0, evening: 0 };
  normalized.forEach((injury) => {
    const bucket = microInjuryTimeBucketFromText(injury.when_happened);
    if (bucket) timeBuckets[bucket] += 1;
  });

  return {
    total: normalized.length,
    active: normalized.filter((i) => !i.resolved).length,
    resolved: normalized.filter((i) => i.resolved).length,
    top_partners: countBy(normalized, (i) => i.partner),
    top_body_parts: countBy(normalized, (i) => i.name),
    time_buckets: timeBuckets,
  };
}

function MicroInjuryMetric({ label, value, tone = "var(--stripe-ink)" }) {
  return (
    <div style={{
      minWidth: 0,
      padding: "12px 14px",
      borderRadius: 12,
      background: "var(--stripe-card)",
      border: "1px solid var(--stripe-line)",
      boxShadow: "var(--stripe-shadow)",
    }}>
      <div style={{
        fontSize: 11, fontWeight: 700, letterSpacing: "0.04em",
        textTransform: "uppercase", color: "var(--stripe-faint)", marginBottom: 5,
      }}>{label}</div>
      <div style={{ fontSize: 24, lineHeight: 1, fontWeight: 900, letterSpacing: "-0.05em", color: tone, fontVariantNumeric: "tabular-nums" }}>{value}</div>
    </div>
  );
}

function MicroInjuryBars({ rows, emptyText, color = "var(--stripe-pink)" }) {
  const maxCount = Math.max(1, ...rows.map((row) => row.count || 0));
  if (!rows.length) {
    return (
      <div style={{
        minHeight: 80, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center",
        background: "var(--stripe-card)",
        border: "1px solid var(--stripe-line)",
        color: "var(--stripe-faint)", fontSize: 13,
      }}>{emptyText}</div>
    );
  }
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 11 }}>
      {rows.map((row, i) => {
        const pct = Math.max(8, Math.round(((row.count || 0) / maxCount) * 100));
        return (
          <div key={`${row.name}-${i}`} style={{
            display: "grid", gridTemplateColumns: "minmax(78px, 112px) 1fr 28px",
            alignItems: "center", gap: 10, minHeight: 26,
          }}>
            <div style={{
              fontSize: 13, fontWeight: 600, color: "var(--stripe-ink)",
              whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", textTransform: "capitalize",
            }}>{row.name}</div>
            <div className="stripe-meter" style={{ height: 8 }}>
              <span style={{ width: `${pct}%`, background: color }} />
            </div>
            <div style={{ fontSize: 13, fontWeight: 700, color: "var(--stripe-faint)", textAlign: "right", fontVariantNumeric: "tabular-nums" }}>
              {row.count}
            </div>
          </div>
        );
      })}
    </div>
  );
}

const MICRO_INJURY_TIME_LABELS = {
  morning: "Morning drilling",
  afternoon: "Bruno",
  evening: "Night class",
};

function MicroInjuryTimeChart({ buckets }) {
  // Three buckets only: morning / afternoon / evening (night folds in).
  const rows = [
    { key: "morning",   color: "var(--stripe-pink)" },
    { key: "afternoon", color: "var(--stripe-blue)" },
    { key: "evening",   color: "var(--stripe-cyan)" },
  ];
  const counts = rows.map((r) => buckets[r.key] || 0);
  const maxCount = Math.max(...counts);
  return (
    <div style={{
      display: "grid",
      gridTemplateColumns: "repeat(3, minmax(0, 1fr))",
      gap: 10,
      paddingTop: 4,
    }}>
      {rows.map((row) => {
        const count = buckets[row.key] || 0;
        const isPeak = maxCount > 0 && count === maxCount;
        const isZero = count === 0;
        return (
          <div key={row.key} style={{
            position: "relative",
            padding: "14px 14px 13px",
            borderRadius: 16,
            background: "var(--stripe-card)",
            border: `1px solid ${isPeak ? row.color + "55" : "var(--stripe-line)"}`,
            boxShadow: isPeak
              ? `var(--stripe-shadow), 0 0 0 1px ${row.color}22`
              : "var(--stripe-shadow)",
            transition: "box-shadow 200ms ease, border-color 200ms ease",
            minWidth: 0,
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
              <div style={{
                width: 8, height: 8, borderRadius: 999, flexShrink: 0,
                background: row.color,
                opacity: isZero ? 0.35 : 1,
              }}/>
              <div style={{
                fontSize: 11, fontWeight: 700, letterSpacing: "0.04em",
                textTransform: "uppercase",
                color: "var(--stripe-faint)",
                whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
              }}>{MICRO_INJURY_TIME_LABELS[row.key]}</div>
            </div>
            <div style={{
              fontFamily: "Inter, var(--font-display)",
              fontSize: 28, fontWeight: 900, lineHeight: 1,
              letterSpacing: "-0.05em",
              color: isZero ? "var(--stripe-faint)" : "var(--stripe-ink)",
              fontVariantNumeric: "tabular-nums",
            }}>{count}</div>
          </div>
        );
      })}
    </div>
  );
}

function MicroInjuryStatsPanel({ stats, open, onToggle }) {
  const total = stats.total || 0;
  const buckets = stats.time_buckets || { morning: 0, afternoon: 0, evening: 0 };
  const partnerLeader = stats.top_partners?.[0]?.name || "No partner pattern yet";
  const bodyLeader = stats.top_body_parts?.[0]?.name || "No body pattern yet";
  const timeLeaderEntry = Object.entries(buckets).sort((a, b) => b[1] - a[1])[0] || ["none", 0];
  const timeLeaderLabel = timeLeaderEntry[1] > 0
    ? (MICRO_INJURY_TIME_LABELS[timeLeaderEntry[0]] || timeLeaderEntry[0])
    : "No timing yet";

  return (
    <section style={{ marginBottom: 22 }}>
      <button
        type="button"

// ---------- Sync injury data back to window.__bjjdata ----------
function injuryStatsFromList(injuries) {
  const active = injuries.filter((i) => !i.resolved);
  const resolved = injuries.filter((i) => i.resolved);
  const countBy = (items, getKey) => {
    const map = new Map();
    items.forEach((item) => {
      const key = String(getKey(item) || "").trim();
      if (!key || key.toLowerCase() === "solo") return;
      const canonical = key.toLowerCase();
      const current = map.get(canonical) || { name: key, count: 0 };
      current.count += 1;
      map.set(canonical, current);
    });
    return Array.from(map.values()).sort((a, b) => b.count - a.count).slice(0, 5);
  };
  const timeBuckets = { morning: 0, afternoon: 0, evening: 0 };
  injuries.forEach((inj) => {
    const bucket = microInjuryTimeBucketFromText(inj.when_happened);
    if (bucket) timeBuckets[bucket] += 1;
  });
  return {
    total: injuries.length,
    active: active.length,
    resolved: resolved.length,
    top_partners: countBy(injuries, (i) => i.partner),
    top_body_parts: countBy(injuries, (i) => i.name || i.body_part),
    time_buckets: timeBuckets,
  };
}

function syncInjuryData(injuries) {
  const uiToBotSev = { watch: "minor", fresh: "moderate", critical: "severe", managing: "managing" };
  window.__bjjdata = window.__bjjdata || {};
  const mapped = injuries.map((inj) => ({
    id: String(inj.id || "").startsWith("bot-injury-") ? parseInt(String(inj.id).replace("bot-injury-", ""), 10) : inj.id,
    body_part: inj.name || inj.body_part || "",
    severity: uiToBotSev[inj.severity] || inj.severity || "minor",
    notes: inj.description || inj.notes || "",
    date: inj.date || "",
    resolved: inj.resolved || false,
    partner: inj.partner || "",
    when_happened: inj.when_happened || "",
    created_at: inj.createdAt || inj.created_at || inj.date || "",
  }));
  window.__bjjdata.all_injuries = mapped;
  window.__bjjdata.injuries_active = mapped.filter((inj) => !inj.resolved);
  window.__bjjdata.injury_stats = injuryStatsFromList(injuries);
}

// ---------- Page ----------
function MicroInjuries({ onBack }) {
  const { injuries, pinned, setInjuries: setInjuriesRaw, setPinned } = useMicroInjuriesStore();
  const setInjuries = (next) => {
    setInjuriesRaw((prev) => {
      const value = typeof next === "function" ? next(prev) : next;
      syncInjuryData(value);
      return value;
    });
  };
  const [confirmId, setConfirmId] = useStateMI(null);
  const [adding, setAdding] = useStateMI(false);
  const [editingId, setEditingId] = useStateMI(null);
  const [detailId, setDetailId] = useStateMI(null);
  const [analyticsOpen, setAnalyticsOpen] = useStateMI(true);
  const [sortMode, setSortMode] = useStateMI(() => {
    try { return localStorage.getItem("micro_injuries_sort") || "severity"; } catch { return "severity"; }
  });
  const updateSort = (m) => {
    setSortMode(m);
    try { localStorage.setItem("micro_injuries_sort", m); } catch {}
  };

  const togglePin = (id) => {
    setPinned((prev) => prev.includes(id) ? prev.filter((x) => x !== id) : [...prev, id]);
  };
  const uiBotSev = { watch: "minor", fresh: "moderate", critical: "severe", managing: "managing" };

  const deleteInjury = (id) => {
    const injId = id.startsWith("bot-injury-")
      ? parseInt(id.replace("bot-injury-", ""), 10)
      : NaN;
    setInjuries((prev) => prev.filter((p) => p.id !== id));
    setPinned((prev) => prev.filter((x) => x !== id));
    setConfirmId(null);
    if (detailId === id) setDetailId(null);
    if (!isNaN(injId)) apiCall("DELETE", `/api/injuries/${injId}`);
  };
  const addInjury = async (name, severity, region, rest, description, partner, whenHappened) => {
    const createdAt = new Date().toISOString();
    const id = name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "")
      + "-" + Date.now().toString(36);
    setInjuries((prev) => [...prev, { id, name, severity, region, rest, description, partner, when_happened: whenHappened, createdAt }]);
    setAdding(false);
    const response = await apiCall("POST", "/api/injuries", {
      body_part: name,
      severity: uiBotSev[severity] || "minor",
      notes: description || "",
      partner: partner || "",
      when_happened: whenHappened || "",
    });
    if (response && response.ok !== false && response.id) {
      setInjuries((prev) => prev.map((p) => p.id === id ? {
        ...p,
        id: `bot-injury-${response.id}`,
        date: response.date,
        createdAt: response.created_at || createdAt,
      } : p));
    }
  };
  const updateInjury = (id, name, severity, region, rest, description, partner, whenHappened) => {
    const injId = id.startsWith("bot-injury-")
      ? parseInt(id.replace("bot-injury-", ""), 10)
      : NaN;
    setInjuries((prev) => prev.map((p) => p.id === id ? { ...p, name, severity, region, rest, description, partner, when_happened: whenHappened } : p));
    setEditingId(null);
    if (!isNaN(injId)) {
      apiCall("PATCH", `/api/injuries/${injId}`, {
        body_part: name,
        severity: uiBotSev[severity] || "minor",
        notes: description || "",
        partner: partner || "",
        when_happened: whenHappened || "",
      });
    }
  };

  const botSevMap = {
    minor: "watch", moderate: "fresh", severe: "critical",
    watch: "watch", fresh: "fresh", critical: "critical", managing: "managing"
  };
  const liveInjuries = window.__bjjdata && Array.isArray(window.__bjjdata.all_injuries) && window.__bjjdata.all_injuries.length > 0
    ? window.__bjjdata.all_injuries.map(inj => ({
        id: `bot-injury-${inj.id}`,
        name: inj.body_part,
        severity: botSevMap[inj.severity] || "watch",
        region: "other",
        rest: inj.resolved ? "resolved" : "monitor",
        description: inj.notes || "",
        date: inj.date,
        createdAt: inj.created_at || inj.date,
        resolved: inj.resolved,
        partner: inj.partner,
        when_happened: inj.when_happened,
      }))
    : null;
  const sameInjury = (a, b) =>
    String(a.name || "").trim().toLowerCase() === String(b.name || "").trim().toLowerCase() &&
    String(a.description || "").trim().toLowerCase() === String(b.description || "").trim().toLowerCase();
  const lookupPool = liveInjuries
    ? [
        ...liveInjuries,
        ...injuries.filter((inj) => !String(inj.id || "").startsWith("bot-injury-") && !liveInjuries.some((live) => sameInjury(live, inj))),
      ]
    : injuries;
  const sorted = sortMicroInjuries(lookupPool, pinned, sortMode);
  const confirmInjury = lookupPool.find((p) => p.id === confirmId);
  const editingInjury = lookupPool.find((p) => p.id === editingId);
  const detailInjury  = lookupPool.find((p) => p.id === detailId);
  const injuryStats = (window.__bjjdata && window.__bjjdata.injury_stats) || null;
  const displayStats = React.useMemo(() => buildMicroInjuryStats(lookupPool, injuryStats), [lookupPool, injuryStats]);

  return (
    <div style={{ minHeight: "100vh", paddingTop: 100, paddingBottom: 120, paddingLeft: "clamp(16px, 4vw, 24px)", paddingRight: "clamp(16px, 4vw, 24px)" }}>
      <div style={{ maxWidth: 1120, margin: "0 auto" }}>
        {/* Header */}
        <div style={{ marginBottom: 32 }}>
          <button onClick={onBack} className="stripe-cta secondary" style={{ marginBottom: 12 }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            Back
          </button>
          <div style={{ marginBottom: 28 }}>
            <div style={{
              fontFamily: "Inter, var(--font-display)", fontSize: 22, fontWeight: 900,
              letterSpacing: "-0.05em", color: "var(--stripe-ink)",
            }}>Micro-Injuries</div>
            <div style={{
              fontFamily: "Inter, var(--font-text)", fontSize: 14,
              color: "var(--stripe-faint)", marginTop: 4,
            }}>Tweaks, strains, and things you're managing</div>
          </div>
        </div>

        {displayStats.total > 0 && (
          <MicroInjuryStatsPanel
            stats={displayStats}
            open={analyticsOpen}
            onToggle={() => setAnalyticsOpen((v) => !v)}
          />
        )}

        {/* Sort */}
        <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 14 }}>
          <SortMenu value={sortMode} onChange={updateSort} options={MICRO_INJURIES_SORT_OPTIONS} />
        </div>

        {/* List */}
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {sorted.map((p) => (
            <MicroInjuryRow
              key={p.id}
              injury={p}
              isPinned={pinned.includes(p.id)}
              onClick={() => setDetailId(p.id)}
              onTogglePin={() => togglePin(p.id)}
              onRequestEdit={() => setEditingId(p.id)}
              onRequestDelete={() => setConfirmId(p.id)}
            />
          ))}
        </div>

        {sorted.length === 0 && (
          <div style={{
            textAlign: "center", padding: "48px 24px",
            fontSize: 15, color: "var(--stripe-faint)",
          }}>
            No injuries tracked. Tap + to log one.
          </div>
        )}
      </div>

      {/* Floating + button */}
      <button
        onClick={() => setAdding(true)}
        aria-label="Add micro-injury"
        style={{
          position: "fixed", bottom: "calc(32px + env(safe-area-inset-bottom, 0px))", right: 32, zIndex: 50,
          width: 56, height: 56, borderRadius: "50%",
          background: "var(--stripe-card)",
          border: "1px solid var(--stripe-line)", padding: 0, cursor: "pointer",
          color: "var(--stripe-blue)",
          boxShadow: "var(--shadow-pop)",
          display: "flex", alignItems: "center", justifyContent: "center",
          transition: "transform 160ms cubic-bezier(0.32,0.72,0,1)",
        }}
        onMouseEnter={(e) => { e.currentTarget.style.transform = "scale(1.06)"; }}
        onMouseLeave={(e) => { e.currentTarget.style.transform = "scale(1)"; }}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" style={{ position: "relative" }}>
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>

      {/* Detail modal */}
      {detailInjury && (
        <MicroInjuryDetailModal
          injury={detailInjury}
          isPinned={pinned.includes(detailInjury.id)}
          onClose={() => setDetailId(null)}
          onTogglePin={() => togglePin(detailInjury.id)}
          onEdit={() => { setDetailId(null); setEditingId(detailInjury.id); }}
          onRequestDelete={() => setConfirmId(detailInjury.id)}
        />
      )}

      {/* Add modal */}
      {adding && (
        <MicroInjuryFormModal
          mode="add"
          onCancel={() => setAdding(false)}
          onSubmit={(name, severity, region, rest, description, partner, whenHappened) => addInjury(name, severity, region, rest, description, partner, whenHappened)}
        />
      )}

      {/* Edit modal */}
      {editingInjury && (
        <MicroInjuryFormModal
          mode="edit"
          initial={editingInjury}
          onCancel={() => setEditingId(null)}
          onSubmit={(name, severity, region, rest, description, partner, whenHappened) => updateInjury(editingInjury.id, name, severity, region, rest, description, partner, whenHappened)}
        />
      )}

      {/* Delete confirm */}
      {confirmInjury && (
        <DeleteMicroInjuryConfirm
          injury={confirmInjury}
          onCancel={() => setConfirmId(null)}
          onConfirm={() => deleteInjury(confirmInjury.id)}
        />
      )}
    </div>
  );
}
