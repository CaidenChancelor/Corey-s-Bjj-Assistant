function Editor() {
  const [focused, setFocused] = useStateEd(false);
  const [value, setValue] = useStateEd("");
  const [messages, setMessages] = useStateEd([]);
  const [loading, setLoading] = useStateEd(false);
  const messagesEndRef = useRefEd(null);
  // Feature 2: track deploy-done state per message index
  const [deployDoneMap, setDeployDoneMap] = useStateEd({});
  const deployTimers = useRefEd({});
  // Feature 3: voice input
  const [listening, setListening] = useStateEd(false);
  // Feature 4: session title (first 40 chars of first user message sent this session)
  const [sessionTitle, setSessionTitle] = useStateEd(null);
  const hasSetTitle = useRefEd(false);

  useEffectEd(() => {
    fetch("/editor/history")
      .then(r => r.json())
      .then(data => {
        if (data.messages && data.messages.length > 0) {
          setMessages(data.messages.map(m => ({
            role: m.role === "assistant" ? "claude" : m.role,
            body: m.content,
            toolEvents: [],
          })));
          setTimeout(() => {
            if (messagesEndRef.current) messagesEndRef.current.scrollIntoView({ behavior: "smooth" });
          }, 150);
        }
      })
      .catch(() => {});
  }, []);

  // Feature 2: when messages change, set up deploy timers for any new write_file messages
  useEffectEd(() => {
    messages.forEach((m, i) => {
      if (
        m.role === "claude" &&
        m.toolEvents && m.toolEvents.some(e => e.tool === "write_file") &&
        deployDoneMap[i] === undefined &&
        !deployTimers.current[i]
      ) {
        deployTimers.current[i] = setTimeout(() => {
          setDeployDoneMap(prev => ({ ...prev, [i]: true }));
        }, 62000);
        setDeployDoneMap(prev => ({ ...prev, [i]: false }));
      }
    });
  }, [messages]);

  const handleSend = async (overrideText) => {
    const text = (typeof overrideText === "string" ? overrideText : value).trim();
    if (!text) return;
    // Feature 4: set session title from first user message sent this session
    if (!hasSetTitle.current) {
      setSessionTitle(text.slice(0, 40));
      hasSetTitle.current = true;
    }
    setMessages(prev => [...prev, { role: "user", body: text }]);
    setValue("");
    setLoading(true);
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 120000); // 2 min timeout
    try {
      const res = await fetch("/editor/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
        signal: controller.signal,
      });
      clearTimeout(timeoutId);
      const data = await res.json();
      const reply = data.reply || data;
      const toolEvents = data.tool_events || [];
      setMessages(prev => [...prev, {
        role: "claude",
        body: typeof reply === "string" ? reply : (reply.reply || String(reply)),
        toolEvents: toolEvents,
      }]);
      setTimeout(() => {
        if (messagesEndRef.current) messagesEndRef.current.scrollIntoView({ behavior: "smooth" });
      }, 100);
    } catch (e) {
      clearTimeout(timeoutId);
      const msg = e.name === "AbortError" ? "Request timed out — Claude took too long. Try a simpler request." : "Failed to reach server.";
      setMessages(prev => [...prev, { role: "claude", body: msg }]);
    } finally {
      setLoading(false);
    }
  };

  const clearHistory = async () => {
    await fetch("/editor/clear", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
    });
    setMessages([]);
    setDeployDoneMap({});
    deployTimers.current = {};
    setSessionTitle(null);
    hasSetTitle.current = false;
  };

  // Feature 3: voice input handler
  const handleVoice = () => {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      alert("Voice input not supported in this browser");
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      setValue(prev => prev + (prev ? ' ' : '') + transcript);
    };
    recognition.start();
    setListening(true);
    recognition.onend = () => setListening(false);
    recognition.onerror = () => setListening(false);
  };

  const onSend = handleSend;
  // Feature 1: always show quick actions (especially important on mobile where
  // the keyboard hides the empty state before the user can see chips)
  const showQuickActions = true;

  return (
    <div style={{
      paddingTop: "calc(88px + env(safe-area-inset-top, 0px))",
      paddingBottom: "calc(40px + env(safe-area-inset-bottom, 0px))",
      paddingLeft: "clamp(16px, 4vw, 24px)",
      paddingRight: "clamp(16px, 4vw, 24px)",
      minHeight: "100vh", boxSizing: "border-box",
      display: "flex", flexDirection: "column",
    }}>
      <div style={{ maxWidth: 760, margin: "0 auto", width: "100%", flex: 1, display: "flex", flexDirection: "column" }}>
        {/* Header */}
        <div style={{ marginBottom: 24, paddingLeft: 4, display: "flex", alignItems: "flex-end", justifyContent: "space-between" }}>
          <div>
            <Eyebrow style={{ marginBottom: 10 }}>conversation · today</Eyebrow>
            <div style={{
              fontFamily: "var(--font-display)", fontSize: "clamp(24px, 5vw, 32px)", fontWeight: 600,
              letterSpacing: "-0.03em", color: "#1d1d1f", lineHeight: 1.1,
            }}>Editor</div>
            {/* Feature 4: session title */}
            {sessionTitle && (
              <div style={{
                marginTop: 5,
                fontSize: 13, color: "rgba(29,29,31,0.42)",
                letterSpacing: "-0.008em", fontStyle: "italic",
                lineHeight: 1.3,
              }}>{sessionTitle}{sessionTitle.length >= 40 ? "…" : ""}</div>
            )}
          </div>
          {messages.length > 0 && (
            <button onClick={clearHistory} style={{
              background: "none", border: "1px solid rgba(29,29,31,0.15)", borderRadius: 8,
              padding: "6px 14px", fontSize: 13, fontFamily: "var(--font-text)",
              color: "rgba(29,29,31,0.55)", cursor: "pointer", marginBottom: 4,
            }}>Clear</button>
          )}
        </div>

        <div style={{ flex: 1, marginBottom: 24, minHeight: 360 }}>
          {messages.length === 0 ? (
            <div style={{
              height: "100%", minHeight: 360,
              display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
              gap: 18, opacity: 0.85,
            }}>
              <SparkleLogo size={72} glow />
              <div style={{
                fontFamily: "var(--font-display)", fontSize: 22, fontWeight: 500,
                letterSpacing: "-0.02em", color: "#1d1d1f",
              }}>Ask Claude about today's training.</div>
            </div>
          ) : (
            <>
              {messages.map((m, i) => (
                <ChatMessage
                  key={i}
                  role={m.role}
                  body={m.body}
                  toolEvents={m.toolEvents}
                  deployDone={deployDoneMap[i]}
                />
              ))}
              {loading && <ChatMessage role="claude" body="" loading={true} />}
              <div ref={messagesEndRef} />
            </>
          )}
        </div>

        {/* Feature 1: Quick action chips — always visible, scrollable on mobile */}
        {showQuickActions && (
          <div
            className="editor-chips"
            style={{
              display: "flex", gap: 8, overflowX: "auto", paddingBottom: 10,
              scrollbarWidth: "none", WebkitOverflowScrolling: "touch",
              scrollSnapType: "x proximity",
              WebkitOverflowScrolling: "touch",
            }}
          >
            <style>{`
              .editor-chips::-webkit-scrollbar { display: none; }
              .editor-chips { -ms-overflow-style: none; scrollbar-width: none; }
              .quick-chip:hover { background: rgba(122,92,255,0.12) !important; border-color: rgba(122,92,255,0.4) !important; }
            `}</style>
            {QUICK_ACTIONS.map((action) => (
              <button
                key={action}
                className="quick-chip"
                onClick={() => handleSend(action)}
                style={{
                  flexShrink: 0,
                  scrollSnapAlign: "start",
                  padding: "9px 16px",
                  minHeight: 36,
                  borderRadius: 980,
                  background: "rgba(122,92,255,0.06)",
                  border: "1px solid rgba(122,92,255,0.22)",
                  fontSize: 14,
                  color: "#5a40cc",
                  letterSpacing: "-0.01em",
                  cursor: "pointer",
                  fontFamily: "var(--font-text)",
                  whiteSpace: "nowrap",
                  transition: "background 0.15s ease, border-color 0.15s ease",
                  WebkitTapHighlightColor: "transparent",
                  touchAction: "manipulation",
                }}
              >{action}</button>
            ))}
          </div>
        )}

        <Composer
          focused={focused}
          setFocused={setFocused}
          value={value}
          setValue={setValue}
          onSend={onSend}
          listening={listening}
          onVoice={handleVoice}
        />
        <div style={{ fontSize: 12, color: "rgba(29,29,31,0.45)", textAlign: "center", marginTop: 12 }}>
          Enter to send · Shift + Enter for a new line
        </div>
      </div>
    </div>
  );
}

window.Editor = Editor;

</script>
  <script type="text/babel">
// Bruno Private Lessons — list of all lessons + detail drill-down
// Reads/writes shared brunoStore. Pin (star), edit (pencil), delete (trash),
// and add via floating + button. Tap a row to open detail modal.

const { useState: useStateBL } = React;

function BrunoLessons({ onBack, onOpenDetail }) {
  const { lessons, pinned, setLessons, setPinned } = useBrunoStore();
  const [confirmId, setConfirmId] = useStateBL(null);
  const [adding, setAdding] = useStateBL(false);
  const [editingId, setEditingId] = useStateBL(null);
  const [sortMode, setSortMode] = useStateBL(() => {
    try { return localStorage.getItem("bruno_sort") || "newest"; } catch { return "newest"; }
  });
  const updateSort = (m) => {
    setSortMode(m);
    try { localStorage.setItem("bruno_sort", m); } catch {}
  };

  const togglePin = (id) => {
    setPinned((prev) => prev.includes(id) ? prev.filter((x) => x !== id) : [id, ...prev]);
  };
  const deleteLesson = (id) => {
    setLessons((prev) => prev.filter((l) => l.id !== id));
    setPinned((prev) => prev.filter((x) => x !== id));
    setConfirmId(null);
  };
  const addLesson = (data) => {
    const id = "L-" + Date.now().toString(36);
    // newest first → unshift
    setLessons((prev) => [{ ...data, id }, ...prev]);
    setAdding(false);
  };
  const updateLesson = (id, data) => {
    setLessons((prev) => prev.map((l) => l.id === id ? { ...l, ...data } : l));
    setEditingId(null);
  };

  const sorted = sortBrunoLessons(lessons, pinned, sortMode);
  const confirmLesson = lessons.find((l) => l.id === confirmId);
  const editingLesson = lessons.find((l) => l.id === editingId);

  return (
    <div style={{ paddingTop: 100, paddingBottom: 120, paddingLeft: "clamp(16px, 4vw, 24px)", paddingRight: "clamp(16px, 4vw, 24px)" }}>
      <div style={{ maxWidth: 880, margin: "0 auto" }}>
        {/* Back */}
        <button
          onClick={onBack}
          style={{
            display: "inline-flex", alignItems: "center", gap: 8,
            background: "transparent", border: "none", cursor: "pointer",
            color: "rgba(29,29,31,0.62)", fontSize: 14, padding: "8px 0",
            marginBottom: 18, fontFamily: "var(--font-text)",
          }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Back to dashboard
        </button>

        {/* Header */}
        <div style={{ marginBottom: 28, paddingLeft: 4 }}>
          <Eyebrow style={{ marginBottom: 10 }}>private coaching · with bruno</Eyebrow>
          <div style={{
            fontFamily: "var(--font-display)", fontSize: 40, fontWeight: 600,
            letterSpacing: "-0.03em", color: "#1d1d1f", lineHeight: 1.1,
            marginBottom: 10,
          }}>Bruno lesson notes</div>
          <div style={{ fontSize: 16, color: "rgba(29,29,31,0.62)", lineHeight: 1.5, maxWidth: 560 }}>
            Every Tuesday session, summarized. Tap a lesson to see the full notes — hover to pin, edit, or delete.
          </div>
        </div>

        {/* Sort */}
        <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 14 }}>
          <SortMenu value={sortMode} onChange={updateSort} options={BRUNO_SORT_OPTIONS} />
        </div>

        {/* List */}
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {sorted.map((l) => (
            <LessonRow
              key={l.id}
              lesson={l}
              isPinned={pinned.includes(l.id)}
              onClick={() => onOpenDetail(l.id)}
              onTogglePin={() => togglePin(l.id)}
              onRequestEdit={() => setEditingId(l.id)}
              onRequestDelete={() => setConfirmId(l.id)}
            />
          ))}
        </div>

        {sorted.length === 0 && (
          <div style={{
            textAlign: "center", padding: "48px 24px",
            fontSize: 15, color: "rgba(29,29,31,0.55)",
          }}>
            No lessons yet. Tap + to add one.
          </div>
        )}
      </div>

      {/* Floating + button — transparent fill, rainbow border */}
      <button
        onClick={() => setAdding(true)}
        aria-label="Add lesson"
        style={{
          position: "fixed", bottom: "calc(32px + env(safe-area-inset-bottom, 0px))", right: 32, zIndex: 50,
          width: 56, height: 56, borderRadius: "50%",
          background: "transparent",
          border: "none", padding: 0, cursor: "pointer",
          color: "#7a5cff",
          display: "flex", alignItems: "center", justifyContent: "center",
          transition: "transform 160ms cubic-bezier(0.32,0.72,0,1)",
        }}
        onMouseEnter={(e) => { e.currentTarget.style.transform = "scale(1.06)"; }}
        onMouseLeave={(e) => { e.currentTarget.style.transform = "scale(1)"; }}>
        <span aria-hidden="true" style={{
          position: "absolute", inset: 0, borderRadius: "50%",
          padding: 1.5,
          background: "linear-gradient(120deg, #ff4f9a 0%, #c862ff 35%, #7a5cff 65%, #4cd6ff 100%)",
          WebkitMask: "linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0)",
          WebkitMaskComposite: "xor",
          maskComposite: "exclude",
          pointerEvents: "none",
        }}/>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" style={{ position: "relative" }}>
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>

      {/* Add modal */}
      {adding && (
        <LessonFormModal
          mode="add"
          onCancel={() => setAdding(false)}
          onSubmit={(data) => addLesson(data)}
        />
      )}

      {/* Edit modal */}
      {editingLesson && (
        <LessonFormModal
          mode="edit"
          initial={editingLesson}
          onCancel={() => setEditingId(null)}
          onSubmit={(data) => updateLesson(editingLesson.id, data)}
        />
      )}

      {/* Confirm-delete modal */}
      {confirmLesson && (
        <DeleteLessonConfirm
          lesson={confirmLesson}
          onCancel={() => setConfirmId(null)}
          onConfirm={() => deleteLesson(confirmLesson.id)}
        />
      )}
    </div>
  );
}

// =====================================================
// Add / Edit modal
// =====================================================
function LessonFormModal({ mode, initial, onCancel, onSubmit }) {
  const [week, setWeek] = useStateBL(initial?.week ?? "");
  const [date, setDate] = useStateBL(initial?.date ?? "");
  const [summary, setSummary] = useStateBL(initial?.summary ?? "");
  const [description, setDescription] = useStateBL(initial?.description ?? "");
  const [notesText, setNotesText] = useStateBL(
    initial ? (initial.notes || []).join("\n") : ""
  );

  const submit = () => {
    if (!summary.trim()) return;
    const notes = notesText.split("\n").map((n) => n.trim()).filter(Boolean);
    onSubmit({
      week: week.trim() || "—",
      date: date.trim() || "—",
      summary: summary.trim(),
      description: description.trim(),
      notes,
    });
  };

  return (
    <div
      onClick={onCancel}
      style={{
        position: "fixed", inset: 0, zIndex: 100,
        background: "rgba(20,20,30,0.32)", backdropFilter: "blur(6px)",
        display: "flex", alignItems: "center", justifyContent: "center", padding: 24,
        animation: "blFadeIn 160ms ease both",
      }}>
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: "100%", maxWidth: 520, maxHeight: "calc(100dvh - 48px)",
          overflowY: "auto",
          background: "#fff", borderRadius: 22, padding: 28,
          boxShadow: "0 24px 64px -16px rgba(20,20,40,0.30), 0 1px 0 rgba(255,255,255,0.9) inset",
          animation: "blPopIn 220ms cubic-bezier(0.32,0.72,0,1) both",
        }}>
        <div style={{
          fontFamily: "var(--font-display)", fontSize: 22, fontWeight: 600,
          letterSpacing: "-0.02em", color: "#1d1d1f", marginBottom: 6,
        }}>{mode === "edit" ? "Edit lesson" : "Add a lesson"}</div>
        <div style={{ fontSize: 14, color: "rgba(29,29,31,0.62)", marginBottom: 18 }}>
          {mode === "edit" ? "Update any field below." : "Capture today's session with Bruno."}
        </div>

        {/* Week + Date row */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
          <FormField label="Week">
            <input
              value={week}
              onChange={(e) => setWeek(e.target.value)}
              placeholder="Week 15"
              style={inputStyle}
            />
          </FormField>
          <FormField label="Date">
            <input
              value={date}
              onChange={(e) => setDate(e.target.value)}
              placeholder="Tue, Apr 29"
              style={inputStyle}
            />
          </FormField>
        </div>

        {/* Summary */}
        <FormField label="Headline" style={{ marginBottom: 12 }}>
          <input
            autoFocus
            value={summary}
            onChange={(e) => setSummary(e.target.value)}
            placeholder="e.g. Collar drag re-grip clicked"
            style={inputStyle}
          />
        </FormField>

        {/* Description */}
        <FormField label="One-liner" style={{ marginBottom: 12 }}>
          <textarea
            value={description}
            onChange={(e) => setDescription(e.target.value)}
            placeholder="The big takeaway in a sentence or two."
            rows={3}
            style={{ ...inputStyle, resize: "vertical", minHeight: 70, lineHeight: 1.5 }}
          />
        </FormField>

        {/* Notes — line-per-bullet */}
        <FormField
          label="Full notes"
          hint="One line per bullet. Wrap text in **double-asterisks** to bold it."
          style={{ marginBottom: 22 }}>
          <textarea
            value={notesText}
            onChange={(e) => setNotesText(e.target.value)}
            placeholder={"**Set-up.** What grip did you start with?\n**Key insight.** What clicked?\n**Drilled:** rounds × time"}
            rows={7}
            style={{ ...inputStyle, resize: "vertical", minHeight: 130, lineHeight: 1.55, fontFamily: "var(--font-text)" }}
          />
        </FormField>

        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button onClick={onCancel} style={{
            padding: "10px 18px", fontSize: 14, fontWeight: 500,
            border: "1px solid rgba(0,0,0,0.10)", borderRadius: 10,
            background: "#fff", color: "#1d1d1f", cursor: "pointer",
          }}>Cancel</button>
          {summary.trim() ? (
            <span style={{ position: "relative", display: "inline-flex", borderRadius: 10 }}>
              <span style={{
                position: "absolute", inset: 0, borderRadius: 10,
                padding: 1.5,
                background: "linear-gradient(120deg, #4cd6ff 0%, #7a5cff 50%, #ff4f9a 100%)",
                WebkitMask: "linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0)",
                mask: "linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0)",
                WebkitMaskComposite: "xor",
                maskComposite: "exclude",
                pointerEvents: "none",
              }}></span>
              <button onClick={submit} style={{
                position: "relative",
                padding: "10px 20px", fontSize: 14, fontWeight: 600,
                border: "none", borderRadius: 10, cursor: "pointer",
                color: "#1d1d1f",
                background: "transparent",
                transition: "all 160ms ease",
              }}>{mode === "edit" ? "Save" : "Add lesson"}</button>
            </span>
          ) : (
            <button disabled style={{
              padding: "10px 20px", fontSize: 14, fontWeight: 600,
              border: "1px solid rgba(0,0,0,0.10)", borderRadius: 10, cursor: "not-allowed",
              color: "rgba(29,29,31,0.4)",
              background: "transparent",
            }}>{mode === "edit" ? "Save" : "Add lesson"}</button>
          )}
        </div>
      </div>
      <style>{`
        @keyframes blFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes blPopIn  { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
      `}</style>
    </div>
  );
}

const inputStyle = {
  width: "100%", padding: "11px 14px", fontSize: 16,
  border: "1px solid rgba(0,0,0,0.12)", borderRadius: 10,
  outline: "none", fontFamily: "var(--font-text)", boxSizing: "border-box",
  color: "#1d1d1f",
  background: "#fff",
};

    <div style={style}>
      <div style={{
        fontSize: 11, fontWeight: 600, letterSpacing: "0.06em",
        textTransform: "uppercase", color: "rgba(29,29,31,0.55)",
        marginBottom: 6,
      }}>{label}</div>
      {children}
      {hint && (
        <div style={{ fontSize: 12, color: "rgba(29,29,31,0.50)", marginTop: 6, lineHeight: 1.4 }}>
          {hint}
        </div>
      )}
    </div>
  );
}

// =====================================================

// =====================================================
// Lesson detail page — full notes for one lesson
// =====================================================
function BrunoLessonDetail({ lessonId, onBack }) {
  const { lessons, pinned, setLessons, setPinned } = useBrunoStore();
  const lesson = lessons.find((l) => l.id === lessonId);
  const [editing, setEditing] = useStateBL(false);
  const [confirming, setConfirming] = useStateBL(false);
  const isPinned = pinned.includes(lesson?.id);

  const togglePin = () => setPinned((prev) =>
    prev.includes(lesson.id) ? prev.filter((x) => x !== lesson.id) : [lesson.id, ...prev]
  );
  const updateLesson = (data) => {
    setLessons((prev) => prev.map((l) => l.id === lesson.id ? { ...l, ...data } : l));
    setEditing(false);
  };
  const deleteLesson = () => {
    setLessons((prev) => prev.filter((l) => l.id !== lesson.id));
    setPinned((prev) => prev.filter((x) => x !== lesson.id));
    onBack();
  };

  if (!lesson) {
    return (
      <div style={{ paddingTop: 100, paddingLeft: "clamp(16px, 4vw, 24px)", paddingRight: "clamp(16px, 4vw, 24px)", textAlign: "center" }}>
        <button onClick={onBack} style={{ background: "transparent", border: "none", cursor: "pointer", color: "rgba(29,29,31,0.62)" }}>← Back</button>
        <div style={{ marginTop: 24, fontSize: 16, color: "rgba(29,29,31,0.55)" }}>This lesson was deleted.</div>
      </div>
    );
  }

  // Render bold markers (**…**) as inline <strong>
  const renderInline = (text) => {
    const parts = text.split(/(\*\*[^*]+\*\*)/g);
    return parts.map((p, i) =>
      p.startsWith("**") && p.endsWith("**")
        ? <strong key={i} style={{ color: "#1d1d1f", fontWeight: 600 }}>{p.slice(2, -2)}</strong>
        : <React.Fragment key={i}>{p}</React.Fragment>
    );
  };

  return (
    <div style={{ paddingTop: 100, paddingBottom: 80, paddingLeft: "clamp(16px, 4vw, 24px)", paddingRight: "clamp(16px, 4vw, 24px)" }}>
      <div style={{ maxWidth: 720, margin: "0 auto" }}>
        {/* Back + actions row */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18 }}>
          <button
            onClick={onBack}
            style={{
              display: "inline-flex", alignItems: "center", gap: 8,
              background: "transparent", border: "none", cursor: "pointer",
              color: "rgba(29,29,31,0.62)", fontSize: 14, padding: "8px 0",
              fontFamily: "var(--font-text)",
            }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            All lessons
          </button>

          {/* Star · Pencil · Trash */}
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <button
              onClick={togglePin}
              aria-label={isPinned ? "Unpin" : "Pin"}
              style={{
                width: 40, height: 40, borderRadius: "50%", border: "none",
                background: isPinned ? "rgba(255,159,28,0.10)" : "transparent",
                cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                color: isPinned ? "#ff9f1c" : "rgba(29,29,31,0.45)",
                transition: "all 160ms ease",
              }}>
              <svg width="20" height="20" viewBox="0 0 24 24"
                   fill={isPinned ? "currentColor" : "none"}
                   stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                   style={{ filter: isPinned ? "drop-shadow(0 2px 6px rgba(255,159,28,0.55))" : "none" }}>
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
            </button>
            <button
              onClick={() => setEditing(true)}
              aria-label="Edit lesson"
              style={{
                width: 40, height: 40, borderRadius: "50%", border: "none",
                background: "transparent",
                cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                color: "rgba(29,29,31,0.45)",
                transition: "all 160ms ease",
              }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>
            </button>
            <button
              onClick={() => setConfirming(true)}
              aria-label="Delete lesson"
              style={{
                width: 40, height: 40, borderRadius: "50%", border: "none",
                background: "transparent",
                cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                color: "rgba(29,29,31,0.45)",
                transition: "all 160ms ease",
              }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                <line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
              </svg>
            </button>
          </div>
        </div>

        {/* Header */}
        <div style={{ marginBottom: 32, paddingLeft: 4 }}>
          <Eyebrow style={{ marginBottom: 10 }}>{lesson.week} · {lesson.date}</Eyebrow>
          <div style={{
            fontFamily: "var(--font-display)", fontSize: "clamp(26px, 5vw, 36px)", fontWeight: 600,
            letterSpacing: "-0.03em", color: "#1d1d1f", lineHeight: 1.15,
            marginBottom: 14,
          }}>{lesson.summary}</div>
          <div style={{ fontSize: 17, color: "rgba(29,29,31,0.65)", lineHeight: 1.55, maxWidth: 600 }}>
            {lesson.description}
          </div>
        </div>

        {/* Notes card */}
        <div style={{
          background: "#ffffff",
          borderRadius: 24,
          padding: "28px 32px",
          border: "1px solid rgba(0,0,0,0.06)",
          boxShadow:
            "0 1px 2px rgba(0,0,0,0.03)," +
            " 0 8px 24px -10px rgba(255,79,154,0.18)," +
            " 0 10px 28px -12px rgba(122,92,255,0.18)," +
            " 0 12px 32px -10px rgba(76,214,255,0.16)",
        }}>
          <Eyebrow style={{ marginBottom: 18 }}>full notes</Eyebrow>
          {lesson.notes && lesson.notes.length > 0 ? (
            <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              {lesson.notes.map((n, i) => (
                <div key={i} style={{
                  fontSize: 15.5, lineHeight: 1.65,
                  color: "rgba(29,29,31,0.82)", letterSpacing: "-0.005em",
                }}>{renderInline(n)}</div>
              ))}
            </div>
          ) : (
            <div style={{ fontSize: 15, color: "rgba(29,29,31,0.45)", fontStyle: "italic" }}>
              No detailed notes yet — tap edit to add some.
            </div>
          )}
        </div>
      </div>

      {editing && (
        <LessonFormModal
          mode="edit"
          initial={lesson}
          onCancel={() => setEditing(false)}
          onSubmit={updateLesson}
        />
      )}
      {confirming && (
        <DeleteLessonConfirm
          lesson={lesson}
          onCancel={() => setConfirming(false)}
          onConfirm={deleteLesson}
        />
      )}
    </div>
  );
}

window.BrunoLessons = BrunoLessons;
window.BrunoLessonDetail = BrunoLessonDetail;
window.LessonFormModal = LessonFormModal;
window.DeleteLessonConfirm = DeleteLessonConfirm;

</script>
  <script type="text/babel">
// Today's Schedule — full day timeline with current-time indicator

const { useState: useStateSched, useEffect: useEffectSched } = React;

const TODAY_SCHEDULE = (
  window.__bjjdata && Array.isArray(window.__bjjdata.today_schedule) && window.__bjjdata.today_schedule.length > 0
    ? window.__bjjdata.today_schedule
    : []
);

const KIND_DOT = {
  training: "linear-gradient(135deg, #ff4f9a, #7a5cff, #4cd6ff)",
  work:     "#0066cc",
  wellness: "#15a86b",
};

function useNow() {
  const [now, setNow] = useStateSched(new Date());
  useEffectSched(() => {
    const id = setInterval(() => setNow(new Date()), 30 * 1000);
    return () => clearInterval(id);
  }, []);
  return now;
}

function fmtTime(d) {
  let h = d.getHours();
  const m = d.getMinutes();
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12; if (h === 0) h = 12;
  return `${h}:${m.toString().padStart(2, "0")} ${ampm}`;
}

function fmtDate(d) {
  return d.toLocaleDateString(undefined, {
    weekday: "long", month: "long", day: "numeric",
  });
}

// Convert "19:00" → minutes since midnight
function toMins(t) { const [h, m] = t.split(":").map(Number); return h * 60 + m; }

function Schedule({ onBack }) {
  const now = useNow();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const nextIdx = TODAY_SCHEDULE.findIndex((s) => toMins(s.time) > nowMins);

  return (
    <div style={{
      paddingTop: "calc(88px + env(safe-area-inset-top, 0px))",
      paddingBottom: "calc(80px + env(safe-area-inset-bottom, 0px))",
      paddingLeft: "clamp(16px, 4vw, 24px)",
      paddingRight: "clamp(16px, 4vw, 24px)",
    }}>
      <div style={{ maxWidth: 720, margin: "0 auto" }}>
        {/* Back */}
        <button
          onClick={onBack}
          style={{
            display: "inline-flex", alignItems: "center", gap: 8,
            background: "transparent", border: "none", cursor: "pointer",
            color: "rgba(29,29,31,0.62)", fontSize: 14, padding: "8px 0",
            marginBottom: 18, fontFamily: "var(--font-text)",
          }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Back to dashboard
        </button>

        {/* Header — date + live time */}
        <div style={{ marginBottom: 28, paddingLeft: 4 }}>
          <Eyebrow style={{ marginBottom: 10 }}>today's schedule</Eyebrow>
          <div style={{
            display: "flex", alignItems: "baseline", flexWrap: "wrap",
            columnGap: 18, rowGap: 4, marginBottom: 12,
          }}>
            <div style={{
              fontFamily: "var(--font-display)", fontSize: 36, fontWeight: 600,
              letterSpacing: "-0.03em", color: "#1d1d1f", lineHeight: 1.1,
            }}>{fmtDate(now)}</div>
            <div style={{
              fontFamily: "var(--font-display)", fontSize: 22, fontWeight: 500,
              letterSpacing: "-0.02em", color: "#2997ff", lineHeight: 1.1,
              fontVariantNumeric: "tabular-nums",
            }}>{fmtTime(now)}</div>
          </div>
          <div style={{ fontSize: 16, color: "rgba(29,29,31,0.62)", lineHeight: 1.5, maxWidth: 560 }}>
            {nextIdx === -1
              ? "Day's done — log the session and wind down."
              : <>Next up: <span style={{ color: "#1d1d1f", fontWeight: 500 }}>{TODAY_SCHEDULE[nextIdx].label}</span> at {TODAY_SCHEDULE[nextIdx].time}</>}
          </div>
        </div>

        {/* Schedule list */}
        <div style={{
          background: "#ffffff",
          borderRadius: 24,
          padding: "10px 8px",
          border: "1px solid rgba(0,0,0,0.06)",
          boxShadow:
            "0 1px 2px rgba(0,0,0,0.03)," +
            " 0 8px 24px -10px rgba(255,79,154,0.18)," +
            " 0 10px 28px -12px rgba(122,92,255,0.18)," +
            " 0 12px 32px -10px rgba(76,214,255,0.16)",
        }}>
          {TODAY_SCHEDULE.map((s, i) => {
            const mins = toMins(s.time);
            const isPast = mins <= nowMins;
            const isNext = i === nextIdx;
            return (
              <React.Fragment key={i}>
                {/* "Now" rule — sits between past and next */}
                {isNext && <NowRule time={fmtTime(now)} />}
                <ScheduleRow item={s} isPast={isPast} isNext={isNext} />
                {i < TODAY_SCHEDULE.length - 1 && (
                  <div style={{
                    height: 1, marginLeft: 96, marginRight: 16,
                    background: "rgba(0,0,0,0.05)",
                  }}></div>
                )}
              </React.Fragment>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function NowRule({ time }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 12,
      padding: "10px 18px 10px 22px",
      position: "relative",
    }}>
      <div style={{
        fontFamily: "var(--font-display)", fontSize: 12, fontWeight: 600,
        color: "#ff4f9a", letterSpacing: "0.08em", textTransform: "uppercase",
        flexShrink: 0,
      }}>now · {time}</div>
      <div style={{
        flex: 1, height: 2, borderRadius: 2,
        background: "linear-gradient(90deg, #ff4f9a 0%, #c862ff 30%, #7a5cff 60%, transparent 100%)",
      }}></div>
    </div>
  );
}

function ScheduleRow({ item, isPast, isNext }) {
  return (
    <div style={{
      display: "flex", alignItems: "flex-start", gap: 16,
      padding: "16px 18px",
      opacity: isPast && !isNext ? 0.45 : 1,
      transition: "opacity 200ms ease",
    }}>
      {/* Time column */}
      <div style={{
        flexShrink: 0, minWidth: 64,
        fontFamily: "var(--font-display)", fontSize: 15, fontWeight: 600,
        color: isNext ? "#1d1d1f" : "rgba(29,29,31,0.62)",
        letterSpacing: "-0.01em", paddingTop: 2,
        fontVariantNumeric: "tabular-nums",
      }}>{item.time}</div>

      {/* Dot */}
      <div style={{
        flexShrink: 0, paddingTop: 6,
      }}>
        <div style={{
          width: 12, height: 12, borderRadius: "50%",
          background: KIND_DOT[item.kind] || KIND_DOT.work,
          boxShadow: isNext ? "0 0 0 4px rgba(255,79,154,0.20), 0 0 14px rgba(122,92,255,0.55)" : "none",
        }}></div>
      </div>

      {/* Body */}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          fontFamily: "var(--font-display)", fontSize: 16,
          fontWeight: isNext ? 700 : 500,
          letterSpacing: "-0.02em", color: "#1d1d1f", lineHeight: 1.3,
          marginBottom: 2,
        }}>
          {item.label}
          {isNext && (
            <span style={{
              marginLeft: 10,
              fontSize: 11, fontWeight: 600, letterSpacing: "0.08em",
              textTransform: "uppercase", color: "#ff4f9a",
              padding: "2px 8px", borderRadius: 980,
              border: "1px solid rgba(255,79,154,0.40)",
              background: "transparent",
              verticalAlign: "middle",
            }}>up next</span>
          )}
        </div>
        <div style={{
          fontSize: 13.5, color: "rgba(29,29,31,0.60)", lineHeight: 1.5,
        }}>{item.meta}</div>
      </div>
    </div>
  );
}

window.Schedule = Schedule;

</script>
  <script type="text/babel">
// Today's Meals — list of every meal eaten today with calories
// Mirrors the Bruno lesson-notes page: hover row to reveal edit (pencil)
// and delete (trash). Tap a row to open a detail modal. Floating + button
// opens an Add modal. Edit modal lets you tweak food items, calories, macros.

const { useState: useStateMeals } = React;

const MEALS_DEFAULT = [
  {
    id: "M1",
    time: "07:00",
    label: "Breakfast",
    items: ["Oats with banana + almond butter", "Two eggs scrambled", "Black coffee"],
    calories: 540,
    macros: { p: 28, c: 62, f: 18 },
    notes: "Pre-training breakfast — kept it simple, ate slowly. Felt good rolling into morning class.",
  },
  {
    id: "M2",
    time: "10:15",
    label: "Mid-morning snack",
    items: ["Greek yogurt with honey", "Handful of blueberries"],
    calories: 220,
    macros: { p: 18, c: 28, f: 4 },
    notes: "Quick top-up between sessions.",
  },
  {
    id: "M3",
    time: "12:45",
    label: "Lunch",
    items: ["Grilled salmon", "Quinoa + roasted veg", "Olive oil + lemon"],
    calories: 680,
    macros: { p: 42, c: 58, f: 26 },
    notes: "Best meal of the day. Salmon was the move — recovered fast for evening drilling.",
  },
  {
    id: "M4",
    time: "15:30",
    label: "Afternoon snack",
    items: ["Apple", "20 g whey protein shake"],
    calories: 195,
    macros: { p: 22, c: 22, f: 2 },
    notes: "Pre-gym fuel. Anything heavier and I cramp on the mats.",
  },
  {
    id: "M5",
    time: "17:30",
    label: "Pre-training meal",
    items: ["Rice + chicken bowl", "Steamed broccoli", "Ginger soy glaze"],
    calories: 620,
    macros: { p: 48, c: 72, f: 12 },
    notes: "90 min before sparring. Felt heavy on the first round, dialed in by round three.",
  },
];

const CAL_GOAL = 2800;

function Meals({ onBack }) {
  const [meals, setMeals] = useStateMeals(() => {
    const liveMeals = window.__bjjdata && Array.isArray(window.__bjjdata.meals_today) && window.__bjjdata.meals_today.length > 0
      ? window.__bjjdata.meals_today.map(m => ({
          id: String(m.id),
          time: m.time || "00:00",
          label: m.name,
          calories: m.calories || 0,
          macros: { p: 0, c: 0, f: 0 },
          items: [m.name],
          notes: m.notes || "",
          kind: m.kind || "other",
        }))
      : null;
    if (liveMeals) return liveMeals;
    try {
      const raw = localStorage.getItem("meals_today_v2");
      if (raw) return JSON.parse(raw);
    } catch {}
    return [];
  });
  const [confirmId, setConfirmId] = useStateMeals(null);
  const [editingId, setEditingId] = useStateMeals(null);
  const [detailId, setDetailId] = useStateMeals(null);
  const [adding, setAdding] = useStateMeals(false);

  const persist = (next) => {
    setMeals(next);
    try { localStorage.setItem("meals_today_v2", JSON.stringify(next)); } catch {}
  };

  const total  = meals.reduce((s, m) => s + (Number(m.calories) || 0), 0);
  const remaining = Math.max(0, CAL_GOAL - total);
  const pct = Math.min(100, Math.round((total / CAL_GOAL) * 100));
  const totalP = meals.reduce((s, m) => s + (Number(m.macros?.p) || 0), 0);
  const totalC = meals.reduce((s, m) => s + (Number(m.macros?.c) || 0), 0);
  const totalF = meals.reduce((s, m) => s + (Number(m.macros?.f) || 0), 0);

  const deleteMeal = (id) => {
    const confirmMeal = meals.find((m) => m.id === id);
    persist(meals.filter((m) => m.id !== id));
    setConfirmId(null);
    if (detailId === id) setDetailId(null);
    if (confirmMeal) {
      const mealId = parseInt(confirmMeal.id, 10);
      if (!isNaN(mealId)) apiCall("DELETE", `/api/meals/${mealId}`);
    }
  };
  const updateMeal = (id, data) => {
    const editingMeal = meals.find((m) => m.id === id);
    persist(meals.map((m) => m.id === id ? { ...m, ...data } : m));
    setEditingId(null);
    if (editingMeal) {
      const mealId = parseInt(editingMeal.id, 10);
      if (!isNaN(mealId)) {
        apiCall("PATCH", `/api/meals/${mealId}`, {
          name: data.label || data.name || "",
          calories: data.calories || 0,
          kind: data.kind || "other",
          notes: data.notes || "",
          time: data.time || "",
        });
      }
    }
  };
  const addMeal = (data) => {
    const id = "M-" + Date.now().toString(36);
    // Sort by time after adding
    const next = [...meals, { ...data, id }].sort((a, b) => (a.time || "").localeCompare(b.time || ""));
    persist(next);
    setAdding(false);
    apiCall("POST", "/api/meals", {
      name: data.label || data.name || "",
      calories: data.calories || 0,
      kind: data.kind || "other",
      notes: data.notes || "",
      time: data.time || "",
    });
  };

  const confirmMeal  = confirmId ? meals.find((m) => m.id === confirmId) : null;
  const editingMeal  = editingId ? meals.find((m) => m.id === editingId) : null;
  const detailMeal   = detailId  ? meals.find((m) => m.id === detailId)  : null;

  return (
    <div style={{ paddingTop: 100, paddingBottom: 120, paddingLeft: "clamp(16px, 4vw, 24px)", paddingRight: "clamp(16px, 4vw, 24px)" }}>
      <div style={{ maxWidth: 880, margin: "0 auto" }}>
        {/* Back */}
        <button
          onClick={onBack}
          style={{
            display: "inline-flex", alignItems: "center", gap: 8,
            background: "transparent", border: "none", cursor: "pointer",
            color: "rgba(29,29,31,0.62)", fontSize: 14, padding: "8px 0",
            marginBottom: 18, fontFamily: "var(--font-text)",
          }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Back to dashboard
        </button>

        {/* Header */}
        <div style={{ marginBottom: 28, paddingLeft: 4 }}>
          <Eyebrow style={{ marginBottom: 10 }}>nutrition · today</Eyebrow>
          <div style={{
            display: "flex", alignItems: "baseline", flexWrap: "wrap",
            columnGap: 18, rowGap: 4, marginBottom: 12,
          }}>
            <div style={{
              fontFamily: "var(--font-display)", fontSize: 40, fontWeight: 600,
              letterSpacing: "-0.03em", color: "#1d1d1f", lineHeight: 1.1,
            }}>{total} <span style={{ color: "rgba(29,29,31,0.55)", fontWeight: 400, fontSize: 28 }}>cal</span></div>
            <div style={{ fontSize: 16, color: "rgba(29,29,31,0.62)", fontVariantNumeric: "tabular-nums" }}>
              of {CAL_GOAL} goal · {remaining} remaining
            </div>
          </div>

          {/* Calorie progress bar */}
          <div style={{ position: "relative", height: 14, borderRadius: 980, marginTop: 16, marginBottom: 18, maxWidth: 520 }}>
            <div style={{
              position: "absolute", inset: 0, borderRadius: 980,
              padding: 1.5,
              background: "linear-gradient(100deg, #ff4f9a 0%, #c862ff 28%, #7a5cff 52%, #3b82ff 76%, #4cd6ff 100%)",
              WebkitMask: "linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0)",
              mask: "linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0)",
              WebkitMaskComposite: "xor", maskComposite: "exclude",
              pointerEvents: "none",
            }}></div>
            <div style={{
              position: "absolute", left: 2, top: 2, bottom: 2,
              width: `calc(${pct}% - 4px)`, borderRadius: 980,
              background: "linear-gradient(180deg, #4ea3ff 0%, #2997ff 50%, #1f6fdc 100%)",
              boxShadow: "inset 0 1px 0 rgba(255,255,255,0.45), 0 0 12px rgba(41,151,255,0.5)",
            }}></div>
          </div>

          {/* Macros row */}
          <div style={{ display: "flex", gap: 24, fontVariantNumeric: "tabular-nums" }}>
            <MacroChip label="protein" value={totalP} unit="g" color="#ff4f9a" />
            <MacroChip label="carbs"   value={totalC} unit="g" color="#7a5cff" />
            <MacroChip label="fat"     value={totalF} unit="g" color="#4cd6ff" />
          </div>
        </div>

        {/* Meals list */}
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {meals.map((m) => (
            <MealRow
              key={m.id}
              meal={m}
              onClick={() => setDetailId(m.id)}
              onRequestEdit={() => setEditingId(m.id)}
              onRequestDelete={() => setConfirmId(m.id)}
            />
          ))}
        </div>

        {meals.length === 0 && (
          <div style={{
            textAlign: "center", padding: "48px 24px",
            fontSize: 15, color: "rgba(29,29,31,0.55)",
          }}>
            No meals logged today. Tap + to add one.
          </div>
        )}
      </div>

      {/* Floating + button — transparent fill, rainbow border */}
      <button
        onClick={() => setAdding(true)}
        aria-label="Add meal"
        style={{
          position: "fixed", bottom: "calc(32px + env(safe-area-inset-bottom, 0px))", right: 32, zIndex: 50,
          width: 56, height: 56, borderRadius: "50%",
          background: "transparent",
          border: "none", padding: 0, cursor: "pointer",
          color: "#7a5cff",
          display: "flex", alignItems: "center", justifyContent: "center",
          transition: "transform 160ms cubic-bezier(0.32,0.72,0,1)",
        }}
        onMouseEnter={(e) => { e.currentTarget.style.transform = "scale(1.06)"; }}
        onMouseLeave={(e) => { e.currentTarget.style.transform = "scale(1)"; }}>
        <span aria-hidden="true" style={{
          position: "absolute", inset: 0, borderRadius: "50%",
          padding: 1.5,
          background: "linear-gradient(120deg, #ff4f9a 0%, #c862ff 35%, #7a5cff 65%, #4cd6ff 100%)",
          WebkitMask: "linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0)",
          WebkitMaskComposite: "xor",
          maskComposite: "exclude",
          pointerEvents: "none",
        }}/>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" style={{ position: "relative" }}>
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>

      {/* Detail modal */}
      {detailMeal && (
        <MealDetailModal
          meal={detailMeal}
          onClose={() => setDetailId(null)}
          onEdit={() => { setEditingId(detailMeal.id); setDetailId(null); }}
          onDelete={() => { setConfirmId(detailMeal.id); }}
        />
      )}

      {/* Add modal */}
      {adding && (
        <MealFormModal
          mode="add"
          onCancel={() => setAdding(false)}
          onSubmit={(data) => addMeal(data)}
        />
      )}

      {/* Edit modal */}
      {editingMeal && (
        <MealFormModal
          mode="edit"
          initial={editingMeal}
          onCancel={() => setEditingId(null)}
          onSubmit={(data) => updateMeal(editingMeal.id, data)}
        />
      )}

      {/* Delete confirm */}
      {confirmMeal && (
        <MealDeleteConfirm
          meal={confirmMeal}
          onCancel={() => setConfirmId(null)}
          onConfirm={() => deleteMeal(confirmMeal.id)}
        />
      )}
    </div>
  );
}

function MacroChip({ label, value, unit, color }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <div style={{ width: 8, height: 8, borderRadius: "50%", background: color, boxShadow: `0 0 8px ${color}80` }}></div>
      <div>
        <div style={{
          fontFamily: "var(--font-display)", fontSize: 18, fontWeight: 600,
          letterSpacing: "-0.02em", color: "#1d1d1f", lineHeight: 1.1,
        }}>{value}<span style={{ fontSize: 13, color: "rgba(29,29,31,0.55)", fontWeight: 400, marginLeft: 2 }}>{unit}</span></div>
        <div style={{ fontSize: 11, color: "rgba(29,29,31,0.55)", textTransform: "uppercase", letterSpacing: "0.08em", marginTop: 2 }}>{label}</div>
      </div>
    </div>
  );
}

// =====================================================
// Meal row — hover reveals pencil + trash. No star.
// =====================================================
function MealRow({ meal, onClick, onRequestEdit, onRequestDelete }) {
  const [hover, setHover] = useStateMeals(false);

  return (
    <div
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        position: "relative",
        cursor: "pointer",
        borderRadius: 20,
        background: "#ffffff",
        padding: "20px 24px",
        border: "1px solid rgba(0,0,0,0.06)",
        boxShadow: hover
          ? "0 1px 2px rgba(0,0,0,0.03)," +
            " 0 12px 32px -10px rgba(255,79,154,0.22)," +
            " 0 14px 38px -12px rgba(122,92,255,0.22)," +
            " 0 16px 42px -10px rgba(76,214,255,0.20)"
          : "0 1px 2px rgba(0,0,0,0.03)," +
            " 0 6px 18px -8px rgba(255,79,154,0.18)," +
            " 0 8px 24px -10px rgba(122,92,255,0.18)," +
            " 0 10px 28px -8px rgba(76,214,255,0.16)",
        transform: hover ? "translateY(-2px)" : "translateY(0)",
        transition: "all 200ms cubic-bezier(0.32, 0.72, 0, 1)",
        display: "flex", alignItems: "flex-start", gap: 18,
      }}>
      {/* (actions in detail modal) */}
      {/* Time */}
      <div style={{ flexShrink: 0, minWidth: 64, paddingTop: 2 }}>
        <div style={{
          fontFamily: "var(--font-display)", fontSize: 15, fontWeight: 600,
          letterSpacing: "-0.01em", color: "#1d1d1f",
          fontVariantNumeric: "tabular-nums",
        }}>{meal.time}</div>
      </div>

      {/* Body */}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          gap: 12, marginBottom: 8,
        }}>
          <div style={{
            fontFamily: "var(--font-display)", fontSize: 17, fontWeight: 600,
            letterSpacing: "-0.02em", color: "#1d1d1f", minWidth: 0,
          }}>{meal.label}</div>
          <div style={{
            flexShrink: 0,
            padding: "6px 14px", borderRadius: 980,
            fontFamily: "var(--font-display)", fontSize: 15, fontWeight: 600,
            letterSpacing: "-0.01em", color: "#2997ff",
            background: "rgba(41,151,255,0.08)",
            border: "1px solid rgba(41,151,255,0.22)",
            fontVariantNumeric: "tabular-nums",
          }}>{meal.calories} cal</div>
        </div>
        <ul style={{ margin: 0, padding: 0, listStyle: "none" }}>
          {(meal.items || []).map((it, i) => (
            <li key={i} style={{
              fontSize: 14.5, color: "rgba(29,29,31,0.72)", lineHeight: 1.55,
              paddingLeft: 14, position: "relative",
            }}>
              <span style={{
                position: "absolute", left: 0, top: 9, width: 4, height: 4, borderRadius: "50%",
                background: "rgba(29,29,31,0.30)",
              }}></span>
              {it}
            </li>
          ))}
        </ul>
        <div style={{ display: "flex", gap: 14, marginTop: 10, fontSize: 12, color: "rgba(29,29,31,0.55)", fontVariantNumeric: "tabular-nums" }}>
          <span>P {meal.macros?.p ?? 0}g</span>
          <span>C {meal.macros?.c ?? 0}g</span>
          <span>F {meal.macros?.f ?? 0}g</span>
        </div>
      </div>
    </div>
  );
}

// =====================================================
// Detail modal — full breakdown of one meal
// =====================================================
function MealDetailModal({ meal, onClose, onEdit, onDelete }) {
  const calGoalPct = Math.min(100, Math.round((meal.calories / CAL_GOAL) * 100));
  const macroTotal = (meal.macros?.p || 0) + (meal.macros?.c || 0) + (meal.macros?.f || 0);
  const pPct = macroTotal ? Math.round(((meal.macros?.p || 0) / macroTotal) * 100) : 0;
  const cPct = macroTotal ? Math.round(((meal.macros?.c || 0) / macroTotal) * 100) : 0;
  const fPct = macroTotal ? 100 - pPct - cPct : 0;

  return (
    <div
      onClick={onClose}
      style={{
        position: "fixed", inset: 0, zIndex: 100,
        background: "rgba(20,20,30,0.32)", backdropFilter: "blur(6px)",
        display: "flex", alignItems: "center", justifyContent: "center", padding: 24,
        animation: "mealFadeIn 160ms ease both",
      }}>
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: "100%", maxWidth: 540, maxHeight: "calc(100dvh - 48px)",
          overflowY: "auto",
          background: "#fff", borderRadius: 24, padding: "28px 32px 24px",
          border: "1px solid rgba(0,0,0,0.06)",
          boxShadow: "0 24px 80px -16px rgba(60,60,90,0.35), 0 8px 24px rgba(0,0,0,0.08)",
          animation: "mealPopIn 220ms cubic-bezier(0.32,0.72,0,1) both",
          position: "relative",
        }}>
        {/* Close */}
        <button
          onClick={onClose}
          aria-label="Close"
          style={{
            position: "absolute", top: 14, right: 14,
            width: 32, height: 32, borderRadius: "50%",
            border: "none", background: "transparent", cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
            color: "rgba(29,29,31,0.45)",
          }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>

        <Eyebrow style={{ marginBottom: 10 }}>{meal.time} · today</Eyebrow>
        <div style={{
          fontFamily: "var(--font-display)", fontSize: 28, fontWeight: 600,
          letterSpacing: "-0.025em", color: "#1d1d1f", lineHeight: 1.15,
          marginBottom: 6,
        }}>{meal.label}</div>

        {/* Calories headline */}
        <div style={{
          display: "flex", alignItems: "baseline", gap: 8, marginTop: 14, marginBottom: 6,
        }}>
          <div style={{
            fontFamily: "var(--font-display)", fontSize: 36, fontWeight: 600,
            letterSpacing: "-0.03em", color: "#1d1d1f", lineHeight: 1,
          }}>{meal.calories}</div>
          <div style={{ fontSize: 15, color: "rgba(29,29,31,0.55)" }}>cal</div>
          <div style={{ fontSize: 13, color: "rgba(29,29,31,0.50)", marginLeft: 8, fontVariantNumeric: "tabular-nums" }}>
            ≈ {calGoalPct}% of daily goal
          </div>
        </div>

        {/* Macro stacked bar */}
        {macroTotal > 0 && (
          <div style={{ marginTop: 14, marginBottom: 4 }}>
            <div style={{
              display: "flex", height: 10, borderRadius: 980, overflow: "hidden",
              border: "1px solid rgba(0,0,0,0.05)",
            }}>
              <div style={{ width: `${pPct}%`, background: "#ff4f9a" }} />
              <div style={{ width: `${cPct}%`, background: "#7a5cff" }} />
              <div style={{ width: `${fPct}%`, background: "#4cd6ff" }} />
            </div>
            <div style={{ display: "flex", gap: 18, marginTop: 10, fontVariantNumeric: "tabular-nums" }}>
              <MacroLegend color="#ff4f9a" label="protein" value={meal.macros?.p || 0} pct={pPct} />
              <MacroLegend color="#7a5cff" label="carbs"   value={meal.macros?.c || 0} pct={cPct} />
              <MacroLegend color="#4cd6ff" label="fat"     value={meal.macros?.f || 0} pct={fPct} />
            </div>
          </div>
        )}

        {/* Items list */}
        <div style={{ marginTop: 22 }}>
          <Eyebrow style={{ marginBottom: 12 }}>what i ate</Eyebrow>
          <ul style={{ margin: 0, padding: 0, listStyle: "none", display: "flex", flexDirection: "column", gap: 8 }}>
            {(meal.items || []).map((it, i) => (
              <li key={i} style={{
                fontSize: 15, color: "rgba(29,29,31,0.82)", lineHeight: 1.5,
                paddingLeft: 18, position: "relative",
              }}>
                <span style={{
                  position: "absolute", left: 2, top: 9, width: 5, height: 5, borderRadius: "50%",
                  background: "linear-gradient(135deg, #7a5cff, #4cd6ff)",
                }}></span>
                {it}
              </li>
            ))}
          </ul>
        </div>

        {/* Notes */}
        {meal.notes && meal.notes.trim() && (
          <div style={{
            marginTop: 22, padding: "14px 16px",
            background: "rgba(122,92,255,0.05)",
            border: "1px solid rgba(122,92,255,0.14)",
            borderRadius: 14,
            fontSize: 14.5, color: "rgba(29,29,31,0.78)", lineHeight: 1.55,
          }}>
            {meal.notes}
          </div>
        )}

        {/* Actions */}
        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 24 }}>
          <button onClick={onDelete} style={{
            padding: "10px 18px", borderRadius: 980,
            fontFamily: "var(--font-text)", fontSize: 14, fontWeight: 500,
            color: "#e0264a",
            background: "transparent",
            border: "1px solid rgba(224,38,74,0.30)",
            cursor: "pointer",
            transition: "all 160ms ease",
          }}>Delete</button>
          <span style={{
            display: "inline-block", padding: 1.5, borderRadius: 980,
            background: "linear-gradient(120deg, #ff4f9a 0%, #c862ff 35%, #7a5cff 65%, #4cd6ff 100%)",
            boxShadow: "0 6px 18px -6px rgba(122,92,255,0.45)",
          }}>
            <button onClick={onEdit} style={{
              padding: "8.5px 18.5px", borderRadius: 978.5,
              fontFamily: "var(--font-text)", fontSize: 14, fontWeight: 600,
              color: "#7a5cff",
              background: "#fff",
              border: "none",
              cursor: "pointer",

          </span>

      <style>{`
        @keyframes mealFadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes mealPopIn  { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
      `}</style>
    </div>
  );
}

function MacroLegend({ color, label, value, pct }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <div style={{ width: 8, height: 8, borderRadius: "50%", background: color }} />
      <div style={{ fontSize: 13, color: "rgba(29,29,31,0.78)" }}>
        <span style={{ fontWeight: 600, color: "#1d1d1f" }}>{value}g</span>
        <span style={{ marginLeft: 4, color: "rgba(29,29,31,0.50)" }}>{label} · {pct}%</span>
      </div>

}

// =====================================================
// Add / Edit form modal
// =====================================================
function MealFormModal({ mode, initial, onCancel, onSubmit }) {
  const [time, setTime] = useStateMeals(initial?.time ?? "");
  const [label, setLabel] = useStateMeals(initial?.label ?? "");
  const [calories, setCalories] = useStateMeals(initial?.calories ?? "");
  const [protein, setProtein] = useStateMeals(initial?.macros?.p ?? "");
  const [carbs, setCarbs] = useStateMeals(initial?.macros?.c ?? "");
  const [fat, setFat] = useStateMeals(initial?.macros?.f ?? "");
  const [itemsText, setItemsText] = useStateMeals(
    initial ? (initial.items || []).join("\n") : ""
  );
  const [notes, setNotes] = useStateMeals(initial?.notes ?? "");

  const submit = () => {
    if (!label.trim()) return;
    const items = itemsText.split("\n").map((n) => n.trim()).filter(Boolean);
    onSubmit({
      time: (time || "").trim() || "—",
      label: label.trim(),
      items,
      calories: Number(calories) || 0,
      macros: {
        p: Number(protein) || 0,
        c: Number(carbs) || 0,
        f: Number(fat) || 0,
      },
      notes: notes.trim(),
    });
  };

  return (
    <div
      onClick={onCancel}
      style={{
        position: "fixed", inset: 0, zIndex: 110,
        background: "rgba(20,20,30,0.32)", backdropFilter: "blur(6px)",
        display: "flex", alignItems: "center", justifyContent: "center", padding: 24,
        animation: "mealFadeIn 160ms ease both",
      }}>
      <div
        onClick={(e) => e.stopPropagation()}
        style={{
          width: "100%", maxWidth: 520, maxHeight: "calc(100dvh - 48px)",
          overflowY: "auto",
          background: "#fff", borderRadius: 22, padding: 28,
          boxShadow: "0 24px 64px -16px rgba(20,20,40,0.30), 0 1px 0 rgba(255,255,255,0.9) inset",
          animation: "mealPopIn 220ms cubic-bezier(0.32,0.72,0,1) both",
        }}>
        <div style={{
          fontFamily: "var(--font-display)", fontSize: 22, fontWeight: 600,
          letterSpacing: "-0.02em", color: "#1d1d1f", marginBottom: 6,
        }}>{mode === "edit" ? "Edit meal" : "Add a meal"}</div>
        <div style={{ fontSize: 14, color: "rgba(29,29,31,0.62)", marginBottom: 18 }}>
          {mode === "edit" ? "Update any field below." : "Log what you ate, when, and how much."}
        </div>

        {/* Time + Label */}
        <div style={{ display: "grid", gridTemplateColumns: "minmax(80px, 120px) 1fr", gap: 10, marginBottom: 12 }}>
          <MealField label="Time">
            <input
              value={time}
              onChange={(e) => setTime(e.target.value)}
              placeholder="12:45"
              style={mealInputStyle}
            />
          </MealField>
          <MealField label="Meal name">
            <input
              autoFocus
              value={label}
              onChange={(e) => setLabel(e.target.value)}
              placeholder="Lunch"
              style={mealInputStyle}
            />
          </MealField>
        </div>

        {/* Items */}
        <MealField
          label="What you ate"
          hint="One item per line."
          style={{ marginBottom: 12 }}>
          <textarea
            value={itemsText}
            onChange={(e) => setItemsText(e.target.value)}
            placeholder={"Grilled salmon\nQuinoa + roasted veg\nOlive oil + lemon"}
            rows={4}
            style={{ ...mealInputStyle, resize: "vertical", minHeight: 90, lineHeight: 1.55, fontFamily: "var(--font-text)" }}
          />
        </MealField>

        {/* Calories */}
        <MealField label="Calories" style={{ marginBottom: 12 }}>
          <input
            type="number"
            inputMode="numeric"
            value={calories}
            onChange={(e) => setCalories(e.target.value)}
            placeholder="680"
            style={mealInputStyle}
          />
        </MealField>

        {/* Macros */}
        <div style={{ marginBottom: 12 }}>
          <div style={{
            fontSize: 11, fontWeight: 600, letterSpacing: "0.06em",
            textTransform: "uppercase", color: "rgba(29,29,31,0.55)",
            marginBottom: 6,
          }}>Macros (grams)</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
            <MacroInput color="#ff4f9a" label="protein" value={protein} onChange={setProtein} />
            <MacroInput color="#7a5cff" label="carbs"   value={carbs}   onChange={setCarbs}   />
            <MacroInput color="#4cd6ff" label="fat"     value={fat}     onChange={setFat}     />
          </div>
        </div>

        {/* Notes */}
        <MealField label="Notes" hint="Optional — how it sat, energy level, anything to remember." style={{ marginBottom: 22 }}>
          <textarea
            value={notes}
            onChange={(e) => setNotes(e.target.value)}
            placeholder="Felt great rolling after this one."
            rows={2}
            style={{ ...mealInputStyle, resize: "vertical", minHeight: 56, lineHeight: 1.5 }}
          />
        </MealField>

        <div style={{ display: "flex", gap: 10, justifyContent: "flex-end" }}>
          <button onClick={onCancel} style={{
            padding: "10px 18px", fontSize: 14, fontWeight: 500,
            border: "1px solid rgba(0,0,0,0.10)", borderRadius: 10,
            background: "#fff", color: "#1d1d1f", cursor: "pointer",
          }}>Cancel</button>
          {label.trim() ? (
            <span style={{ position: "relative", display: "inline-flex", borderRadius: 10 }}>
              <span style={{
                position: "absolute", inset: 0, borderRadius: 10,
                padding: 1.5,
                background: "linear-gradient(120deg, #4cd6ff 0%, #7a5cff 50%, #ff4f9a 100%)",
                WebkitMask: "linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0)",
                mask: "linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0)",
                WebkitMaskComposite: "xor",
                maskComposite: "exclude",
                pointerEvents: "none",
              }}></span>
              <button onClick={submit} style={{
                position: "relative",
                padding: "10px 20px", fontSize: 14, fontWeight: 600,
                border: "none", borderRadius: 10, cursor: "pointer",
                color: "#1d1d1f",
                background: "transparent",
                transition: "all 160ms ease",
              }}>{mode === "edit" ? "Save" : "Add meal"}</button>
            </span>
          ) : (
            <button disabled style={{
              padding: "10px 20px", fontSize: 14, fontWeight: 600,
              border: "1px solid rgba(0,0,0,0.10)", borderRadius: 10, cursor: "not-allowed",
              color: "rgba(29,29,31,0.4)",
              background: "transparent",
            }}>{mode === "edit" ? "Save" : "Add meal"}</button>
          )}
        </div>
      </div>
    </div>
  );
}

const mealInputStyle = {

  border: "1px solid rgba(0,0,0,0.12)", borderRadius: 10,

        <span style={{

}

window.Meals = Meals;

</script>
  <script type="text/babel">
// Upcoming problems — full page. Reads/writes shared problemsStore.
// Pin (star), edit (pencil), delete (trash), and add via floating + button.
// Tap a row to open detail with the description.

const { useState: useStateP, useEffect: useEffectP } = React;

// ---------- Page ----------
function Problems({ onBack }) {
  const { problems, pinned, setProblems, setPinned } = useProblemsStore();
  const [confirmId, setConfirmId] = useStateP(null);
  const [adding, setAdding] = useStateP(false);
  const [editingId, setEditingId] = useStateP(null);
  const [detailId, setDetailId] = useStateP(null);
  const [sortMode, setSortMode] = useStateP(() => {
    try { return localStorage.getItem("problems_sort") || "priority"; } catch { return "priority"; }
  });
  const updateSort = (m) => {
    setSortMode(m);
    try { localStorage.setItem("problems_sort", m); } catch {}
  };

  const togglePin = (id) => {
    setPinned((prev) => prev.includes(id) ? prev.filter((x) => x !== id) : [...prev, id]);
  };
  const deleteProblem = (id) => {
    const probId = id.startsWith("bot-problem-")
      ? parseInt(id.replace("bot-problem-", ""), 10)
      : NaN;
    setProblems((prev) => prev.filter((p) => p.id !== id));
    setPinned((prev) => prev.filter((x) => x !== id));
    setConfirmId(null);
    if (detailId === id) setDetailId(null);
    if (!isNaN(probId)) apiCall("DELETE", `/api/problems/${probId}`);
  };
  const addProblem = (name, tier, description) => {
    const id = name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "")
      + "-" + Date.now().toString(36);
    setProblems((prev) => [...prev, { id, name, tier, description }]);
    setAdding(false);
    apiCall("POST", "/api/problems", { name, tier, description });
  };
  const updateProblem = (id, name, tier, description) => {
    const probId = id.startsWith("bot-problem-")
      ? parseInt(id.replace("bot-problem-", ""), 10)
      : NaN;
    setProblems((prev) => prev.map((p) => p.id === id ? { ...p, name, tier, description } : p));
    setEditingId(null);
    if (!isNaN(probId)) {
      apiCall("PATCH", `/api/problems/${probId}`, { name, tier, description });
    }
  };

  const liveProblems = window.__bjjdata && Array.isArray(window.__bjjdata.all_problems) && window.__bjjdata.all_problems.length > 0
    ? window.__bjjdata.all_problems.map((p, i) => ({
        id: `bot-problem-${i}`,
        name: p.name,
        tier: p.tier || "med",
        description: p.source === "active" ? "Currently flagged for your next Bruno session." : "Extracted from recent training notes.",
      }))
    : null;
  const sorted = sortProblems(liveProblems || problems, pinned, sortMode);
  const confirmProblem = problems.find((p) => p.id === confirmId);
  const editingProblem = problems.find((p) => p.id === editingId);
  const detailProblem  = problems.find((p) => p.id === detailId);

  return (
    <div style={{ minHeight: "100vh", paddingTop: 100, paddingBottom: 120, paddingLeft: "clamp(16px, 4vw, 24px)", paddingRight: "clamp(16px, 4vw, 24px)" }}>
      <div style={{ maxWidth: 760, margin: "0 auto" }}>
        {/* Header */}
        <div style={{ marginBottom: 32 }}>
          <button onClick={onBack} style={{
            border: "none", background: "transparent", padding: 0, cursor: "pointer",
            fontSize: 14, color: "rgba(29,29,31,0.62)", marginBottom: 12,
            display: "inline-flex", alignItems: "center", gap: 6,
          }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            Back
          </button>
          <div style={{
            fontFamily: "var(--font-display)", fontSize: 38, fontWeight: 600,
            letterSpacing: "-0.025em", color: "#1d1d1f", marginBottom: 8,
          }}>Upcoming problems</div>
          <div style={{ fontSize: 16, color: "rgba(29,29,31,0.62)", lineHeight: 1.5, maxWidth: 560 }}>
            The positions you keep getting stuck in. Tap a row to read the breakdown — hover to pin, edit, or delete.
          </div>
        </div>

        {/* Sort */}
        <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 14 }}>
          <SortMenu value={sortMode} onChange={updateSort} options={PROBLEMS_SORT_OPTIONS} />
        </div>

        {/* List */}
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {sorted.map((p) => (
            <ProblemRow
              key={p.id}
              problem={p}
              isPinned={pinned.includes(p.id)}
              onClick={() => setDetailId(p.id)}
              onTogglePin={() => togglePin(p.id)}
              onRequestEdit={() => setEditingId(p.id)}
              onRequestDelete={() => setConfirmId(p.id)}
            />
          ))}
        </div>

        {sorted.length === 0 && (
          <div style={{
            textAlign: "center", padding: "48px 24px",
            fontSize: 15, color: "rgba(29,29,31,0.55)",
          }}>
            No problems on the list. Tap + to add one.
          </div>
        )}
      </div>

      {/* Floating + button — fully transparent inside, rainbow ring only */}
      <button
        onClick={() => setAdding(true)}
        aria-label="Add problem"
        style={{
          position: "fixed", bottom: "calc(32px + env(safe-area-inset-bottom, 0px))", right: 32, zIndex: 50,
          width: 56, height: 56, borderRadius: "50%",
          background: "transparent",
          border: "none", padding: 0, cursor: "pointer",
          color: "#7a5cff",
          display: "flex", alignItems: "center", justifyContent: "center",
          transition: "transform 160ms cubic-bezier(0.32,0.72,0,1)",
        }}
        onMouseEnter={(e) => { e.currentTarget.style.transform = "scale(1.06)"; }}
        onMouseLeave={(e) => { e.currentTarget.style.transform = "scale(1)"; }}>
        {/* Rainbow ring (masked so only the border shows, center is fully transparent) */}
        <span aria-hidden="true" style={{
          position: "absolute", inset: 0, borderRadius: "50%",
          padding: 1.5,
          background: "linear-gradient(120deg, #ff4f9a 0%, #c862ff 35%, #7a5cff 65%, #4cd6ff 100%)",
          WebkitMask: "linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0)",
          WebkitMaskComposite: "xor",
          maskComposite: "exclude",
          pointerEvents: "none",
        }}/>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" style={{ position: "relative" }}>
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>

      {/* Detail modal */}
      {detailProblem && (
        <ProblemDetailModal
          problem={detailProblem}
          isPinned={pinned.includes(detailProblem.id)}
          onClose={() => setDetailId(null)}
          onTogglePin={() => togglePin(detailProblem.id)}
          onEdit={() => { setDetailId(null); setEditingId(detailProblem.id); }}
          onRequestDelete={() => setConfirmId(detailProblem.id)}
        />
      )}

      {/* Add modal */}
      {adding && (
        <ProblemFormModal
          mode="add"
          onCancel={() => setAdding(false)}
          onSubmit={(name, tier, description) => addProblem(name, tier, description)}
        />
      )}

      {/* Edit modal */}
      {editingProblem && (
        <ProblemFormModal
          mode="edit"
          initial={editingProblem}
          onCancel={() => setEditingId(null)}
          onSubmit={(name, tier, description) => updateProblem(editingProblem.id, name, tier, description)}
        />
      )}

      {/* Delete confirm */}
      {confirmProblem && (
        <DeleteProblemConfirm
          problem={confirmProblem}
          onCancel={() => setConfirmId(null)}
          onConfirm={() => deleteProblem(confirmProblem.id)}
        />
      )}
    </div>
  );
}

// ---------- Row ----------
function ProblemRow({ problem, isPinned, onClick, onTogglePin, onRequestEdit, onRequestDelete }) {
  const [hover, setHover] = useStateP(false);
  const isUrgent = problem.tier === "urgent";

  return (
    <div
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        position: "relative", cursor: "pointer",
        borderRadius: 18,
        padding: isPinned ? 1.5 : 0,
        background: isPinned
          ? "linear-gradient(120deg, #ff4f9a 0%, #c862ff 28%, #7a5cff 52%, #3b82ff 76%, #4cd6ff 100%)"
          : "transparent",
        boxShadow: hover
          ? "0 1px 2px rgba(0,0,0,0.03), 0 10px 28px -10px rgba(122,92,255,0.20), 0 12px 32px -12px rgba(255,79,154,0.18)"
          : "0 1px 2px rgba(0,0,0,0.03), 0 5px 14px -8px rgba(122,92,255,0.14)",
        transform: hover ? "translateY(-2px)" : "translateY(0)",
        transition: "all 200ms cubic-bezier(0.32, 0.72, 0, 1)",
      }}>
      <div style={{
        background: "#ffffff",
        borderRadius: isPinned ? 16.5 : 18,
        padding: "18px 22px",
        border: isPinned ? "none" : "1px solid rgba(0,0,0,0.06)",
        display: "flex", alignItems: "center", gap: 14,
        position: "relative",
        minHeight: 60,
        overflow: "hidden",
      }}>
        {/* Name */}
        <div style={{
          flex: 1, minWidth: 0,
          fontSize: 15.5,
          fontWeight: isUrgent ? 600 : 500,
          color: isUrgent ? "#c4324f" : "#1d1d1f",
          letterSpacing: "-0.005em",
          paddingRight: 80,
          whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
        }}>{problem.name}</div>

        {/* Tier label — sits at the right edge */}
        <div style={{
          position: "absolute",
