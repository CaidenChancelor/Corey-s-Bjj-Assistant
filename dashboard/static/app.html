  <style>
/* =============================================================
   BJJ Dashboard — Colors & Type
   Apple Intelligence × Liquid Glass × LIGHT MODE
   ============================================================= */

/* SF Pro — full family loaded from local OTF files */
:root {
  /* =========================================================
     COLOR — Surfaces (light, parchment-led)
     ========================================================= */
  --bg-paper:       #ffffff;   /* pure white — login card, hero card */
  --bg-canvas:      #f7f7fa;   /* page floor — slightly cool parchment */
  --bg-parchment:   #f2f2f5;   /* secondary surface, subtle separation */
  --bg-tint:        #ebebf0;   /* nested surface */
  --bg-hairline:    rgba(0, 0, 0, 0.08);

  /* Glass tints (sit on the rainbow mesh — frosted white) */
  --glass-1:        rgba(255, 255, 255, 0.55);  /* lightest glass */
  --glass-2:        rgba(255, 255, 255, 0.65);  /* default card */
  --glass-3:        rgba(255, 255, 255, 0.78);  /* hover / focused */
  --glass-4:        rgba(255, 255, 255, 0.88);  /* active surface */
  --glass-stroke:   rgba(255, 255, 255, 0.7);   /* bright inner highlight */
  --glass-stroke-2: rgba(0, 0, 0, 0.06);        /* hairline border */

  /* =========================================================
     COLOR — Foreground (dark ink on light)
     Apple's signature near-black, never pure
     ========================================================= */
  --fg-1:           #1d1d1f;                 /* primary text / headings */
  --fg-2:           rgba(29, 29, 31, 0.78);  /* body text */
  --fg-3:           rgba(29, 29, 31, 0.55);  /* secondary / meta */
  --fg-4:           rgba(29, 29, 31, 0.36);  /* placeholder / disabled */
  --fg-5:           rgba(29, 29, 31, 0.18);  /* faintest hint */
  --fg-on-gradient: #ffffff;                 /* white over rainbow fills */

  /* =========================================================
     COLOR — The Rainbow (Apple Intelligence / Siri halo)
     ========================================================= */
  --ai-pink:        #ff4f9a;
  --ai-magenta:     #c862ff;
  --ai-purple:      #7a5cff;
  --ai-blue:        #3b82ff;
  --ai-cyan:        #4cd6ff;

  --ai-pink-soft:    rgba(255, 79, 154, 0.45);
  --ai-purple-soft:  rgba(122, 92, 255, 0.45);
  --ai-cyan-soft:    rgba(76, 214, 255, 0.45);

  --ai-gradient: linear-gradient(
    100deg,
    var(--ai-pink) 0%,
    var(--ai-magenta) 28%,
    var(--ai-purple) 52%,
    var(--ai-blue) 76%,
    var(--ai-cyan) 100%
  );

  --ai-conic: conic-gradient(
    from 0deg,
    var(--ai-pink),
    var(--ai-magenta),
    var(--ai-purple),
    var(--ai-blue),
    var(--ai-cyan),
    var(--ai-purple),
    var(--ai-pink)
  );

  /* Mesh — softer on white (lower opacity, more bloom) */
  --mesh-blob-pink:    radial-gradient(60% 50% at 18% 20%, rgba(255, 79, 154, 0.32), transparent 70%);
  --mesh-blob-purple:  radial-gradient(55% 45% at 78% 30%, rgba(122, 92, 255, 0.30), transparent 70%);
  --mesh-blob-blue:    radial-gradient(50% 50% at 30% 82%, rgba(59, 130, 255, 0.26), transparent 70%);
  --mesh-blob-cyan:    radial-gradient(45% 40% at 88% 78%, rgba(76, 214, 255, 0.26), transparent 70%);

  /* =========================================================
     COLOR — Semantic (muted on white)
     ========================================================= */
  --accent-blue:    #2997ff;   /* Lighter Apple system blue */
  --accent-blue-2:  #0071e3;   /* Deeper variant */
  --accent-success: #15a86b;
  --accent-warn:    #c97a00;
  --accent-danger:  #e0264a;

  --chat-user-tint:    rgba(41, 151, 255, 0.08);
  --chat-user-stroke:  rgba(41, 151, 255, 0.22);
  --chat-claude-tint:  rgba(255, 255, 255, 0.7);

  /* =========================================================
     TYPOGRAPHY  — SF Pro first, Inter fallback
     ========================================================= */
  --font-display: "SF Pro Display", -apple-system, BlinkMacSystemFont,
                  "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-text:    "SF Pro Text", -apple-system, BlinkMacSystemFont,
                  "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-rounded: "SF Pro Rounded", -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono:    "SF Mono", "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;

  --type-hero:        clamp(48px, 6vw, 88px);
  --type-display-xl:  56px;
  --type-display-lg:  40px;
  --type-display-md:  32px;
  --type-display-sm:  24px;
  --type-lead:        20px;
  --type-body:        17px;
  --type-body-sm:     15px;
  --type-caption:     13px;
  --type-fine:        12px;
  --type-micro:       11px;

  --w-thin: 200; --w-light: 300; --w-regular: 400;
  --w-medium: 500; --w-semibold: 600; --w-bold: 700;

  --track-hero:    -0.04em;
  --track-display: -0.03em;
  --track-tight:   -0.02em;
  --track-body:    -0.011em;
  --track-caps:    0.06em;

  --leading-tight:  1.05;
  --leading-snug:   1.18;
  --leading-normal: 1.45;
  --leading-loose:  1.7;

  /* =========================================================
     RADII
     ========================================================= */
  --r-xs:   8px;
  --r-sm:   12px;
  --r-md:   16px;
  --r-lg:   22px;
  --r-xl:   28px;
  --r-2xl:  36px;
  --r-pill: 980px;
  --r-full: 9999px;

  /* =========================================================
     SPACING (8px base)
     ========================================================= */
  --s-1:   4px;  --s-2:   8px;  --s-3:   12px; --s-4:   16px;
  --s-5:   20px; --s-6:   24px; --s-7:   32px; --s-8:   40px;
  --s-9:   48px; --s-10:  64px; --s-11:  80px; --s-12:  120px;

  /* =========================================================
     SHADOWS — soft drops over light, keep glass airy
     ========================================================= */
  --shadow-card:   0 1px 0 rgba(255,255,255,0.9) inset,
                   0 8px 24px -8px rgba(60, 60, 90, 0.16),
                   0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-pop:    0 1px 0 rgba(255,255,255,0.95) inset,
                   0 24px 60px -16px rgba(60, 60, 90, 0.22),
                   0 2px 6px rgba(0, 0, 0, 0.05);
  --shadow-press:  0 1px 0 rgba(255,255,255,0.6) inset,
                   0 2px 8px rgba(0, 0, 0, 0.06);

  --glow-ai:       0 0 0 1px rgba(255,255,255,0.6),
                   0 14px 40px -8px rgba(122,92,255,0.40),
                   0 4px 14px -4px rgba(255,79,154,0.32);
  --glow-ai-soft:  0 0 0 1px rgba(255,255,255,0.5),
                   0 8px 24px -6px rgba(122,92,255,0.28);

  /* =========================================================
     MOTION
     ========================================================= */
  --ease-spring:   cubic-bezier(0.32, 0.72, 0, 1);
  --ease-out:      cubic-bezier(0.22, 1, 0.36, 1);
  --ease-in-out:   cubic-bezier(0.65, 0, 0.35, 1);
  --d-fast: 160ms; --d-base: 260ms; --d-slow: 420ms;
  --d-halo: 14s;   --d-mesh: 28s;

  /* =========================================================
     BLUR
     ========================================================= */
  --blur-sm:  blur(20px) saturate(160%);
  --blur-md:  blur(40px) saturate(180%);
  --blur-lg:  blur(80px) saturate(200%);
}

/* =============================================================
   GLOBAL BASE
   ============================================================= */
html, body {
  background: var(--bg-canvas);
  color: var(--fg-1);
  font-family: var(--font-text);
  font-size: var(--type-body);
  line-height: var(--leading-normal);
  letter-spacing: var(--track-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* =============================================================
   SEMANTIC TYPE CLASSES
   ============================================================= */
.t-hero       { font-family: var(--font-display); font-size: var(--type-hero);
                font-weight: var(--w-semibold); letter-spacing: var(--track-hero);
                line-height: var(--leading-tight); }
.t-display-xl { font-family: var(--font-display); font-size: var(--type-display-xl);
                font-weight: var(--w-semibold); letter-spacing: var(--track-display);
                line-height: var(--leading-tight); }
.t-display-lg { font-family: var(--font-display); font-size: var(--type-display-lg);
                font-weight: var(--w-semibold); letter-spacing: var(--track-display);
                line-height: var(--leading-snug); }
.t-display-md { font-family: var(--font-display); font-size: var(--type-display-md);
                font-weight: var(--w-semibold); letter-spacing: var(--track-display);
                line-height: var(--leading-snug); }
.t-display-sm { font-family: var(--font-display); font-size: var(--type-display-sm);
                font-weight: var(--w-medium); letter-spacing: var(--track-tight);
                line-height: var(--leading-snug); }
.t-lead       { font-family: var(--font-display); font-size: var(--type-lead);
                font-weight: var(--w-light); letter-spacing: var(--track-tight);
                line-height: 1.4; color: var(--fg-2); }
.t-body       { font-size: var(--type-body); font-weight: var(--w-regular);
                letter-spacing: var(--track-body); line-height: var(--leading-normal);
                color: var(--fg-2); }
.t-body-sm    { font-size: var(--type-body-sm); line-height: var(--leading-normal); color: var(--fg-2); }
.t-caption    { font-size: var(--type-caption); color: var(--fg-3); }
.t-eyebrow    { font-size: var(--type-micro); font-weight: var(--w-semibold);
                letter-spacing: var(--track-caps); text-transform: uppercase; color: var(--fg-3); }
.t-mono       { font-family: var(--font-mono); font-size: var(--type-caption); }

/* The rainbow text fill */
.t-rainbow {
  background: var(--ai-gradient);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}

/* =============================================================
   THE VIEWPORT HALO — wraps every page edge, slow rotation
   ============================================================= */
@keyframes halo-rotate { to { transform: rotate(360deg); } }
@keyframes mesh-drift {
  0%, 100% { transform: translate3d(0,0,0) scale(1); }
  50%      { transform: translate3d(-2%, 1%, 0) scale(1.05); }
}

.page-halo {
  position: relative; isolation: isolate; overflow: hidden;
  background: var(--bg-canvas);
}
.page-halo::before {
  content: ""; position: fixed; inset: -10%;
  background-image:
    var(--mesh-blob-pink),
    var(--mesh-blob-purple),
    var(--mesh-blob-blue),
    var(--mesh-blob-cyan);
  background-color: var(--bg-canvas);
  filter: blur(40px) saturate(150%);
  z-index: -2;
  animation: mesh-drift var(--d-mesh) ease-in-out infinite;
  pointer-events: none;
}
.page-halo::after {
  content: ""; position: fixed; inset: -50vmax;
  background: var(--ai-conic);
  filter: blur(120px) saturate(160%);
  opacity: 0.5;
  -webkit-mask: radial-gradient(closest-side, transparent 62%, black 78%);
          mask: radial-gradient(closest-side, transparent 62%, black 78%);
  z-index: -1;
  animation: halo-rotate var(--d-halo) linear infinite;
  pointer-events: none;
}

@media (prefers-reduced-motion: reduce) {
  .page-halo::before, .page-halo::after { animation: none; }
}

/* =============================================================
   RESPONSIVE — mobile-first cascade with min-width queries
   Phone (≤700) → Tablet (701-1000) → Desktop (≥1001)
   ============================================================= */

/* Base = phone (≤ 700px). Single-column, full-width, generous tap targets. */

/* Page padding — phone first */
.dash-page {
  padding-top: calc(96px + env(safe-area-inset-top, 0px)) !important;
  padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px)) !important;
  padding-left: 16px !important;
  padding-right: 16px !important;
}

/* Hero card → stack inner stats above mini-bottle (or hide bottle entirely) */
.dash-hero-card-inner { padding: 22px !important; }
.dash-hero-card,
.dash-hero-card-inner {
  height: auto !important;
}
.hy-hero-card-inner { padding: 22px !important; }
.dash-hero-inner {
  grid-template-columns: 1fr !important;
  gap: 18px !important;
}
.dash-hero-inner > :nth-child(2) {
  /* Mini bottle on phone — hide to keep hero compact */
  display: none !important;
}
.dash-hero-stats {
  grid-template-columns: repeat(2, 1fr) !important;
  row-gap: 16px !important;
}

/* Hero + side stats row — full single column */
.dash-hero-row {
  grid-template-columns: 1fr !important;
}
.dash-hero-row > div:nth-child(2) {
  /* The 2-row side stack of StatTiles becomes a single column */
  grid-template-rows: auto auto !important;
  gap: 16px !important;
}

/* Secondary 3-column stat row → 1 column on phone */
.dash-stat-row {
  grid-template-columns: 1fr !important;
  gap: 16px !important;
  margin-bottom: 28px !important;
}

/* Two-col timeline + messages → 1 column */
.dash-two-col {
  grid-template-columns: 1fr !important;
  gap: 24px !important;
}

/* Micro-injuries inner grid — silhouette stacks above content on phone */
.mi-grid {
  grid-template-columns: 1fr !important;
}
.mi-mini-stats {
  grid-template-columns: 1fr 1fr !important;
}
.mi-mini-stats > :nth-child(3) { grid-column: span 2; }

/* Quick-add buttons — full-width stacked buttons + 44px min height on phone */
.dash-hero-card button,
.hy-hero button,
.hy-quick-add button {
  min-height: 44px;
}

/* NavPill — keep visible on mobile, slimmer */
.bjj-navpill-wrap {
  top: calc(12px + env(safe-area-inset-top, 0px)) !important;
  left: 12px !important;
  right: 12px !important;
  transform: none !important;
}
.bjj-navpill {
  width: 100%;
  justify-content: space-between !important;
  padding: 8px 12px !important;
}

/* Hydration page — stack hero columns + body grid on phone */
.hy-page {
  padding-top: calc(86px + env(safe-area-inset-top, 0px)) !important;
  padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px)) !important;
  padding-left: 16px !important;
  padding-right: 16px !important;
}
.hy-hero-grid {
  grid-template-columns: 1fr !important;
  gap: 20px !important;
}
.hy-hero-bottle {
  display: none !important;
}
.hy-hero-stats {
  grid-template-columns: repeat(2, 1fr) !important;
  row-gap: 14px !important;
}
.hy-body-grid {
  grid-template-columns: 1fr !important;
  gap: 20px !important;
}

/* Touch-friendly: don't rely on hover for delete/secondary actions */
@media (hover: none) {
  .row-actions {
    opacity: 1 !important;
  }
  .row-actions button {
    opacity: 1 !important;
    transform: scale(1) !important;
  }
  .hy-log-row button,
  .dash-msg-row button {
    opacity: 1 !important;
    transform: scale(1) !important;
  }
}

/* ===== Tablet (701px – 1000px): 2-column where it makes sense ===== */
@media (min-width: 700px) {
  .dash-page {
    padding-top: 100px !important;
    padding-bottom: 80px !important;
    padding-left: 24px !important;
    padding-right: 24px !important;
  }
  .dash-hero-card-inner { padding: 28px !important; }
  .hy-hero-card-inner { padding: 28px !important; }
  .dash-hero-inner {
    grid-template-columns: minmax(0,1fr) 130px !important;
    gap: 22px !important;
  }
  .dash-hero-inner > :nth-child(2) { display: flex !important; }
  .dash-hero-stats { grid-template-columns: repeat(3, 1fr) !important; }

  /* Hero + side stats — keep stacked on tablet (full-width hero), side tiles 2-up below */
  .dash-hero-row {
    grid-template-columns: 1fr !important;
  }
  .dash-hero-row > div:nth-child(2) {
    display: grid !important;
    grid-template-columns: 1fr 1fr !important;
    grid-template-rows: auto !important;
  }

  .dash-stat-row {
    grid-template-columns: repeat(4, 1fr) !important;
    gap: 18px !important;
    margin-bottom: 32px !important;
  }
  .dash-two-col {
    grid-template-columns: 1fr !important;
  }

  .mi-grid {
    grid-template-columns: 200px 1fr !important;
  }
  .mi-mini-stats {
    grid-template-columns: 1fr 1fr 1fr !important;
  }
  .mi-mini-stats > :nth-child(3) { grid-column: auto; }

  .bjj-navpill-wrap {
    top: 24px !important;
    left: 50% !important;
    right: auto !important;
    transform: translateX(-50%) !important;
  }
  .bjj-navpill {
    width: auto;
    justify-content: flex-start !important;
    padding: 10px 14px 10px 16px !important;
  }

  .hy-page {
    padding-top: 90px !important;
    padding-bottom: 120px !important;
    padding-left: 24px !important;
    padding-right: 24px !important;
  }
  .hy-hero-grid {
    grid-template-columns: minmax(0,1fr) 220px !important;
    gap: 22px !important;
  }
  .hy-hero-bottle {
    display: flex !important;
    width: 220px !important;
    height: 260px !important;
  }
  .hy-hero-stats { grid-template-columns: repeat(4, 1fr) !important; }
  .hy-body-grid {
    grid-template-columns: 1fr !important;
  }
}

/* ===== Desktop (≥ 1001px): full multi-column dashboard ===== */
@media (min-width: 1001px) {
  .dash-hero-card { padding: 36px !important; }
  .dash-hero-row {
    grid-template-columns: 1.4fr 1fr !important;
    gap: 24px !important;
  }
  .dash-hero-row > div:nth-child(2) {
    grid-template-columns: 1fr !important;
    grid-template-rows: 1fr 1fr !important;
    gap: 24px !important;
  }
  .dash-stat-row {
    gap: 24px !important;
    margin-bottom: 40px !important;
  }
  .dash-two-col {
    grid-template-columns: 1fr 1fr !important;
    gap: 24px !important;
  }
  .dash-hero-card-inner { padding: 36px !important; }
  .hy-hero-card-inner { padding: 36px !important; }
  .hy-hero-grid {
    grid-template-columns: minmax(0,1fr) 300px !important;
    gap: 28px !important;
  }
  .hy-hero-bottle {
    width: 280px !important;
    height: 330px !important;
  }
  .hy-body-grid {
    grid-template-columns: 1.1fr 1fr !important;
    gap: 24px !important;
  }
}

/* Prevent horizontal scroll on small viewports */
html, body {
  max-width: 100%;
  overflow-x: hidden;
}

// =====================================================
// SortMenu — dropdown trigger + popover for sort options
// Pass `value` (current option id), `onChange(id)`, and
// `options` as [{ id, label }]
// =====================================================
function SortMenu({ value, onChange, options }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);

  React.useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [open]);

  const current = options.find((o) => o.id === value) || options[0];

  return (
    <div ref={ref} style={{ position: "relative", display: "inline-block" }}>
      <button
        onClick={() => setOpen((v) => !v)}
        style={{
          display: "inline-flex", alignItems: "center", gap: 8,
          padding: "8px 14px", borderRadius: 980,
          fontSize: 13, fontWeight: 500,
          fontFamily: "var(--font-text)",
          color: "#1d1d1f",
          background: "#ffffff",
          border: "1px solid rgba(0,0,0,0.10)",
          cursor: "pointer",
          transition: "all 160ms ease",
          boxShadow: open ? "0 4px 14px -4px rgba(0,0,0,0.10)" : "none",
        }}>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{ color: "rgba(29,29,31,0.55)" }}>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="6" y1="12" x2="18" y2="12"/>
          <line x1="10" y1="18" x2="14" y2="18"/>
        </svg>
        <span style={{ color: "rgba(29,29,31,0.62)" }}>Sort:</span>
        <span>{current.label}</span>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"
             style={{ color: "rgba(29,29,31,0.45)", transform: open ? "rotate(180deg)" : "rotate(0)", transition: "transform 160ms ease" }}>
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      {open && (
        <div style={{
          position: "absolute", top: "calc(100% + 6px)", right: 0, zIndex: 30,
          minWidth: 200,
          background: "#ffffff",
          border: "1px solid rgba(0,0,0,0.08)",
          borderRadius: 14,
          boxShadow: "0 16px 40px -12px rgba(20,20,40,0.22), 0 4px 12px rgba(0,0,0,0.06)",
          padding: 6,
          animation: "sortMenuPop 160ms cubic-bezier(0.32,0.72,0,1) both",
        }}>
          {options.map((o) => {
            const active = o.id === value;
            return (
              <button
                key={o.id}
                onClick={() => { onChange(o.id); setOpen(false); }}
                style={{
                  display: "flex", alignItems: "center", gap: 8, width: "100%",
                  padding: "9px 12px", borderRadius: 9,
                  fontSize: 13.5, fontWeight: active ? 600 : 500,
                  fontFamily: "var(--font-text)",
                  color: active ? "#0066cc" : "#1d1d1f",
                  background: active ? "rgba(0,113,227,0.08)" : "transparent",
                  border: "none", cursor: "pointer", textAlign: "left",
                  transition: "background 120ms ease",
                }}
                onMouseEnter={(e) => { if (!active) e.currentTarget.style.background = "rgba(0,0,0,0.04)"; }}
                onMouseLeave={(e) => { if (!active) e.currentTarget.style.background = "transparent"; }}>
                <span style={{ flex: 1 }}>{o.label}</span>
                {active && (
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                )}
              </button>
            );
          })}
        </div>
      )}

      <style>{`
        @keyframes sortMenuPop { from { opacity: 0; transform: translateY(-4px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
      `}</style>
    </div>
  );
}

const _hyListeners = new Set();

function _hReadLS(key, fallback) {
  try { const raw = localStorage.getItem(key); if (raw) return JSON.parse(raw); }
  catch {}
  return fallback;
}
function _hWriteLS(key, val) {

function isBotEntry(id) {
  return String(id || "").startsWith("bot-");
}

function getHydrationLog() {
  if (_hyLog === null) {
    const d = window.__bjjdata;
    if (d && !d.error && Array.isArray(d.water_log_today) && d.water_log_today.length > 0) {

        amount: e.amount_ml,
        time: e.time,
      }));
    } else if (d && !d.error && typeof d.water_today === "number" && d.water_today > 0) {
      // Fall back to synthesized single entry if no log entries yet
      const totalMl = Math.round(d.water_today * 1000);
      const now = new Date();
      const time = String(now.getHours()).padStart(2, "0") + ":" + String(now.getMinutes()).padStart(2, "0");

function subscribeHydration(fn) {
  _hyListeners.add(fn);
  return () => _hyListeners.delete(fn);

async function apiCall(method, path, body) {
  try {
    const response = await fetch(path, {
      method,
      headers: body ? { "Content-Type": "application/json" } : {},
      body: body ? JSON.stringify(body) : undefined,
    });
    let data = {};
    try { data = await response.json(); } catch {}
    if (!response.ok) {
      console.warn("Dashboard API call failed", method, path, response.status, data);
      return { ok: false, status: response.status, error: data.error || `Request failed: ${response.status}` };
    }
    return data;
  } catch (err) {
    console.warn("Dashboard API call failed", method, path, err);
    return { ok: false, error: err.message || String(err) };
  }
}

function useHydrationStore() {
  const [, force] = React.useState(0);
  React.useEffect(() => subscribeHydration(() => force((n) => n + 1)), []);

function formatHydrationAmount(ml) {
  if (ml >= 1000) {
    const l = ml / 1000;
    return l % 1 === 0 ? `${l} L` : `${l.toFixed(1)} L`;
  }
  return `${ml} ml`;
}

  const m = String(d.getMinutes()).padStart(2, "0");

}

function formatTimeFriendly(hhmm) {
  if (!hhmm) return "";
  const [hStr, mStr] = hhmm.split(":");
  let h = parseInt(hStr, 10);
  const m = mStr || "00";
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12; if (h === 0) h = 12;
  return `${h}:${m} ${ampm}`;
}

const HYDRATION_PACE_TARGET_DEFAULT = "21:00";

    } else {

  _brunoListeners.forEach((fn) => fn());
}

  React.useEffect(() => subscribeBruno(() => force((n) => n + 1)), []);

    pinned: getBrunoPinned(),
    setLessons: setBrunoLessons,
    setPinned: setBrunoPinned,
  };
}

// Sort helper: pinned first, then by mode.
// "newest" / "oldest" use the array order (newest items pushed to front in addLesson).
// "az" / "za" sort by summary.
function sortBrunoLessons(lessons, pinned, mode = "newest") {
  const cmp = (a, b) => {
    if (mode === "az") return a.summary.localeCompare(b.summary);
    if (mode === "za") return b.summary.localeCompare(a.summary);
    if (mode === "oldest") return lessons.indexOf(b) - lessons.indexOf(a);
    // "newest" default — index 0 is newest
    return lessons.indexOf(a) - lessons.indexOf(b);
  };
  return [
    ...pinned.map((id) => lessons.find((l) => l.id === id)).filter(Boolean),
    ...lessons.filter((l) => !pinned.includes(l.id)).slice().sort(cmp),
  ];
}

const BRUNO_SORT_OPTIONS = [
  { id: "newest", label: "Newest first" },

  { id: "az",     label: "A–Z" },
  { id: "za",     label: "Z–A" },
];

window.BRUNO_DEFAULT = BRUNO_DEFAULT;
window.useBrunoStore = useBrunoStore;
window.sortBrunoLessons = sortBrunoLessons;
window.BRUNO_SORT_OPTIONS = BRUNO_SORT_OPTIONS;

    const id = "log-" + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
    setLog((prev) => [...prev, { id, amount: ml, time: time || nowTimeLabel() }]);
    apiCall("POST", "/api/water/add", { amount_l: ml / 1000 });
  };
  const removeEntry = (id) => {
    setLog((prev) => prev.filter((e) => e.id !== id));
    const entryId = parseInt(id, 10);
    if (!isNaN(entryId)) apiCall("DELETE", `/api/water/entry/${entryId}`);

  const submitCustom = ({ amount, time }) => {
    addAmount(amount, time);

// ---------- Insights tile ----------

  const remaining = Math.max(0, goal - total);
  const cupSize = 250;
  const cupsLeft = Math.ceil(remaining / cupSize);
  const vsAvgPct = avg > 0 ? Math.round(((total - avg) / avg) * 100) : 0;
  const ahead = vsAvgPct >= 0;

  const bullets = [

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

        </svg>
      ),
      title: streak > 0 ? `${streak} day${streak === 1 ? "" : "s"} on streak` : "Start a streak today",
      detail: streak > 0 ? "Hit your goal again to keep it going." : "Hit your goal to start counting.",
    },
    {
      icon: (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M3 17l6-6 4 4 8-8"/><polyline points="14 7 21 7 21 14"/>
        </svg>
      ),
      title: ahead ? `+${vsAvgPct}% vs your average` : `${vsAvgPct}% vs your average`,
      detail: ahead ? "You're sipping more than usual today." : "Below your typical pace — top up.",
    },
    {
      icon: (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M8 2v3M16 2v3M5 8h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V10a2 2 0 0 1 2-2z"/>
          <path d="M9 14l2 2 4-4"/>
        </svg>
      ),
      title: cupsLeft > 0 ? `${cupsLeft} more cup${cupsLeft === 1 ? "" : "s"}` : "Goal hit",
      detail: cupsLeft > 0 ? `${formatHydrationAmount(cupSize)} cups · ${formatHydrationAmount(remaining)} left` : "Anything else is a bonus.",
    },
  ];

  return (
    <div style={{

            }}>{b.icon}</div>
            <div style={{ flex: 1 }}>
              <div style={{
                fontSize: 14, fontWeight: 600, color: "#1d1d1f",

// ---------- Pace card — "Drink X by Y" ----------
function PaceCard({ total, goal, paceTarget, onEdit }) {
  const remaining = Math.max(0, goal - total);
  const onTrack = remaining === 0;

  // Compute hours from now until target
  const now = new Date();
  const [th, tm] = (paceTarget || "21:00").split(":").map(Number);
  const target = new Date(now);
  target.setHours(th, tm, 0, 0);
  const minsLeft = Math.round((target - now) / 60000);
  const hoursLeft = minsLeft / 60;
  const past = minsLeft <= 0;

  // Recommend per-hour pace
  let perHour = 0;
  if (!onTrack && !past && hoursLeft > 0) {
    perHour = Math.round((remaining / hoursLeft) / 50) * 50; // round to nearest 50ml
  }

  // Build a sip schedule — one sip per hour from now until target (capped at 6 marks)
  const schedule = [];
  if (!onTrack && !past && hoursLeft >= 0.25) {
    const slots = Math.min(6, Math.max(2, Math.ceil(hoursLeft)));
    const stepMins = minsLeft / slots;
    const perSlot = Math.round((remaining / slots) / 50) * 50;
    for (let i = 1; i <= slots; i++) {
      const slot = new Date(now.getTime() + stepMins * i * 60000);
      const hh = String(slot.getHours()).padStart(2, "0");
      const mm = String(slot.getMinutes()).padStart(2, "0");
      schedule.push({ time: `${hh}:${mm}`, amount: perSlot });
    }
  }

  return (
    <div style={{
      position: "relative",
      background: "rgba(255,255,255,0.7)",
      border: "1px solid rgba(0,0,0,0.06)",
      borderRadius: 22, padding: 22,
      overflow: "hidden",
    }}>
      {/* rainbow stripe removed per user request */}

      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 16, marginBottom: schedule.length ? 18 : 0 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <Eyebrow style={{ marginBottom: 10 }}>finish-by plan</Eyebrow>

          {onTrack ? (
            <React.Fragment>
              <div style={{
                fontFamily: "var(--font-display)", fontSize: 24, fontWeight: 600,
                letterSpacing: "-0.025em", color: "#1d1d1f", lineHeight: 1.2,
              }}>You've hit your goal — nice.</div>
              <div style={{ fontSize: 14, color: "rgba(29,29,31,0.62)", marginTop: 6 }}>
                Keep sipping if you're heading to practice.
              </div>
            </React.Fragment>
          ) : past ? (
            <React.Fragment>
              <div style={{
                fontFamily: "var(--font-display)", fontSize: 20, fontWeight: 600,
                letterSpacing: "-0.02em", color: "#1d1d1f", lineHeight: 1.25,
              }}>
                {formatHydrationAmount(remaining)} to go · target was {formatTimeFriendly(paceTarget)}
              </div>
              <div style={{ fontSize: 14, color: "rgba(29,29,31,0.62)", marginTop: 6 }}>
                Tap edit to set a new finish time.
              </div>
            </React.Fragment>
          ) : (
            <React.Fragment>
              <div style={{
                fontFamily: "var(--font-display)", fontSize: 24, fontWeight: 600,
                letterSpacing: "-0.025em", color: "#1d1d1f", lineHeight: 1.25,
              }}>
                Drink <span style={{ color: "#2997ff" }}>{formatHydrationAmount(remaining)}</span> by <span style={{ color: "#2997ff" }}>{formatTimeFriendly(paceTarget)}</span>
              </div>
              <div style={{ fontSize: 14, color: "rgba(29,29,31,0.62)", marginTop: 6 }}>
                {hoursLeft >= 1
                  ? `≈ ${formatHydrationAmount(perHour)} per hour for the next ${hoursLeft.toFixed(1)} h`
                  : `${minsLeft} min left — better get sipping`}
              </div>
            </React.Fragment>
          )}
        </div>

        <button onClick={onEdit} aria-label="Edit finish time" style={{
          padding: "8px 12px", fontSize: 13, fontWeight: 500,
          border: "1px solid rgba(0,0,0,0.10)", borderRadius: 10,
          background: "#fff", color: "#1d1d1f", cursor: "pointer",
          display: "inline-flex", alignItems: "center", gap: 6, flexShrink: 0,
        }}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z"/>
          </svg>
          Edit
        </button>
      </div>

      {/* Sip schedule chips */}
      {schedule.length > 0 && (
        <div>
          <div style={{
            fontSize: 11, fontWeight: 600, textTransform: "uppercase",
            letterSpacing: "0.08em", color: "rgba(29,29,31,0.5)", marginBottom: 10,
          }}>Sip plan</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {schedule.map((s, i) => (
              <span key={i} style={{
                position: "relative", display: "inline-flex",
                borderRadius: 999,
              }}>
                <span style={{
                  position: "absolute", inset: 0, borderRadius: 999,
                  padding: 1.5,
                  background: "linear-gradient(120deg, #4cd6ff 0%, #7a5cff 50%, #ff4f9a 100%)",
                  WebkitMask: "linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0)",
                  mask: "linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0)",
                  WebkitMaskComposite: "xor",
                  maskComposite: "exclude",
                  pointerEvents: "none",
                }}></span>
                <span style={{
                  position: "relative",
                  display: "inline-flex", alignItems: "center", gap: 8,
                  padding: "7px 13px", borderRadius: 999,
                  background: "transparent",
                }}>
                  <span style={{
                    fontSize: 12, fontWeight: 600, color: "#1d1d1f",
                    fontVariantNumeric: "tabular-nums",
                  }}>{formatTimeFriendly(s.time)}</span>
                  <span style={{
                    fontSize: 11, color: "rgba(29,29,31,0.6)", fontWeight: 500,
                  }}>{formatHydrationAmount(s.amount)}</span>
                </span>
              </span>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

              }}></span>
            )}
            <span style={{ position: "relative" }}>Add water</span>
          </button>
        </div>

  );
}

</script>
  <script type="text/babel">
// Dashboard — water hero, bot stat tiles, micro-injuries watch, recent messages

// Rainbow-bordered icon chip — frosted white interior with conic rainbow ring
function RainbowIcon({ children, size = 36 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%",

}

// Tiny stroked SVGs to slot into RainbowIcon
const Icons = {
  bot: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="7" width="16" height="12" rx="3"/><circle cx="9" cy="13" r="1.2" fill="currentColor"/><circle cx="15" cy="13" r="1.2" fill="currentColor"/><path d="M12 4v3M9 4h6"/></svg>,
  moon: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 14.5A8 8 0 0 1 9.5 4 8 8 0 1 0 20 14.5z"/></svg>,
  flame: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3c0 4-4 5-4 9a4 4 0 0 0 8 0c0-2-1-3-2-4 0 2-1 3-2 3 0-3 2-5 0-8z"/></svg>,
  spark: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 4v4M12 16v4M4 12h4M16 12h4M6.3 6.3l2.8 2.8M14.9 14.9l2.8 2.8M6.3 17.7l2.8-2.8M14.9 9.1l2.8-2.8"/></svg>,
  clock: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="8"/><path d="M12 8v4l3 2"/></svg>,
};

function WaterHero({ onClick }) {
  const { log, total, goal, paceTarget, setLog } = useHydrationStore();
  const [hover, setHover] = React.useState(false);
  const [customOpen, setCustomOpen] = React.useState(false);
  const pct = Math.min(100, Math.round((total / goal) * 100));
  const remaining = Math.max(0, goal - total);

  // Streak — count consecutive history days hitting goal, plus today if hit
  const historyDays = (() => {
    const live = window.__bjjdata && Array.isArray(window.__bjjdata.daily_water_7d)
      ? window.__bjjdata.daily_water_7d.map(d => ({ date: d.date, total: Math.round((d.liters || 0) * 1000) }))
      : [];
    return [...live, { date: "Today", total }];
  })();
  let streak = 0;
  for (let i = historyDays.length - 1; i >= 0; i--) {
    if (historyDays[i].total >= goal) streak++;
    else break;
  }

  // Last sip + biggest + 7-day avg
  const sortedLog = [...log].sort((a, b) => (b.time || "").localeCompare(a.time || ""));
  const lastSip = sortedLog[0]?.time || null;
  const biggest = sortedLog.reduce((max, e) => Math.max(max, e.amount), 0);
  const avg = Math.round(historyDays.reduce((s, d) => s + d.total, 0) / historyDays.length);

  // Pace — drink X by Y, ~Z/hr
  const now = new Date();
  const [th, tm] = (paceTarget || "21:00").split(":").map(Number);
  const target = new Date(now);
  target.setHours(th, tm, 0, 0);
  const minsLeft = Math.round((target - now) / 60000);
  const hoursLeft = minsLeft / 60;
  const pacePast = minsLeft <= 0;
  let perHour = 0;
  if (remaining > 0 && !pacePast && hoursLeft > 0) {
    perHour = Math.round((remaining / hoursLeft) / 50) * 50;
  }

  // Dot timeline — sips along the bar
  const dayStart = 6 * 60;   // 6:00 AM in minutes
  const dayEnd = 22 * 60;    // 10:00 PM
  const daySpan = dayEnd - dayStart;
  const sipDots = sortedLog.slice().reverse().map((e, i) => {
    const [hh, mm] = (e.time || "12:00").split(":").map(Number);
    const t = hh * 60 + mm;
    const x = Math.max(0, Math.min(100, ((t - dayStart) / daySpan) * 100));
    return { id: e.id || i, x, amount: e.amount };
  });

  const quickAdd = (e, ml) => {
    e.stopPropagation();
    const id = "log-" + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
    setLog((prev) => [...prev, { id, amount: ml, time: nowTimeLabel() }]);
  };

  const openCustom = (e) => {
    e.stopPropagation();
    setCustomOpen(true);
  };

  const submitCustom = ({ amount, time }) => {
    const id = "log-" + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
    setLog((prev) => [...prev, { id, amount, time }]);
    setCustomOpen(false);
  };

  return (
    <React.Fragment>
    <GlassCard hero rainbow radius={28} padding={36} className="dash-hero-card" style={{
      position: "relative", overflow: "hidden", cursor: "pointer",
      background: "#ffffff",
      backdropFilter: "none", WebkitBackdropFilter: "none",
      transform: hover ? "translateY(-2px)" : "translateY(0)",
      transition: "transform 200ms cubic-bezier(0.32,0.72,0,1)",
    }}
    onClick={onClick}
    onMouseEnter={() => setHover(true)}
    onMouseLeave={() => setHover(false)}>

      {/* halo glow behind the number */}
      <div style={{
        position: "absolute", left: -40, top: -40, width: 360, height: 360,
        background: "radial-gradient(closest-side, rgba(76,214,255,0.22), rgba(122,92,255,0.10) 50%, transparent 75%)",
        filter: "blur(8px)", pointerEvents: "none",
      }}></div>

      {/* 2-column: stats left, mini bottle right */}
      <div className="dash-hero-inner" style={{ position: "relative", display: "grid", gridTemplateColumns: "minmax(0,1fr) 130px", gap: 22, alignItems: "stretch" }}>
        <div style={{ minWidth: 0 }}>
          {/* Eyebrow + streak chip */}
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
            <Eyebrow>hydration · today</Eyebrow>
            {streak > 0 && (
              <div style={{
                display: "inline-flex", alignItems: "center", gap: 5,
                padding: "3px 10px 3px 8px", borderRadius: 999,
                background: "linear-gradient(120deg, rgba(255,79,154,0.15), rgba(122,92,255,0.15) 60%, rgba(76,214,255,0.15))",
                border: "1px solid rgba(122,92,255,0.25)",
                fontSize: 10, fontWeight: 600, letterSpacing: "0.04em",
                color: "#7a5cff", textTransform: "uppercase",
              }}>
                <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c1 4-3 6-3 10a3 3 0 0 0 6 0c0-2-1-3-2-4 0 1.5-1 2-2 2.5C12 8 14 6 12 2z"/></svg>
                {streak}-day streak
              </div>
            )}
          </div>

          <div style={{ display: "flex", alignItems: "baseline", flexWrap: "wrap", columnGap: 14, rowGap: 4, marginBottom: 8 }}>
            <span style={{
              position: "relative",
              fontFamily: "var(--font-display)", fontSize: "clamp(48px, 9vw, 88px)", fontWeight: 600,
              letterSpacing: "-0.04em", lineHeight: 1, color: "#2997ff",
              whiteSpace: "nowrap",
            }}>{formatHydrationAmount(total)}</span>
            <span style={{
              fontFamily: "var(--font-display)", fontSize: 20, fontWeight: 400,
              color: "rgba(29,29,31,0.55)", letterSpacing: "-0.02em",
              whiteSpace: "nowrap",
            }}>of {formatHydrationAmount(goal)} goal</span>
          </div>
          <div style={{ fontSize: 14, color: "rgba(29,29,31,0.62)", marginBottom: 18, width: "100%" }}>
            {remaining > 0
              ? `${formatHydrationAmount(remaining)} to go · ${pct}%`
              : `Goal hit — +${formatHydrationAmount(total - goal)} over`}
          </div>

          {/* progress bar — blue fill, rainbow OUTLINE, with sip dots over it */}
          <div style={{ position: "relative", height: 16, borderRadius: 980 }}>
            <div style={{
              position: "absolute", inset: 0, borderRadius: 980,
              padding: 1.5,
              background: "linear-gradient(100deg, #ff4f9a 0%, #c862ff 28%, #7a5cff 52%, #3b82ff 76%, #4cd6ff 100%)",
              WebkitMask: "linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0)",
              mask: "linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0)",
              WebkitMaskComposite: "xor", maskComposite: "exclude",
              pointerEvents: "none",
            }}></div>
            <div style={{
              position: "absolute", left: 2, top: 2, bottom: 2,
              width: `calc(${pct}% - 4px)`, borderRadius: 980,
              background: pct >= 100
                ? "linear-gradient(180deg, #4ed7a8 0%, #2cc296 50%, #19a07a 100%)"
                : "linear-gradient(180deg, #4ea3ff 0%, #2997ff 50%, #1f6fdc 100%)",
              boxShadow: pct >= 100
                ? "inset 0 1px 0 rgba(255,255,255,0.45), 0 0 12px rgba(44,194,150,0.5)"
                : "inset 0 1px 0 rgba(255,255,255,0.45), 0 0 12px rgba(41,151,255,0.5)",
              transition: "width 320ms cubic-bezier(0.32,0.72,0,1), background 320ms ease",
            }}></div>

          </div>

          {/* Pace nudge line removed per user request */}

          <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginTop: 18, alignItems: "center" }}>
            <GlassButton onClick={(e) => quickAdd(e, 250)}>+ 250 ml</GlassButton>
            <GlassButton onClick={(e) => quickAdd(e, 500)}>+ 500 ml</GlassButton>
            <GlassButton onClick={(e) => quickAdd(e, 1000)}>+ 1 L</GlassButton>
            <GlassButton onClick={openCustom}>
              <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round">
                  <line x1="12" y1="5" x2="12" y2="19"/>
                  <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Custom
              </span>
            </GlassButton>
            {log.length > 0 && log.some(e => !isBotEntry(e.id)) ? (
              <button
                onClick={(e) => {
                  e.stopPropagation();
                  const sorted = [...log].sort((a, b) => (b.time || "").localeCompare(a.time || ""));
                  const last = sorted[0];
                  if (last) setLog((prev) => prev.filter((x) => x.id !== last.id));
                }}
                style={{
                  display: "inline-flex", alignItems: "center", gap: 6,
                  padding: "9px 14px", borderRadius: 980,
                  fontFamily: "var(--font-text)", fontSize: 13, fontWeight: 500,
                  color: "rgba(29,29,31,0.7)",
                  background: "transparent",
                  border: "1px solid rgba(0,0,0,0.10)",
                  cursor: "pointer",
                }}
                title="Undo last sip">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M3 7v6h6"/>
                  <path d="M3 13a9 9 0 1 0 3-7.7L3 8"/>
                </svg>
                Undo last
              </button>
            ) : (
              <button
                disabled
                onClick={(e) => e.stopPropagation()}
                style={{
                  display: "inline-flex", alignItems: "center", gap: 6,
                  padding: "9px 14px", borderRadius: 980,
                  fontFamily: "var(--font-text)", fontSize: 13, fontWeight: 500,
                  color: "rgba(29,29,31,0.32)",
                  background: "transparent",
                  border: "1px solid rgba(0,0,0,0.06)",
                  cursor: "not-allowed",
                }}
                title="No sips to undo">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M3 7v6h6"/>
                  <path d="M3 13a9 9 0 1 0 3-7.7L3 8"/>
                </svg>
                Undo last
              </button>
            )}
          </div>
        </div>

        {/* Mini bottle on the right */}
        <MiniBottle pct={pct} hit={pct >= 100} />
      </div>

      {/* Stat strip across bottom */}
      <div className="dash-hero-stats" style={{
        marginTop: 22, paddingTop: 18,
        borderTop: "1px solid rgba(0,0,0,0.06)",
        display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 14,
      }}>
        <MiniStatHero label="Sips today" value={log.length ? `${log.length}` : "0"} accent="#2997ff" />
        <MiniStatHero label="Biggest" value={biggest ? formatHydrationAmount(biggest) : "—"} accent="#7a5cff" />
        <MiniStatHero label="7-day avg" value={formatHydrationAmount(avg)} accent="#ff4f9a" />
      </div>
    </GlassCard>
    {customOpen && (
      <AddEntryModal
        onSubmit={submitCustom}
        onCancel={() => setCustomOpen(false)}
      />
    )}
    </React.Fragment>
  );
}

// Compact bottle for the dashboard hero
function MiniBottle({ pct, hit }) {
  const fillH = (pct / 100) * 130;
  return (
    <div style={{
      width: "100%", height: "100%", minHeight: 160,
      display: "flex", alignItems: "center", justifyContent: "center",
    }}>
    <div style={{
      position: "relative", width: 110, height: 160,
      animation: "miniBob 4.5s ease-in-out infinite",
    }}>
      <div style={{
        position: "absolute", inset: -10,
        background: "radial-gradient(closest-side, rgba(76,214,255,0.30), rgba(122,92,255,0.15) 55%, transparent 80%)",
        filter: "blur(6px)",
      }}></div>
      <svg viewBox="0 0 110 160" width="110" height="160" style={{ position: "relative", zIndex: 1, overflow: "visible" }}>
        <defs>
          <linearGradient id="miniGlass" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="rgba(255,255,255,0.95)"/>
            <stop offset="100%" stopColor="rgba(255,255,255,0.55)"/>
          </linearGradient>
          <linearGradient id="miniWater" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={hit ? "#4ed7a8" : "#4ea3ff"}/>
            <stop offset="50%" stopColor={hit ? "#2cc296" : "#2997ff"}/>
            <stop offset="100%" stopColor={hit ? "#19a07a" : "#1f6fdc"}/>
          </linearGradient>
          <clipPath id="miniClip">

// =====================================================
// MicroInjuriesCard — body silhouette + active issues with rest-day countdowns
// Reads from shared microInjuriesStore. Click → opens full page.
// =====================================================
function MicroInjuriesCard({ onClick }) {
  const [hover, setHover] = React.useState(false);
  const { injuries: rawInjuries, pinned } = useMicroInjuriesStore();

  // If the bot has live injuries, use those; otherwise fall back to seed
  const liveInjuries = window.__bjjdata && Array.isArray(window.__bjjdata.injuries_active)
    ? window.__bjjdata.injuries_active
    : null;
  const useLive = liveInjuries && liveInjuries.length > 0;

  // Map bot severity to React tile's severity vocabulary
  const sevMap = { minor: "watch", moderate: "fresh", severe: "critical", watch: "watch", fresh: "fresh", critical: "critical", managing: "managing" };
  const liveAsTileShape = useLive
    ? liveInjuries.map((inj, i) => ({
        id: `bot-injury-${i}`,
        name: inj.body_part,
        region: "torso",  // safe default for silhouette
        severity: sevMap[inj.severity] || "watch",
        notes: inj.notes,
      }))
    : null;

  const sorted = useLive ? liveAsTileShape : sortMicroInjuries(rawInjuries, pinned);

  // Decorate with x/y/color for the silhouette + row dot
  const tones = {
    critical: { bg: "rgba(196,50,79,0.10)", fg: "#c4324f", label: "critical" },
    fresh:    { bg: "rgba(224,38,74,0.08)",  fg: "#e0264a", label: "fresh"    },
    watch:    { bg: "rgba(201,122,0,0.10)",  fg: "#c97a00", label: "watch"    },
    managing: { bg: "rgba(21,168,107,0.10)", fg: "#15a86b", label: "managing" },
  };
  const decorated = sorted.map((inj) => {
    const region = microInjuriesRegion(inj.region);
    return {
      ...inj,
      x: region.x,
      y: region.y,
      color: microInjuriesTierColor(inj.severity),
    };
  });

  // Headline + sub derived from store
  const total = decorated.length;
  const criticalCount = decorated.filter((i) => i.severity === "critical").length;
  const freshCount = decorated.filter((i) => i.severity === "fresh").length;
  const watchCount = decorated.filter((i) => i.severity === "watch").length;
  const headline = total === 0 ? "All clear" : `${total} tracked`;
  const subParts = [];
  if (criticalCount > 0) subParts.push(`${criticalCount} critical`);
  if (freshCount > 0) subParts.push(`${freshCount} fresh`);
  if (watchCount > 0) subParts.push(`${watchCount} on watch`);
  const sub = total === 0 ? "no active injuries" : `this week · ${subParts.join(" · ") || "monitoring"}`;

  // Pick advice from the most-acute injury, else null
  const top =
    decorated.find((i) => i.severity === "critical") ||
    decorated.find((i) => i.severity === "fresh") ||
    decorated.find((i) => i.severity === "watch");
  const adviceTone = top?.severity === "critical"
    ? { bg: "rgba(196,50,79,0.07)", border: "rgba(196,50,79,0.25)", color: "#8a1f35" }
    : { bg: "rgba(201,122,0,0.07)", border: "rgba(201,122,0,0.20)", color: "#8a5500" };
  const advice = top ? `Avoid aggravating the ${microInjuriesRegion(top.region).label.toLowerCase()} for now.` : null;

  return (
    <div
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
      background: "#fff", borderRadius: 22,
      border: "1px solid rgba(0,0,0,0.06)",
      cursor: onClick ? "pointer" : "default",
      transform: hover ? "translateY(-2px)" : "translateY(0)",
      boxShadow: hover
        ? "0 1px 2px rgba(0,0,0,0.03)," +
          " 0 12px 28px -10px rgba(255,79,154,0.24)," +
          " 0 14px 36px -12px rgba(122,92,255,0.24)," +
          " 0 16px 40px -10px rgba(76,214,255,0.20)"
        : "0 1px 2px rgba(0,0,0,0.03)," +
          " 0 6px 18px -8px rgba(255,79,154,0.18)," +
          " 0 8px 24px -10px rgba(122,92,255,0.18)," +
          " 0 10px 28px -8px rgba(76,214,255,0.16)",
      transition: "all 220ms cubic-bezier(0.32, 0.72, 0, 1)",
      overflow: "hidden",
    }}>
      <div className="mi-grid" style={{ display: "grid", gridTemplateColumns: "200px 1fr", gap: 0 }}>
        <div style={{
          position: "relative",
          background: "linear-gradient(160deg, rgba(122,92,255,0.05), rgba(76,214,255,0.05))",
          padding: "18px 12px",
          borderRight: "1px solid rgba(0,0,0,0.05)",
          display: "flex", flexDirection: "column", alignItems: "center",
          overflow: "hidden",
        }}>
          {/* soft rainbow halo behind silhouette */}
          <div style={{
            position: "absolute", top: "50%", left: "50%",
            width: 220, height: 220, transform: "translate(-50%, -50%)",
            background: "radial-gradient(circle, rgba(255,79,154,0.10) 0%, rgba(122,92,255,0.06) 35%, transparent 70%)",
            pointerEvents: "none",
          }}></div>
          <div style={{ position: "relative", width: "100%", flex: 1 }}>
            <BodySilhouette injuries={decorated} />
          </div>
          {/* legend strip below silhouette */}
          <div style={{
            position: "relative",
            display: "flex", alignItems: "center", justifyContent: "center",
            gap: 10, paddingTop: 8, flexWrap: "wrap",
          }}>
            {criticalCount > 0 && <LegendDot color="#c4324f" label={`${criticalCount} critical`} />}
            {freshCount > 0    && <LegendDot color="#e0264a" label={`${freshCount} fresh`} />}
            {watchCount > 0    && <LegendDot color="#c97a00" label={`${watchCount} watch`} />}
          </div>
        </div>
        <div style={{ padding: "20px 22px", display: "flex", flexDirection: "column", gap: 14 }}>
          <div>
            <div style={{
              fontFamily: "var(--font-display)", fontSize: 32, fontWeight: 600,
              letterSpacing: "-0.025em", lineHeight: 1, color: "#1d1d1f",
            }}>{headline}</div>
            <div style={{ fontSize: 13, color: "rgba(29,29,31,0.55)", marginTop: 8 }}>{sub}</div>
          </div>

          {/* Stat strip — 3 mini-cards */}
          {total > 0 && (
            <div className="mi-mini-stats" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
              <MiniStat label="Active" value={total} accent="#7a5cff" />
              <MiniStat
                label="Most acute"
                value={top ? (MICRO_INJURIES_TIERS.find((t) => t.id === top.severity)?.label || top.severity) : "—"}
                accent={top ? microInjuriesTierColor(top.severity) : "#7a5cff"}
              />
              <MiniStat
                label="Region"
                value={top ? microInjuriesRegion(top.region).label : "—"}
                accent="#4cd6ff"
              />
            </div>
          )}

          {advice && (
            <div style={{
              padding: "11px 14px",
              background: adviceTone.bg,
              border: `1px solid ${adviceTone.border}`,
              borderRadius: 12,
              fontSize: 13, color: adviceTone.color, lineHeight: 1.45,
              display: "flex", alignItems: "flex-start", gap: 10,
            }}>
              <span style={{
                width: 6, height: 6, borderRadius: "50%",
                background: adviceTone.color, marginTop: 6, flexShrink: 0,
              }}></span>
              <span>{advice}</span>
            </div>
          )}
        </div>
      </div>
      <div style={{ borderTop: "1px solid rgba(0,0,0,0.05)" }}>
        {decorated.length === 0 && (
          <div style={{
            padding: "22px 18px", textAlign: "center",
            fontSize: 14, color: "rgba(29,29,31,0.55)",
          }}>
            Nothing tracked. Tap to log a tweak.
          </div>
        )}
        {decorated.map((inj, i) => {
          const t = tones[inj.severity];
          const isCritical = inj.severity === "critical";
          return (
            <div key={inj.id} style={{
              display: "flex", alignItems: "flex-start", gap: 14,
              padding: "14px 18px",
              borderBottom: i < decorated.length - 1 ? "1px solid rgba(0,0,0,0.04)" : "none",
              background: isCritical ? "rgba(196,50,79,0.04)" : "transparent",
              boxShadow: isCritical ? "inset 3px 0 0 #c4324f" : "none",
            }}>
              <div style={{
                width: 10, height: 10, borderRadius: "50%",
                background: inj.color, boxShadow: `0 0 8px ${inj.color}66`,
                marginTop: 6, flexShrink: 0,
              }}></div>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4, flexWrap: "wrap" }}>
                  <span style={{ fontFamily: "var(--font-display)", fontSize: 15, fontWeight: 600, letterSpacing: "-0.01em", color: "#1d1d1f" }}>{inj.name}</span>
                  <span style={{
                    padding: "3px 9px", borderRadius: 980,
                    fontSize: 11, fontWeight: 600, letterSpacing: "0.02em",
                    background: t.bg, color: t.fg,
                  }}>{t.label}</span>
                </div>
                <div style={{
                  fontSize: 13.5, color: "rgba(29,29,31,0.72)", lineHeight: 1.45,
                  display: "-webkit-box", WebkitBoxOrient: "vertical", WebkitLineClamp: 2,
                  overflow: "hidden",
                }}>{inj.description}</div>
              </div>
              <div style={{ fontSize: 12, color: "rgba(29,29,31,0.45)", flexShrink: 0, paddingTop: 4, fontVariantNumeric: "tabular-nums" }}>
                {inj.rest}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function LegendDot({ color, label }) {
  return (
    <div style={{
      display: "inline-flex", alignItems: "center", gap: 5,
      fontSize: 11, fontWeight: 600, letterSpacing: "0.02em",

    }}>
      <span style={{
        width: 6, height: 6, borderRadius: "50%",
        background: color, boxShadow: `0 0 6px ${color}66`,
      }}></span>
      {label}

}

function MiniStat({ label, value, accent }) {

      padding: "8px 10px",
      borderRadius: 12,

function BodySilhouette({ injuries }) {
  return (
    <svg viewBox="0 0 100 200" style={{ width: "100%", height: 220, display: "block" }}>
      <defs>
        <linearGradient id="bodyFillDash" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="rgba(122,92,255,0.10)"/>
          <stop offset="100%" stopColor="rgba(76,214,255,0.08)"/>
        </linearGradient>
      </defs>
      <ellipse cx="50" cy="14" rx="9" ry="10" fill="url(#bodyFillDash)" stroke="rgba(29,29,31,0.18)" strokeWidth="0.6"/>
      <rect x="46" y="22" width="8" height="6" fill="url(#bodyFillDash)" stroke="rgba(29,29,31,0.18)" strokeWidth="0.6"/>

  <script type="text/babel">
// Editor — chat with rotating rainbow halo on the focused composer

const { useState: useStateEd, useRef: useRefEd, useEffect: useEffectEd, useCallback: useCallbackEd } = React;

const QUICK_ACTIONS = [

  "Any errors in the logs?",
  "Show my technique folders",
  "Any active injuries?",
  "What's my water streak?",
];

const TOOL_LABELS = {
  read_file:            (input) => `📖 Read ${input.path || input.file_path || ''}`,
  write_file:           (input) => `✏️ Committed ${input.path || input.file_path || ''}`,
  list_files:           (input) => `📋 Browsed ${input.path || '/'}`,
  get_railway_logs:     (input) => `🚂 Railway logs (${input.service || ''})`,
  get_deployment_status:(input) => `🚦 Deployment status (${input.service || ''})`,
};

function renderContent(text) {
  // Process triple-backtick code blocks first
  let html = '';
  const parts = text.split(/(```[\s\S]*?```)/g);
  parts.forEach((part) => {
    if (part.startsWith('```') && part.endsWith('```')) {
      const inner = part.slice(3, -3);
      // Strip optional language identifier on first line
      const newlineIdx = inner.indexOf('\n');
      const code = newlineIdx !== -1 ? inner.slice(newlineIdx + 1) : inner;
      const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const id = 'cb_' + Math.random().toString(36).slice(2);
      html += `<div style="position:relative;margin:8px 0;">` +
        `<pre id="${id}" style="background:rgba(0,0,0,0.05);padding:12px 12px 12px 12px;border-radius:8px;font-family:monospace;font-size:13px;overflow-x:auto;white-space:pre-wrap;margin:0;">${escaped}</pre>` +
        `<button onclick="(function(){var el=document.getElementById('${id}');navigator.clipboard.writeText(el.innerText);})()" ` +
          `style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.07);border:none;border-radius:5px;padding:3px 8px;font-size:11px;cursor:pointer;color:#555;font-family:monospace;">Copy</button>` +
        `</div>`;
    } else {
      // Inline backticks
      let s = part.replace(/`([^`]+)`/g, (_, c) => {
        const esc = c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return `<code style="background:rgba(0,0,0,0.07);padding:2px 5px;border-radius:4px;font-family:monospace;font-size:13px;">${esc}</code>`;
      });
      // Bold
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      // Newlines
      s = s.replace(/\n/g, '<br/>');
      html += s;
    }
  });
  return html;
}

function ChatMessage({ role, body, toolEvents, loading, deployDone }) {

            position: "absolute", inset: 0, borderRadius: 22, padding: 1.5,
            background: "linear-gradient(120deg, #ff4f9a, #c862ff, #7a5cff, #3b82ff, #4cd6ff)",

            fontSize: 15.5, lineHeight: 1.5,
            letterSpacing: "-0.011em",

  const events = toolEvents || [];

      {events.length > 0 && (

                color: "rgba(29,29,31,0.55)",
                letterSpacing: "-0.008em",

        </div>

      {/* Message bubble */}
      <div style={{ position: "relative", maxWidth: "min(70%, 460px)" }}>
        <div style={{
          position: "absolute", inset: 0, borderRadius: 22, padding: 1.5,
          background: "linear-gradient(120deg, #ff4f9a, #c862ff, #7a5cff, #3b82ff, #4cd6ff)",

            padding: "14px 20px", borderRadius: 22,
            background: "rgba(255,255,255,0.85)",

          }}
          dangerouslySetInnerHTML={{ __html: renderContent(body || '') }}
        />
      </div>

      {/* Deploy banner */}
      {hasWrite && (
        <div style={{
          marginTop: 6,
          display: "inline-block",
          padding: "3px 12px",
          borderRadius: 20,
          background: deployDone ? "rgba(52,199,89,0.10)" : "rgba(122,92,255,0.08)",
          border: deployDone ? "1px solid rgba(52,199,89,0.28)" : "1px solid rgba(122,92,255,0.22)",
          fontSize: 12,
          color: deployDone ? "#1a7a35" : "#5a40cc",
          letterSpacing: "-0.008em",
          fontFamily: "var(--font-text)",
          transition: "all 0.4s ease",
        }}>
          {deployDone
            ? "✅ Should be live now — hard refresh if needed"

          }
        </div>
      )}
    </div>
  );
}

function Composer({ focused, setFocused, value, setValue, onSend, listening, onVoice }) {
