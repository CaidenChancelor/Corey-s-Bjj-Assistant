<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BJJ Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Personal BJJ training dashboard — schedule, hydration, meals, injuries, and technique tracking">
  <meta name="theme-color" content="#f3eee5">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
/* =============================================================
   BJJ Dashboard — Design Tokens
   Jewel-tone editorial palette on warm ivory
   ============================================================= */
:root {
  /* =========================================================
     COLOR — Surfaces (warm paper)
     ========================================================= */
  --bg-paper:       #f7f1e3;   /* ivory — login card, hero card */
  --bg-canvas:      #f3eee5;   /* page floor — cream */
  --bg-parchment:   #ece4d3;   /* secondary surface, warm sand */
  --bg-hairline:    rgba(26, 24, 20, 0.10);

  /* Glass tints */
  --glass-2:        rgba(247, 241, 227, 0.66);
  --glass-stroke-2: rgba(26, 24, 20, 0.08);

  /* =========================================================
     COLOR — Foreground (charcoal ink on paper)
     ========================================================= */
  --ink:            #1a1814;
  --ink-muted:      rgba(26, 24, 20, 0.62);
  --ink-faint:      rgba(26, 24, 20, 0.55);
  --fg-2:           rgba(26, 24, 20, 0.78);
  --fg-5:           rgba(26, 24, 20, 0.18);
  --fg-on-gradient: #f7f1e3;

  /* =========================================================
     COLOR — Jewel-tone accents
     ========================================================= */
  --accent-oxblood: #6e1320;
  --accent-cobalt:  #1c2c5a;
  --accent-gold:    #c79a3a;
  --ai-gradient: linear-gradient(
    120deg,
    var(--accent-oxblood) 0%,
    var(--accent-cobalt) 50%,
    var(--accent-gold) 100%
  );

  /* =========================================================
     COLOR — Semantic
     ========================================================= */
  --accent-success: #2e6d4a;
  --accent-warn:    #b87f1f;
  --accent-danger:  #8b1f1f;
  --accent-danger-bright: #e0264a;
  --accent-critical: #c4324f;

  /* =========================================================
     TYPOGRAPHY
     ========================================================= */
  --font-display: "Space Grotesk", "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
  --font-text:    "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-mono:    "JetBrains Mono", "SF Mono", ui-monospace, Menlo, Consolas, monospace;

  --type-body:        17px;
  --track-body:       -0.01em;
  --leading-normal:   1.5;

  /* =========================================================
     SHADOWS — soft drops over light, keep glass airy
     ========================================================= */
  --shadow-card:   0 1px 0 rgba(255,255,255,0.9) inset,
                   0 8px 24px -8px rgba(60, 60, 90, 0.16),
                   0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-pop:    0 1px 0 rgba(255,255,255,0.95) inset,
                   0 24px 60px -16px rgba(60, 60, 90, 0.22),
                   0 2px 6px rgba(0, 0, 0, 0.05);
  --shadow-btn:    0 4px 12px -3px rgba(28,44,90,0.3);
  --shadow-modal:  0 24px 80px -16px rgba(60,60,90,0.35), 0 8px 24px rgba(0,0,0,0.08);

  /* Motion */
  --ease-spring:   cubic-bezier(0.32,0.72,0,1);
  --ease-out:      cubic-bezier(0.22,1,0.36,1);
  --d-fast: 160ms;
  --blur-sm:  blur(20px) saturate(140%);
}

/* =============================================================
   GLOBAL BASE
   ============================================================= */
html {
  scroll-behavior: smooth;
}
html, body {
  margin: 0;
  background: var(--bg-canvas);
  color: var(--ink);
  font-family: var(--font-text);
  font-size: var(--type-body);
  line-height: var(--leading-normal);
  letter-spacing: var(--track-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  font-feature-settings: "ss01", "cv11", "calt";
}
/* Selection highlight */
::selection { background: rgba(28,44,90,0.15); color: var(--ink); }
/* Custom scrollbar — thin, subtle */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(26,24,20,0.12); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: rgba(26,24,20,0.22); }

/* Focus-visible ring — accessible keyboard focus indicator */
*:focus-visible {
  outline: 2px solid var(--accent-cobalt);
  outline-offset: 2px;
}
input:focus-visible, textarea:focus-visible, select:focus-visible {
  outline: 2px solid var(--accent-cobalt);
  outline-offset: 0;
}

/* =============================================================
   AURORA BACKGROUND — animated jewel-tone bloom that drifts slowly
   Not interactive (user nixed the fluid sim). Pure CSS.
   ============================================================= */
body {
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  inset: -30%;
  z-index: 0;
  pointer-events: none;
  background-image:
    radial-gradient(48% 38% at 18% 22%, rgba(110, 19, 32, 0.12), transparent 65%),
    radial-gradient(52% 42% at 80% 28%, rgba(28, 44, 90, 0.08), transparent 65%),
    radial-gradient(46% 38% at 28% 78%, rgba(199, 154, 58, 0.08), transparent 65%),
    radial-gradient(50% 42% at 84% 78%, rgba(110, 19, 32, 0.06), transparent 65%);
  filter: blur(60px) saturate(140%);
  animation: aurora-drift 32s ease-in-out infinite;
}
body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.06 0 0 0 0 0.05 0 0 0 0 0.04 0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  background-size: 180px 180px;
  opacity: 0.18;
  mix-blend-mode: multiply;
}
@keyframes aurora-drift {
  0%   { transform: translate3d(0,0,0) scale(1) rotate(0deg); }
  33%  { transform: translate3d(-3%, 2%, 0) scale(1.06) rotate(2deg); }
  66%  { transform: translate3d(2%, -2%, 0) scale(1.04) rotate(-1deg); }
  100% { transform: translate3d(0,0,0) scale(1) rotate(0deg); }
}
@media (prefers-reduced-motion: reduce) {
  body::before { animation: none; }
}

/* Subtle page-enter animation */
@keyframes page-enter {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
[data-screen-label] {
  animation: page-enter 0.28s cubic-bezier(0.32,0.72,0,1) both;
}
@media (prefers-reduced-motion: reduce) {
  [data-screen-label] { animation: none; }
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* =============================================================
   PAGE-LEVEL CHROME
   ============================================================= */
#root {
  position: relative;
  z-index: 1;
  min-height: 100vh;
}

/* Card transition base — hero cards get lift, others just smooth shadow changes */
[class*="GlassCard"], .glass-card,
.hy-hero-card, .dash-hero {
  transition: transform 380ms cubic-bezier(0.32,0.72,0,1),
              box-shadow 380ms cubic-bezier(0.32,0.72,0,1);
}

/* Scroll reveal — sections fade in + lift on enter */
.reveal {
  opacity: 0;
  transform: translateY(18px);
  transition: opacity 720ms cubic-bezier(0.22,1,0.36,1),
              transform 720ms cubic-bezier(0.22,1,0.36,1);
}
.reveal.in {
  opacity: 1;
  transform: translateY(0);
}


/* =============================================================
   THE VIEWPORT HALO — wraps every page edge, slow rotation
   ============================================================= */
@keyframes halo-rotate { to { transform: rotate(360deg); } }
@keyframes mesh-drift {
  0%, 100% { transform: translate3d(0,0,0) scale(1); }
  50%      { transform: translate3d(-2%, 1%, 0) scale(1.05); }
}

/* =============================================================
   RESPONSIVE — mobile-first cascade with min-width queries
   Phone (≤700) → Tablet (701-1000) → Desktop (≥1001)
   ============================================================= */

/* Base = phone (≤ 700px). Single-column, full-width, generous tap targets. */

/* Page padding — phone first */
.dash-page {
  padding-top: calc(96px + env(safe-area-inset-top, 0px)) !important;
  padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px)) !important;
  padding-left: 16px !important;
  padding-right: 16px !important;
}

/* Hero card → stack inner stats above mini-bottle (or hide bottle entirely) */
.dash-hero-card-inner { padding: 22px !important; }
.dash-hero-card,
.dash-hero-card-inner {
  height: auto !important;
}
.hy-hero-card-inner { padding: 22px !important; }
.dash-hero-inner {
  grid-template-columns: 1fr !important;
  gap: 18px !important;
}
.dash-hero-inner > :nth-child(2) {
  /* Mini bottle on phone — hide to keep hero compact */
  display: none !important;
}
.dash-hero-stats {
  grid-template-columns: repeat(2, 1fr) !important;
  row-gap: 16px !important;
}

/* Hero + side stats row — full single column */
.dash-hero-row {
  grid-template-columns: 1fr !important;
}
.dash-hero-row > div:nth-child(2) {
  /* The 2-row side stack of StatTiles becomes a single column */
  grid-template-rows: auto auto !important;
  gap: 16px !important;
}

/* Secondary 3-column stat row → 1 column on phone */
.dash-stat-row {
  grid-template-columns: 1fr !important;
  gap: 16px !important;
  margin-bottom: 28px !important;
}

/* Two-col timeline + messages → 1 column */
.dash-two-col {
  grid-template-columns: 1fr !important;
  gap: 24px !important;
}

/* Micro-injuries inner grid — silhouette stacks above content on phone */
.mi-grid {
  grid-template-columns: 1fr !important;
}
.mi-mini-stats {
  grid-template-columns: 1fr 1fr !important;
}
.mi-mini-stats > :nth-child(3) { grid-column: span 2; }

/* Quick-add buttons — full-width stacked buttons + 44px min height on phone */
.dash-hero-card button,
.hy-hero button,
.hy-quick-add button {
  min-height: 44px;
}

/* NavPill — keep visible on mobile, slimmer */
.bjj-navpill-wrap {
  top: calc(12px + env(safe-area-inset-top, 0px)) !important;
  left: 12px !important;
  right: 12px !important;
  transform: none !important;
}
.bjj-navpill {
  width: 100%;
  justify-content: space-between !important;
  padding: 8px 12px !important;
}

/* Hydration page — stack hero columns + body grid on phone */
.hy-page {
  padding-top: calc(86px + env(safe-area-inset-top, 0px)) !important;
  padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px)) !important;
  padding-left: 16px !important;
  padding-right: 16px !important;
}
.hy-hero-grid {
  grid-template-columns: 1fr !important;
  gap: 20px !important;
}
.hy-hero-bottle {
  display: none !important;
}
.hy-hero-stats {
  grid-template-columns: repeat(2, 1fr) !important;
  row-gap: 14px !important;
}
.hy-body-grid {
  grid-template-columns: 1fr !important;
  gap: 20px !important;
}

/* Row actions — hidden by default, visible on hover or touch */
.lesson-row-actions { opacity: 0; }
.row-actions-visible { opacity: 1; }

/* Touch-friendly: don't rely on hover for delete/secondary actions */
@media (hover: none) {
  .row-actions, .lesson-row-actions {
    opacity: 1 !important;
  }
  .row-actions button {
    opacity: 1 !important;
    transform: scale(1) !important;
  }
  .hy-log-row button,
  .dash-msg-row button {
    opacity: 1 !important;
    transform: scale(1) !important;
  }
}

/* =============================================================
   TECHNIQUE LIBRARY — clean rows on warm paper, jewel-tone accents
   ============================================================= */
.tl-stat-strip {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  align-items: end;
}
@media (max-width: 500px) {
  .tl-stat-strip { grid-template-columns: 1fr; gap: 12px; }
}
.tl-stat {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.tl-stat-value {
  font-family: Inter, var(--font-display);
  font-size: 28px;
  font-weight: 900;
  letter-spacing: -0.05em;
  color: var(--stripe-ink);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.tl-stat-label {
  font-family: Inter, var(--font-text);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--stripe-faint);
}
.tl-row {
  position: relative;
  width: 100%;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 20px;
  text-align: left;
  cursor: pointer;
  background: var(--stripe-card);
  border: 1px solid var(--stripe-line);
  border-radius: 16px;
  box-shadow: var(--stripe-shadow);
  transition: transform 200ms cubic-bezier(0.32,0.72,0,1),
              box-shadow 200ms cubic-bezier(0.32,0.72,0,1),
              border-color 200ms ease;
  font-family: Inter, var(--font-text);
}
.tl-row:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-pop);
  border-color: var(--stripe-blue);
}
.tl-row:active { transform: translateY(0); }
.tl-row-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}
.tl-row-body { flex: 1; min-width: 0; }
.tl-row-name {
  font-family: Inter, var(--font-display);
  color: var(--stripe-ink);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.25;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tl-row-meta {
  margin-top: 4px;
  color: var(--stripe-faint);
  font-size: 13px;
  line-height: 1.5;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tl-row-arrow {
  flex-shrink: 0;
  color: var(--stripe-faint);
  transition: transform 200ms cubic-bezier(0.32,0.72,0,1), color 200ms ease;
}
.tl-row:hover .tl-row-arrow {
  color: var(--stripe-blue);
  transform: translateX(2px);
}

/* ===== Tablet (701px – 1000px): 2-column where it makes sense ===== */
@media (min-width: 700px) {
  .dash-page {
    padding-top: 100px !important;
    padding-bottom: 80px !important;
    padding-left: 24px !important;
    padding-right: 24px !important;
  }
  .dash-hero-card-inner { padding: 28px !important; }
  .hy-hero-card-inner { padding: 28px !important; }
  .dash-hero-inner {
    grid-template-columns: minmax(0,1fr) 130px !important;
    gap: 22px !important;
  }
  .dash-hero-inner > :nth-child(2) { display: flex !important; }
  .dash-hero-stats { grid-template-columns: repeat(3, 1fr) !important; }

  /* Hero + side stats — keep stacked on tablet (full-width hero), side tiles 2-up below */
  .dash-hero-row {
    grid-template-columns: 1fr !important;
  }
  .dash-hero-row > div:nth-child(2) {
    display: grid !important;
    grid-template-columns: 1fr 1fr !important;
    grid-template-rows: auto !important;
  }

  .dash-stat-row {
    grid-template-columns: repeat(4, 1fr) !important;
    gap: 18px !important;
    margin-bottom: 32px !important;
  }
  .dash-two-col {
    grid-template-columns: 1fr !important;
  }

  .mi-grid {
    grid-template-columns: 200px 1fr !important;
  }
  .mi-mini-stats {
    grid-template-columns: 1fr 1fr 1fr !important;
  }
  .mi-mini-stats > :nth-child(3) { grid-column: auto; }

  .bjj-navpill-wrap {
    top: 24px !important;
    left: 50% !important;
    right: auto !important;
    transform: translateX(-50%) !important;
  }
  .bjj-navpill {
    width: auto;
    justify-content: flex-start !important;
    padding: 10px 14px 10px 16px !important;
  }

  .hy-page {
    padding-top: 90px !important;
    padding-bottom: 120px !important;
    padding-left: 24px !important;
    padding-right: 24px !important;
  }
  .hy-hero-grid {
    grid-template-columns: minmax(0,1fr) 220px !important;
    gap: 22px !important;
  }
  .hy-hero-bottle {
    display: flex !important;
    width: 220px !important;
    height: 260px !important;
  }
  .hy-hero-stats { grid-template-columns: repeat(4, 1fr) !important; }
  .hy-body-grid {
    grid-template-columns: 1fr !important;
  }
}

/* ===== Desktop (≥ 1001px): full multi-column dashboard ===== */
@media (min-width: 1001px) {
  .dash-hero-card { padding: 36px !important; }
  .dash-hero-row {
    grid-template-columns: 1.4fr 1fr !important;
    gap: 24px !important;
  }
  .dash-hero-row > div:nth-child(2) {
    grid-template-columns: 1fr !important;
    grid-template-rows: 1fr 1fr !important;
    gap: 24px !important;
  }
  .dash-stat-row {
    gap: 24px !important;
    margin-bottom: 40px !important;
  }
  .dash-two-col {
    grid-template-columns: 1fr 1fr !important;
    gap: 24px !important;
  }
  .dash-hero-card-inner { padding: 36px !important; }
  .hy-hero-card-inner { padding: 36px !important; }
  .hy-hero-grid {
    grid-template-columns: minmax(0,1fr) 300px !important;
    gap: 28px !important;
  }
  .hy-hero-bottle {
    width: 280px !important;
    height: 330px !important;
  }
  .hy-body-grid {
    grid-template-columns: 1.1fr 1fr !important;
    gap: 24px !important;
  }
}

/* Prevent horizontal scroll on small viewports */
html, body {
  max-width: 100%;
  overflow-x: hidden;
}

/* =============================================================
   OPERATING CONSOLE UX PASS
   Dense SaaS-style dashboard primitives for the main training view.
   ============================================================= */
.ops-console {
  max-width: 860px;
  margin: 0 auto;
}

/* ---- editorial section spacing ---- */
.ed-section {
  opacity: 0;
  transform: translateY(24px);
  animation: ed-reveal 0.8s cubic-bezier(0.22,1,0.36,1) forwards;
}
.ed-section:nth-child(1) { animation-delay: 0s; }
.ed-section:nth-child(2) { animation-delay: 0.1s; }
.ed-section:nth-child(3) { animation-delay: 0.2s; }
.ed-section:nth-child(4) { animation-delay: 0.3s; }
.ed-section:nth-child(5) { animation-delay: 0.4s; }
.ed-section:nth-child(6) { animation-delay: 0.5s; }
.ed-section:nth-child(7) { animation-delay: 0.6s; }
.ed-section:nth-child(8) { animation-delay: 0.7s; }
.ed-section:nth-child(9) { animation-delay: 0.8s; }
.ed-section:nth-child(10) { animation-delay: 0.9s; }
.ed-section:nth-child(11) { animation-delay: 1.0s; }
@keyframes ed-reveal {
  to { opacity: 1; transform: translateY(0); }
}

/* ---- dark hero section ---- */
.ed-hero {
  background: linear-gradient(135deg, #0f1724 0%, #1c2c5a 50%, #0f1724 100%);
  color: #f7f1e3;
  border-radius: 20px;
  padding: 48px 40px;
  margin-bottom: 80px;
  position: relative;
  overflow: hidden;
}
.ed-hero::before {
  content: "";
  position: absolute;
  top: -50%;
  right: -20%;
  width: 60%;
  height: 200%;
  background: radial-gradient(circle, rgba(199,154,58,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.ed-hero::after {
  content: "";
  position: absolute;
  bottom: -40%;
  left: -10%;
  width: 50%;
  height: 150%;
  background: radial-gradient(circle, rgba(110,19,32,0.06) 0%, transparent 70%);
  pointer-events: none;
}
.ed-hero .ops-eyebrow {
  color: rgba(247,241,227,0.5);
}
.ed-hero .ed-action-btn {
  color: rgba(247,241,227,0.7);
  border-color: rgba(247,241,227,0.15);
}
.ed-hero .ed-action-btn:hover {
  color: #f7f1e3;
  border-color: rgba(247,241,227,0.35);
  background: rgba(247,241,227,0.06);
}
.ed-hero-next {
  font-family: var(--font-display);
  font-size: clamp(24px, 4vw, 36px);
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.2;
  background: linear-gradient(120deg, #d4707e 0%, #8fa4d4 50%, #d4b968 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ---- key metrics row ---- */
.ed-metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
}
.ed-metric {
  position: relative;
  text-align: center;
  cursor: pointer;
  padding: 32px 8px;
  transition: transform 0.25s cubic-bezier(0.22,1,0.36,1), opacity 0.15s ease;
}
.ed-metric::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -60%);
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background: radial-gradient(circle, currentColor 0%, transparent 70%);
  opacity: 0.05;
  pointer-events: none;
  transition: opacity 0.3s ease, width 0.3s ease, height 0.3s ease;
}
.ed-metric:hover::before {
  opacity: 0.09;
  width: 160px;
  height: 160px;
}
.ed-metric:hover { transform: translateY(-2px); }
.ed-metric-value {
  font-family: var(--font-display);
  font-size: clamp(48px, 8vw, 72px);
  font-weight: 800;
  letter-spacing: -0.04em;
  line-height: 1;
  color: var(--ink);
  position: relative;
}
.ed-metric-label {
  font-family: var(--font-text);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-top: 10px;
}
.ed-metric-sub {
  font-family: var(--font-text);
  font-size: 12px;
  color: var(--ink-faint);
  margin-top: 6px;
  opacity: 0.7;
}

/* ---- readiness pulse ---- */
@keyframes ed-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
.ed-pulse {
  animation: ed-pulse 2.5s ease-in-out infinite;
}

/* ---- radial progress ring ---- */
.ed-ring {
  position: relative;
  display: inline-block;
}
.ed-ring svg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -55%);
  pointer-events: none;
}
.ed-ring-track {
  fill: none;
  stroke: rgba(26,24,20,0.05);
}
.ed-ring-fill {
  fill: none;
  stroke-linecap: round;
  transition: stroke-dashoffset 1.2s cubic-bezier(0.22,1,0.36,1);
}

/* ---- thin progress bar ---- */
.ed-progress {
  height: 3px;
  border-radius: 999px;
  background: rgba(26,24,20,0.06);
  overflow: hidden;
  margin-top: 12px;
  max-width: 100px;
  margin-left: auto;
  margin-right: auto;
}
.ed-progress > span {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: var(--accent-cobalt);
  transition: width 1.2s cubic-bezier(0.32,0.72,0,1);
}

/* ---- divider ---- */
.ed-divider {
  height: 1px;
  background: rgba(26,24,20,0.06);
  border: none;
  margin: 0;
}

/* ---- health two-col ---- */
.ed-health-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
}
.ed-health-col {
  cursor: pointer;
  padding-left: 20px;
  border-left: 3px solid var(--accent-cobalt);
  transition: border-color 0.25s ease, transform 0.25s ease;
}
.ed-health-col:hover {
  border-left-color: var(--accent-gold);
  transform: translateX(4px);
}

/* ---- activity list ---- */
.ed-activity-item {
  display: flex;
  gap: 16px;
  padding: 14px 8px;
  border-bottom: 1px solid rgba(26,24,20,0.04);
  align-items: flex-start;
  border-radius: 8px;
  transition: background 0.15s ease;
}
.ed-activity-item:last-child { border-bottom: none; }
.ed-activity-item:hover { background: rgba(26,24,20,0.02); }

/* ---- quick nav — vertical list with arrows ---- */
.ed-nav-row {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.ed-nav-link {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
  background: none;
  border: none;
  border-bottom: 1px solid rgba(26,24,20,0.06);
  cursor: pointer;
  padding: 18px 0;
  transition: color 0.2s ease;
  letter-spacing: -0.01em;
  text-align: left;
}
.ed-nav-link:last-child { border-bottom: none; }
.ed-nav-link::after {
  content: "\2192";
  opacity: 0.2;
  transition: opacity 0.2s ease, transform 0.2s ease;
  font-size: 16px;
}
.ed-nav-link:hover { color: var(--accent-cobalt); }
.ed-nav-link:hover::after { opacity: 0.8; transform: translateX(4px); }

/* ---- header action buttons ---- */
.ed-action-btn {
  font-family: var(--font-text);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-faint);
  background: none;
  border: 1px solid rgba(26,24,20,0.10);
  border-radius: 8px;
  padding: 7px 14px;
  cursor: pointer;
  transition: color 0.15s ease, border-color 0.15s ease;
  letter-spacing: -0.01em;
}
.ed-action-btn:hover {
  color: var(--ink);
  border-color: rgba(26,24,20,0.22);
}

/* ---- keep eyebrow/muted reusable ---- */
.ops-eyebrow {
  font-family: var(--font-text);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--ink-faint);
}
.ops-muted { color: var(--ink-faint); }

/* ---- legacy ops classes (kept for sub-views that still use them) ---- */
.ops-panel {
  background: rgba(255, 252, 245, 0.92);
  border: 1px solid rgba(26, 24, 20, 0.10);
  border-radius: 16px;
  box-shadow: 0 1px 0 rgba(255,255,255,0.80) inset, 0 24px 52px -28px rgba(26,24,20,0.30);
  backdrop-filter: blur(16px) saturate(140%);
  -webkit-backdrop-filter: blur(16px) saturate(140%);
  position: relative;
  overflow: hidden;
}
.ops-panel::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--ai-gradient);
  border-radius: 16px 18px 0 0;
}
.ops-grid {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: 24px;
  align-items: stretch;
}
.ops-span-3 { grid-column: span 3; }
.ops-span-4 { grid-column: span 4; }
.ops-span-5 { grid-column: span 5; }
.ops-span-6 { grid-column: span 6; }
.ops-span-7 { grid-column: span 7; }
.ops-span-8 { grid-column: span 8; }
.ops-span-12 { grid-column: span 12; }
.ops-card {
  background: rgba(255, 252, 245, 0.52);
  border: 1px solid rgba(26,24,20,0.06);
  border-radius: 16px;
  min-height: 100%;
  box-shadow: 0 1px 0 rgba(255,255,255,0.50) inset, 0 6px 18px -16px rgba(26,24,20,0.16);
  overflow: hidden;
}
.ops-card-click {
  cursor: pointer;
  transition: transform 180ms var(--ease-spring), box-shadow 180ms var(--ease-spring), border-color 180ms ease, background 180ms ease;
}
.ops-card-click:hover {
  transform: translateY(-1px);
  background: rgba(255, 252, 245, 0.72);
  border-color: rgba(28,44,90,0.12);
  box-shadow: 0 1px 0 rgba(255,255,255,0.60) inset, 0 12px 32px -18px rgba(28,44,90,0.22);
}
.ops-card-body { padding: 18px; }
.ops-value {
  font-family: var(--font-display);
  font-size: clamp(24px, 3.5vw, 32px);
  font-weight: 700;
  letter-spacing: -0.04em;
  line-height: 0.95;
  color: var(--ink);
}
.ops-pill-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.ops-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  border-radius: 999px;
  background: rgba(26,24,20,0.04);
  border: 1px solid var(--bg-hairline);
  color: var(--ink-muted);
  font-family: var(--font-text);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.01em;
  white-space: nowrap;
}
.ops-progress {
  height: 6px;
  border-radius: 999px;
  background: rgba(26,24,20,0.08);
  overflow: hidden;
}
.ops-progress > span {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--accent-cobalt), var(--accent-gold));
  transition: width 600ms cubic-bezier(0.32,0.72,0,1);
}
.ops-health-grid {
  display: grid;
  grid-template-columns: 1.02fr 0.98fr;
  gap: 14px;
}
.ops-health-grid > :first-child { border-left: 2px solid var(--accent-oxblood); }
.ops-health-grid > :last-child { border-left: 2px solid var(--accent-gold); }
.ops-spark-bars {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 7px;
  align-items: end;
  height: 74px;
}
.ops-spark-bars div {
  border-radius: 8px 9px 4px 4px;
  background: linear-gradient(180deg, rgba(199,154,58,0.92), rgba(110,19,32,0.92));
  min-height: 8px;
}
.ops-activity {
  max-height: 360px;
  overflow: auto;
  border-top: 1px solid rgba(26,24,20,0.06);
  scrollbar-width: thin;
  scrollbar-color: rgba(26,24,20,0.15) transparent;
}
@media (max-width: 1000px) {
  .ops-span-3,
  .ops-span-4,
  .ops-span-5,
  .ops-span-6,
  .ops-span-7,
  .ops-span-8 { grid-column: span 6; }
}
@media (max-width: 700px) {
  .ops-grid { grid-template-columns: 1fr; gap: 12px; }
  .ops-span-3,
  .ops-span-4,
  .ops-span-5,
  .ops-span-6,
  .ops-span-7,
  .ops-span-8,
  .ops-span-12 { grid-column: 1; }
  .ops-health-grid { grid-template-columns: 1fr; }
  .ops-card-body { padding: 14px; }
  .ed-metrics { grid-template-columns: 1fr; gap: 32px; }
  .ed-health-grid { grid-template-columns: 1fr; gap: 32px; }
  .ed-hero { padding: 32px 24px; border-radius: 16px; }
  .ed-hero-next { font-size: clamp(20px, 4vw, 28px); }
}



/* =============================================================
   CARDS — animated border sweep + holographic micro-effects
   ============================================================= */
@property --gc-angle {
  syntax: '<angle>';
  initial-value: 120deg;
  inherits: false;
}
@keyframes gc-spin { to { --gc-angle: 480deg; } }
.gc-border-anim {
  animation: gc-spin 14s linear infinite;
}
@media (prefers-reduced-motion: reduce) {
  .gc-border-anim { animation: none; }
}

/* =============================================================
   STRIPE-INSPIRED DASHBOARD PASS
   Angled gradient stage, floating modules, bento cards, reveal motion.
   ============================================================= */
:root {
  --stripe-blue: #635bff;
  --stripe-purple: #7a73ff;
  --stripe-cyan: #00d4ff;
  --stripe-mint: #00e5a8;
  --stripe-pink: #ff5c9a;
  --stripe-orange: #ffb86c;
  --stripe-ink: #0a2540;
  --stripe-slate: #425466;
  --stripe-faint: #6b7c93;
  --stripe-line: rgba(10, 37, 64, 0.10);
  --stripe-card: rgba(255, 255, 255, 0.88);
  --stripe-shadow: 0 30px 70px -35px rgba(10, 37, 64, 0.45),
                   0 18px 40px -28px rgba(99, 91, 255, 0.45),
                   0 1px 0 rgba(255, 255, 255, 0.88) inset;
}

body {
  background:
    radial-gradient(circle at 15% 10%, rgba(0, 212, 255, 0.10), transparent 26%),
    radial-gradient(circle at 85% 0%, rgba(255, 92, 154, 0.12), transparent 24%),
    linear-gradient(180deg, #f6f9fc 0%, #ffffff 44%, #f6f9fc 100%) !important;
}

.bjj-navpill-wrap {
  top: 0 !important;
  left: 0 !important;
  right: 0 !important;
  transform: none !important;
  display: flex;
  justify-content: center;
  padding: 18px 32px;
  border-bottom: 1px solid rgba(10,37,64,0.08);
  background: rgba(255,255,255,0.68);
  backdrop-filter: blur(14px) saturate(150%);
  -webkit-backdrop-filter: blur(14px) saturate(150%);
}
.bjj-navpill {
  width: min(1180px, 100%) !important;
  border-radius: 0 !important;
  background: transparent !important;
  border: 0 !important;
  box-shadow: none !important;
  padding: 0 !important;
  justify-content: space-between !important;
}
.nav-pill-tab {
  border-radius: 12px !important;
}
.stripe-wordmark {
  color: var(--stripe-ink);
  font-family: Inter, var(--font-display);
  font-size: 25px;
  font-weight: 900;
  letter-spacing: -0.08em;
  line-height: 1;
  white-space: nowrap;
}
.stripe-nav-actions {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}
.stripe-nav-action {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 40px;
  padding: 0 18px;
  border-radius: 8px;
  border: 0;
  font-size: 14px;
  font-weight: 800;
  cursor: pointer;
  white-space: nowrap;
}
.stripe-nav-action.signin {
  color: #b35c00;
  background: #fff;
}
.stripe-nav-action.primary {
  color: #fff;
  background: var(--stripe-blue);
  box-shadow: 0 16px 30px -20px rgba(99,91,255,0.9);
}

.stripe-dash {
  position: relative;
  min-height: 100vh;
  overflow-x: clip;
  overflow-y: visible;
  width: 100%;
  box-sizing: border-box;
  padding: 94px clamp(18px, 4vw, 42px) 96px;
}
.stripe-dash::before {
  content: "";
  position: absolute;
  inset: 76px -10vw auto auto;
  width: min(66vw, 820px);
  height: 620px;
  z-index: -1;
  background:
    radial-gradient(120% 80% at 75% 8%, rgba(255,184,108,0.96), transparent 48%),
    radial-gradient(95% 80% at 48% 28%, rgba(255,92,154,0.90), transparent 58%),
    radial-gradient(90% 100% at 14% 22%, rgba(99,91,255,0.82), transparent 64%),
    linear-gradient(125deg, rgba(0,212,255,0.34), rgba(255,255,255,0));
  clip-path: polygon(28% 0, 100% 0, 100% 100%, 58% 100%, 0 8%);
  filter: saturate(1.2);
  animation: stripeRibbonShift 12s ease-in-out infinite alternate;
  transform-origin: center;
}
.stripe-dash::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: -1;
  background-image:
    linear-gradient(rgba(10, 37, 64, 0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(10, 37, 64, 0.035) 1px, transparent 1px);
  background-size: 44px 44px;
  mask-image: linear-gradient(180deg, rgba(0,0,0,0.45), transparent 52%);
  pointer-events: none;
}
@keyframes stripeGradientShift {
  from { filter: hue-rotate(0deg) saturate(1); transform: skewY(-2deg) translateY(0); }
  to { filter: hue-rotate(18deg) saturate(1.08); transform: skewY(-2deg) translateY(18px); }
}
@keyframes stripeRibbonShift {
  from { transform: translate3d(0,0,0) skewX(-8deg); filter: hue-rotate(0deg) saturate(1.1); }
  to { transform: translate3d(-18px,10px,0) skewX(-8deg); filter: hue-rotate(18deg) saturate(1.24); }
}
.stripe-wrap {
  width: min(1160px, 100%);
  margin: 0 auto;
}
.stripe-hero {
  display: grid;
  grid-template-columns: minmax(0, 0.92fr) minmax(340px, 0.68fr);
  gap: clamp(28px, 5vw, 68px);
  align-items: center;
  min-height: 490px;
}
.stripe-kicker {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--stripe-ink);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0;
  margin-bottom: 24px;
  animation: stripeRise 700ms cubic-bezier(.22,1,.36,1) both;
}
.stripe-kicker::before {
  content: "";
  width: 28px;
  height: 2px;
  border-radius: 999px;
  background: var(--stripe-blue);
}
.stripe-title {
  margin: 0;
  max-width: 820px;
  font-family: Inter, var(--font-display);
  font-size: clamp(46px, 6.7vw, 76px);
  line-height: 1.04;
  letter-spacing: -0.055em;
  font-weight: 800;
  color: #020735;
  text-wrap: balance;
  animation: stripeRise 800ms cubic-bezier(.22,1,.36,1) 80ms both;
}
.stripe-title span {
  color: var(--stripe-blue);
  text-shadow: 0 1px 0 rgba(255,255,255,0.12);
}
.stripe-subtitle {
  max-width: 620px;
  margin: 26px 0 0;
  color: #425466;
  font-size: clamp(21px, 2.6vw, 31px);
  line-height: 1.55;
  letter-spacing: 0;
  animation: stripeRise 800ms cubic-bezier(.22,1,.36,1) 160ms both;
  text-shadow: 0 1px 0 rgba(255,255,255,0.24);
}
.stripe-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 34px;
  animation: stripeRise 800ms cubic-bezier(.22,1,.36,1) 240ms both;
}
.stripe-jump-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 40px;
  padding: 0 16px;
  border-radius: 999px;
  border: 1px solid var(--stripe-line);
  background: rgba(255,255,255,0.96);
  color: #0a2540;
  font: 700 14px/1 var(--font-text);
  cursor: pointer;
  transition: transform 180ms cubic-bezier(.22,1,.36,1), box-shadow 180ms ease, border-color 180ms ease;
}
.stripe-jump-btn.primary {
  background: #0a2540;
  border-color: #0a2540;
  color: #fff;
}
.stripe-jump-btn:hover {
  transform: translateY(-1px);
  border-color: rgba(10,37,64,0.24);
  box-shadow: 0 18px 34px -26px rgba(10,37,64,0.48);
}
.stripe-jump-btn.primary:hover {
  border-color: #0a2540;
}
.stripe-cta {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 44px;
  padding: 0 18px;
  border: 0;
  border-radius: 999px;
  font: 700 15px/1 var(--font-text);
  cursor: pointer;
  transition: transform 180ms cubic-bezier(.22,1,.36,1), box-shadow 180ms ease, background 180ms ease;
}
.stripe-cta.primary {
  color: #fff;
  background: #0a2540;
  box-shadow: 0 14px 30px -18px rgba(10,37,64,0.65);
}
.stripe-cta.secondary {
  color: #0a2540;
  background: rgba(255,255,255,0.74);
  box-shadow: 0 1px 0 rgba(255,255,255,0.8) inset;
}
.stripe-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 22px 45px -28px rgba(10,37,64,0.72);
}
.stripe-cta:active {
  transform: translateY(0) scale(0.985);
}
.stripe-visual {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 16px;
  min-height: 390px;
  perspective: 1200px;
  animation: stripeFloatIn 900ms cubic-bezier(.22,1,.36,1) 200ms both;
}
.stripe-orbit {
  position: absolute;
  inset: -14px;
  border-radius: 38px;
  background: conic-gradient(from 120deg, rgba(255,255,255,0), rgba(255,255,255,0.48), rgba(255,255,255,0));

.stripe-console {

.stripe-console-top {

.stripe-dot {

  height: 10px;
  border-radius: 999px;
  background: #ff5c9a;
}
.stripe-dot:nth-child(2) { background: #ffb86c; }
.stripe-dot:nth-child(3) { background: #00e5a8; }
.stripe-console-body {
  padding: 22px;

  gap: 16px;
}
.stripe-pay-card {

  padding: 18px;
  background: #0a2540;
  color: #fff;

  overflow: hidden;

.stripe-pay-card::after {

  position: absolute;
  inset: -40% -20% auto auto;

  background: radial-gradient(circle, rgba(0,212,255,0.7), transparent 64%);

.stripe-meter {

}
.stripe-meter span {
  display: block;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--stripe-cyan), var(--stripe-mint));
  animation: stripeMeter 1200ms cubic-bezier(.22,1,.36,1) both;

.stripe-mini-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.stripe-mini {
  padding: 14px;

.stripe-mini:nth-child(2) { animation-delay: 110ms; }
.stripe-mini:nth-child(3) { animation-delay: 190ms; }
.stripe-mini:nth-child(4) { animation-delay: 270ms; }
.stripe-floating {
  position: relative;
  width: 100%;
  border-radius: 20px;
  background: rgba(255,255,255,0.95);

.stripe-floating-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  width: min(100%, 430px);
  align-self: flex-end;

.stripe-logo-strip {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 18px;

  padding: 30px clamp(8px, 2vw, 28px);

  border-top: 1px solid rgba(10,37,64,0.10);
  border-bottom: 1px solid rgba(10,37,64,0.10);

  font-size: clamp(15px, 1.8vw, 22px);

.stripe-logo-strip span {

  filter: grayscale(1);

.stripe-floating.alt {

}
.stripe-section {
  margin-top: clamp(36px, 8vw, 92px);
  animation: stripeRise 800ms cubic-bezier(.22,1,.36,1) both;
}
.stripe-section-head {
  display: grid;
  grid-template-columns: minmax(0, 0.75fr) minmax(240px, 0.45fr);
  gap: 28px;
  align-items: end;
  margin-bottom: 26px;
}
.stripe-label {
  color: var(--stripe-blue);
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 0;
}
.stripe-h2 {
  margin: 8px 0 0;
  color: var(--stripe-ink);
  font: 900 clamp(34px, 5vw, 56px)/1.02 Inter, var(--font-display);
  letter-spacing: -0.055em;
  text-wrap: balance;
}
.stripe-copy {
  color: var(--stripe-slate);
  line-height: 1.65;
  font-size: 17px;
}
.stripe-bento {
  display: grid;
  grid-template-columns: repeat(12, minmax(0, 1fr));
  gap: 18px;
}
.stripe-card {
  position: relative;
  min-height: 210px;
  padding: 24px;
  border-radius: 22px;
  background: var(--stripe-card);
  border: 1px solid rgba(10,37,64,0.08);
  box-shadow: var(--stripe-shadow);
  overflow: hidden;
  cursor: pointer;
  transform: translateZ(0);
  transition: transform 260ms cubic-bezier(.22,1,.36,1),
              box-shadow 260ms ease,
              border-color 260ms ease;
  animation: stripeCardUp 760ms cubic-bezier(.22,1,.36,1) both;
}
.stripe-card:hover {
  transform: translateY(-8px) scale(1.012);
  border-color: rgba(99,91,255,0.28);
  box-shadow: 0 38px 90px -40px rgba(10,37,64,0.62),
              0 20px 50px -35px rgba(99,91,255,0.58),
              0 1px 0 rgba(255,255,255,0.9) inset;
}
.stripe-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.66), transparent);
  transform: translateX(-120%);
  transition: transform 760ms cubic-bezier(.22,1,.36,1);
}
.stripe-card:hover::before {
  transform: translateX(120%);
}
.stripe-card.wide { grid-column: span 7; }
.stripe-card.medium { grid-column: span 5; }
.stripe-card.small { grid-column: span 4; }
.stripe-card.full { grid-column: span 12; }
.stripe-card.summary { grid-column: span 8; }
.stripe-card-title {
  position: relative;
  z-index: 1;
  color: var(--stripe-ink);
  font: 800 22px/1.12 Inter, var(--font-display);
  letter-spacing: -0.035em;
  margin-bottom: 10px;
}
.stripe-card-text {
  position: relative;
  z-index: 1;
  color: var(--stripe-slate);
  font-size: 15px;
  line-height: 1.58;
  max-width: 520px;
}
.stripe-stat-row {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-top: 24px;
}
.stripe-stat {
  padding-top: 14px;
  border-top: 1px solid var(--stripe-line);
}
.stripe-stat-value {
  color: var(--stripe-ink);
  font: 900 30px/1 Inter, var(--font-display);
  letter-spacing: -0.045em;
}
.stripe-stat-label {
  margin-top: 6px;
  color: var(--stripe-faint);
  font-size: 12px;
  font-weight: 700;
}
.stripe-code {
  margin-top: 22px;
  border-radius: 16px;
  background: #0a2540;
  color: #d6ecff;
  padding: 16px;
  font: 500 12px/1.7 var(--font-mono);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
}
.stripe-list {
  position: relative;
  z-index: 1;
  display: grid;
  gap: 10px;
  margin-top: 18px;
}
.stripe-list-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  padding: 12px 0;
  border-top: 1px solid var(--stripe-line);
  color: var(--stripe-slate);
  font-size: 14px;
}
.stripe-pill {
  display: inline-flex;
  align-items: center;
  min-height: 26px;
  padding: 0 10px;
  border-radius: 999px;
  background: rgba(99,91,255,0.10);
  color: var(--stripe-blue);
  font-size: 12px;
  font-weight: 800;
  white-space: nowrap;
}
.stripe-news {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 18px;
}
.stripe-news-item {
  border-radius: 22px;
  padding: 22px;
  background: #fff;
  border: 1px solid var(--stripe-line);
  box-shadow: 0 20px 50px -38px rgba(10,37,64,0.50);
  cursor: pointer;
  transition: transform 220ms cubic-bezier(.22,1,.36,1), box-shadow 220ms ease;
}
.stripe-news-item:hover {
  transform: translateY(-6px);
  box-shadow: 0 34px 70px -42px rgba(10,37,64,0.62);
}
.stripe-arrow::after {
  content: " ->";
  color: var(--stripe-blue);
  font-weight: 900;
}
.stripe-backbone {
  position: relative;
  margin-top: clamp(56px, 8vw, 96px);
  padding: clamp(36px, 6vw, 72px);
  border-radius: 28px;
  color: #fff;
  background:
    radial-gradient(circle at 88% 10%, rgba(0,212,255,0.46), transparent 30%),
    radial-gradient(circle at 8% 86%, rgba(255,92,154,0.38), transparent 30%),
    linear-gradient(135deg, #0a2540 0%, #1d1b84 58%, #635bff 100%);
  overflow: hidden;
  box-shadow: 0 42px 100px -54px rgba(10,37,64,0.88);
}
.stripe-backbone::before {
  content: "";
  position: absolute;
  inset: -24% -16% auto auto;
  width: 560px;
  height: 360px;
  background: linear-gradient(120deg, rgba(255,184,108,0.86), rgba(255,92,154,0.58), rgba(0,212,255,0.34));
  clip-path: polygon(18% 0, 100% 0, 82% 100%, 0 72%);
  filter: blur(1px) saturate(1.2);
  animation: stripeFloat 7s ease-in-out infinite;
}
.stripe-backbone > * {
  position: relative;
  z-index: 1;
}
.stripe-backbone-grid {
  display: grid;
  grid-template-columns: minmax(0, 0.9fr) minmax(360px, 1fr);
  gap: clamp(28px, 6vw, 78px);
  align-items: end;
}
.stripe-backbone h2 {
  margin: 8px 0 0;
  font: 900 clamp(34px, 5vw, 58px)/1.02 Inter, var(--font-display);
  letter-spacing: -0.055em;
}
.stripe-backbone p {
  color: rgba(255,255,255,0.72);
  font-size: 18px;
  line-height: 1.65;
}
.stripe-backbone-stats {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 24px;
}
.stripe-backbone-stat {
  padding-top: 18px;
  border-top: 1px solid rgba(255,255,255,0.22);
  cursor: pointer;
  transition: transform 160ms ease, opacity 160ms ease;
}
.stripe-backbone-stat:hover {
  transform: translateY(-1px);
}
.stripe-backbone-stat:focus-visible {
  outline: 2px solid rgba(255,255,255,0.48);
  outline-offset: 6px;
  border-radius: 16px;
}
.stripe-backbone-stat-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.stripe-backbone-value {
  font: 900 clamp(34px, 5vw, 56px)/1 Inter, var(--font-display);
  letter-spacing: -0.055em;
}
.stripe-backbone-label {
  margin-top: 8px;
  color: rgba(255,255,255,0.68);
  font-size: 14px;
  line-height: 1.45;
}
.stripe-backbone-arrow {
  width: 12px;
  height: 12px;
  flex: 0 0 auto;
  opacity: 0.72;
  transition: transform 160ms ease, opacity 160ms ease;
}
.stripe-backbone-stat:hover .stripe-backbone-arrow {
  transform: translateX(2px);
  opacity: 0.9;
}
.stripe-case-grid {
  display: grid;
  grid-template-columns: 1.05fr 0.95fr;
  gap: 18px;
}
.stripe-case-card {
  position: relative;
  min-height: 430px;
  border-radius: 28px;
  overflow: hidden;
  background: #fff;
  border: 1px solid var(--stripe-line);
  box-shadow: var(--stripe-shadow);
}
.stripe-case-art {
  position: relative;
  min-height: 250px;
  background:
    radial-gradient(circle at 30% 24%, rgba(255,255,255,0.96), transparent 12%),
    radial-gradient(circle at 76% 62%, rgba(0,212,255,0.50), transparent 18%),
    linear-gradient(135deg, rgba(99,91,255,0.96), rgba(255,92,154,0.76) 58%, rgba(255,184,108,0.92));
  clip-path: polygon(0 0, 100% 0, 100% 78%, 0 100%);
}
.stripe-case-art::before,
.stripe-case-art::after {
  content: "";
  position: absolute;
  width: 240px;
  height: 84px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.44);
  background: rgba(255,255,255,0.16);
  transform: rotate(-18deg);
}
.stripe-case-art::before {
  left: 44px;
  top: 54px;
}
.stripe-case-art::after {
  right: -44px;
  bottom: 42px;
  width: 310px;
}
.stripe-case-body {
  padding: 28px;
}
.stripe-case-meta {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
  margin-top: 22px;
}
.stripe-case-mini {
  padding-top: 14px;
  border-top: 1px solid var(--stripe-line);
}
.stripe-case-mini-link {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  cursor: pointer;
  transition: transform 160ms ease;
}
.stripe-case-mini-link:hover {
  transform: translateY(-1px);
}
.stripe-case-mini-link:focus-visible {
  outline: 2px solid rgba(10,37,64,0.18);
  outline-offset: 6px;
  border-radius: 12px;
}
.stripe-case-mini strong {
  display: block;
  color: var(--stripe-ink);
  font: 900 30px/1 Inter, var(--font-display);
  letter-spacing: -0.045em;
}
.stripe-case-mini span {
  display: block;
  margin-top: 6px;
  color: var(--stripe-faint);
  font-size: 12px;
  font-weight: 700;
}
.stripe-case-mini-arrow {
  width: 12px;
  height: 12px;
  flex: 0 0 auto;
  color: var(--stripe-faint);
  transition: transform 160ms ease, color 160ms ease;
}
.stripe-case-mini-link:hover .stripe-case-mini-arrow {
  transform: translateX(2px);
  color: var(--stripe-ink);
}
.stripe-side-stack {
  display: grid;
  gap: 18px;
}
.stripe-side-story {
  border-radius: 24px;
  background: #fff;
  border: 1px solid var(--stripe-line);
  padding: 24px;
  min-height: 206px;
  box-shadow: 0 20px 54px -42px rgba(10,37,64,0.48);
}
.stripe-dev {
  position: relative;
  display: grid;
  grid-template-columns: minmax(0, 0.84fr) minmax(360px, 1fr);
  gap: clamp(28px, 5vw, 76px);
  align-items: center;
  margin-top: clamp(58px, 9vw, 110px);
  padding: clamp(34px, 5vw, 64px);
  border-radius: 28px;
  background: #0a2540;
  color: #fff;
  overflow: hidden;
  box-shadow: 0 42px 100px -54px rgba(10,37,64,0.88);
}
.stripe-dev::before {
  content: "";
  position: absolute;
  inset: auto -18% -40% 35%;
  height: 420px;
  background: radial-gradient(circle, rgba(0,212,255,0.34), transparent 64%);
  pointer-events: none;
}
.stripe-dev > * {
  position: relative;
  z-index: 1;
}
.stripe-dev h2 {
  margin: 10px 0 0;
  font: 900 clamp(34px, 5vw, 58px)/1.02 Inter, var(--font-display);
  letter-spacing: -0.055em;
}
.stripe-dev p {
  color: rgba(255,255,255,0.72);
  font-size: 17px;
  line-height: 1.66;
}
.stripe-dev-code {
  border-radius: 22px;
  background: #06182c;
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 24px 70px -42px rgba(0,0,0,0.85);
  overflow: hidden;
}
.stripe-dev-code-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 16px;
  color: rgba(255,255,255,0.56);
  background: rgba(255,255,255,0.04);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  font-size: 12px;
  font-weight: 800;
}
.stripe-dev-code pre {
  margin: 0;
  padding: 22px;
  color: #d6ecff;
  font: 500 13px/1.8 var(--font-mono);
  white-space: pre-wrap;
}
@keyframes stripeRise {
  from { opacity: 0; transform: translateY(28px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes stripeFloatIn {
  from { opacity: 0; transform: translateY(34px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes stripeCardUp {
  from { opacity: 0; transform: translateY(26px) scale(0.985); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes stripeFloat {
  0%, 100% { transform: translate3d(0, 0, 0); }
  50% { transform: translate3d(0, -14px, 0); }
}
@keyframes stripeSpin {
  to { transform: rotate(360deg); }
}
@keyframes stripePulse {
  0%, 100% { opacity: 0.55; transform: scale(1); }
  50% { opacity: 0.9; transform: scale(1.08); }
}
@keyframes stripeMeter {
  from { width: 0; }
}

/* =============================================================
   Stripe-style infographic add-ons (sparklines, flow, donut, ticker)
   Uses the existing palette: blue / purple / cyan / mint / pink / orange.
   ============================================================= */

/* --- Animated sparkline trend cards --- */
.stripe-trends {
  margin-top: clamp(58px, 9vw, 110px);
}
.stripe-trends-grid {
  display: grid;
  gap: 20px;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  margin-top: 36px;
}
.stripe-trend-card {
  position: relative;
  padding: 26px 28px 22px;
  border-radius: 22px;
  background: #fff;
  border: 1px solid var(--stripe-line);
  box-shadow: var(--stripe-shadow);
  overflow: hidden;
  isolation: isolate;
}
.stripe-trend-card::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(110deg, transparent 30%, rgba(99,91,255,0.06) 50%, transparent 70%);
  transform: translateX(-100%);
  animation: stripeShimmer 6s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}
@keyframes stripeShimmer {
  0%, 18% { transform: translateX(-100%); }
  60%, 100% { transform: translateX(100%); }
}
.stripe-trend-card > * { position: relative; z-index: 1; }
.stripe-trend-label {
  font-size: 11px; font-weight: 800;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--stripe-faint);
}
.stripe-trend-value {
  font: 900 clamp(30px, 3.4vw, 42px)/1 Inter, var(--font-display);
  letter-spacing: -0.045em;
  color: var(--stripe-ink);
  margin-top: 12px;
}
.stripe-trend-delta {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 10px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px; font-weight: 800;
  background: rgba(0, 229, 168, 0.14);
  color: #008566;
}
.stripe-trend-delta.down {
  background: rgba(255, 92, 154, 0.14);
  color: #c8417a;
}
.stripe-spark {
  display: block;
  width: 100%;
  height: 86px;
  margin-top: 16px;
  overflow: visible;
}
.stripe-spark .spark-line {
  fill: none;
  stroke-width: 2.6;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 900;
  stroke-dashoffset: 900;
  animation: stripeDraw 1.9s cubic-bezier(.4,0,.2,1) forwards;
  filter: drop-shadow(0 6px 10px rgba(99,91,255,0.22));
}
.stripe-spark .spark-area {
  opacity: 0;
  animation: stripeFadeIn 1.4s ease 0.7s forwards;
}
.stripe-spark .spark-pin {
  opacity: 0;
  animation: stripeFadeIn 0.5s ease 1.7s forwards;
}
.stripe-spark .spark-pulse {
  transform-origin: center;
  transform-box: fill-box;
  animation: stripePulseRing 2.4s ease-in-out infinite;
}
@keyframes stripeDraw { to { stroke-dashoffset: 0; } }
@keyframes stripeFadeIn { to { opacity: 1; } }
@keyframes stripePulseRing {
  0%, 100% { transform: scale(1); opacity: 0.4; }
  50% { transform: scale(2.2); opacity: 0; }
}

/* --- Data-in-motion pipeline --- */
.stripe-flow {
  position: relative;
  margin-top: clamp(58px, 9vw, 110px);
  padding: clamp(34px, 5vw, 56px);
  border-radius: 28px;
  background:
    radial-gradient(circle at 8% 12%, rgba(0,212,255,0.16), transparent 38%),
    radial-gradient(circle at 92% 88%, rgba(255,92,154,0.16), transparent 38%),
    linear-gradient(140deg, #ffffff 0%, #f6f8ff 100%);
  border: 1px solid var(--stripe-line);
  box-shadow: var(--stripe-shadow);
  overflow: hidden;
}
.stripe-flow-stage {
  position: relative;
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 12px;
  margin-top: 40px;
  align-items: stretch;
}
.stripe-flow-svg {
  position: absolute;
  top: 50%;
  left: 4%;
  right: 4%;
  height: 4px;
  transform: translateY(-50%);
  z-index: 1;
  pointer-events: none;
  overflow: visible;
}
.stripe-flow-svg .flow-line {
  fill: none;
  stroke-width: 2.4;
  stroke-dasharray: 8 8;
  stroke-linecap: round;
  animation: stripeFlowMove 1.1s linear infinite;
}
@keyframes stripeFlowMove { to { stroke-dashoffset: -32; } }
.stripe-flow-node {
  position: relative;
  z-index: 2;
  padding: 18px 16px 18px;
  border-radius: 18px;
  background: #fff;
  border: 1px solid var(--stripe-line);
  box-shadow: 0 14px 30px -22px rgba(10,37,64,0.4);
  text-align: center;
  cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}
.stripe-flow-node:hover {
  transform: translateY(-4px);
  box-shadow: 0 22px 44px -22px rgba(10,37,64,0.45);
}
.stripe-flow-node .icon {
  width: 40px; height: 40px;
  margin: 0 auto 12px;
  border-radius: 12px;
  display: grid; place-items: center;
  color: #fff;
  font-weight: 900; font-size: 18px;
  box-shadow: 0 10px 24px -12px rgba(99,91,255,0.6);
}
.stripe-flow-node .label {
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--stripe-faint); font-weight: 800;
}
.stripe-flow-node .value {
  display: block;
  font: 900 24px/1 Inter, var(--font-display);
  letter-spacing: -0.04em;
  color: var(--stripe-ink);
  margin-top: 8px;
}
.stripe-flow-node .sub {
  display: block;
  font-size: 11px;
  color: var(--stripe-faint);
  margin-top: 4px;
}

/* --- Composition donut + animated bars --- */
.stripe-compose {
  margin-top: clamp(58px, 9vw, 110px);
  display: grid;
  grid-template-columns: 320px minmax(0, 1fr);
  gap: clamp(28px, 5vw, 60px);
  align-items: center;
  padding: clamp(34px, 5vw, 56px);
  border-radius: 28px;
  background: #fff;
  border: 1px solid var(--stripe-line);
  box-shadow: var(--stripe-shadow);
}
.stripe-compose-head {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 0.9fr);
  gap: 24px;
  align-items: end;
  margin-bottom: 12px;
}
.stripe-compose-head h2 {
  margin: 8px 0 0;
  font: 900 clamp(30px, 4vw, 46px)/1.04 Inter, var(--font-display);
  letter-spacing: -0.05em;
  color: var(--stripe-ink);
}
.stripe-compose-head p {
  color: var(--stripe-slate);
  font-size: 17px;
  line-height: 1.6;
}
.stripe-ring {
  width: 280px; height: 280px;
  margin: 0 auto;
  position: relative;
}
.stripe-ring svg {
  width: 100%; height: 100%;
  transform: rotate(-90deg);
}
.stripe-ring circle {
  fill: none;
  stroke-width: 18;
  stroke-linecap: round;
}
.stripe-ring .ring-bg { stroke: rgba(10, 37, 64, 0.08); }
.stripe-ring .ring-fill {
  stroke-dasharray: var(--circ, 690);
  stroke-dashoffset: var(--circ, 690);
  animation: stripeRingFill 1.7s cubic-bezier(.4,0,.2,1) forwards;
  filter: drop-shadow(0 8px 22px rgba(99,91,255,0.35));
}
@keyframes stripeRingFill { to { stroke-dashoffset: var(--final, 200); } }
.stripe-ring-center {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  text-align: center;
}
.stripe-ring-center .num {
  font: 900 clamp(38px, 5vw, 58px)/1 Inter, var(--font-display);
  letter-spacing: -0.055em;
  color: var(--stripe-ink);
}
.stripe-ring-center .lab {
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--stripe-faint);
  font-weight: 800;
  margin-top: 6px;
}

.stripe-bars { display: grid; gap: 18px; }
.stripe-bars-row {
  display: grid;
  grid-template-columns: 140px minmax(0, 1fr) 56px;
  align-items: center;
  gap: 18px;
}
.stripe-bars-row .name {
  font-size: 14px; font-weight: 800; color: var(--stripe-ink);
}
.stripe-bars-row .num {
  font: 900 16px/1 Inter, var(--font-display);
  color: var(--stripe-ink);
  text-align: right;
}
.stripe-bars-track {
  position: relative;
  height: 12px;
  border-radius: 999px;
  background: rgba(10, 37, 64, 0.06);
  overflow: hidden;

  <script>
  (function() {

    // Global error handler — log to console, don't crash silently
    window.onerror = function(msg, src, line, col, err) {
      console.error("[BJJ Dashboard Error]", msg, "at", src + ":" + line + ":" + col, err);
    };
    window.onunhandledrejection = function(e) {
      console.error("[BJJ Dashboard Unhandled Promise]", e.reason);
    };

    // Scroll reveal — auto-tag direct children of common page wrappers and
    // observe them with IntersectionObserver.
    const reveal = (root) => {
      if (!('IntersectionObserver' in window)) return;
      const candidates = root.querySelectorAll(
        '.dash-page > div > div, .hy-page > div > div, [data-screen-label] > div > div'
      );
      candidates.forEach((el) => {
        if (!el.classList.contains('reveal')) el.classList.add('reveal');
      });
      const io = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('in');
            io.unobserve(entry.target);
          }
        });
      }, { rootMargin: '-40px 0px', threshold: 0.05 });
      candidates.forEach((el) => io.observe(el));
    };
    // Initial sweep after React mounts
    const tryReveal = () => {
      if (document.querySelector('[data-screen-label]') || document.querySelector('.dash-page, .hy-page')) {
        reveal(document.body);
      } else {
        setTimeout(tryReveal, 200);
      }
    };
    setTimeout(tryReveal, 400);
    // Re-sweep on screen change (NavPill click)
    new MutationObserver(() => {
      const newOnes = document.querySelectorAll(
        '.dash-page > div > div:not(.reveal), .hy-page > div > div:not(.reveal), [data-screen-label] > div > div:not(.reveal)'
      );
      if (newOnes.length) reveal(document.body);
    }).observe(document.body, { childList: true, subtree: true });
  })();

// =====================================================
// useModalTrap — focus-trap + Escape key for modals
// =====================================================
function useModalTrap(active, onClose) {
  const ref = useRef(null);
  useEffect(() => {
    if (!active) return;
    const el = ref.current;
    if (!el) return;
    const focusable = () => el.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
    const first = () => { const f = focusable(); return f.length ? f[0] : el; };
    const last = () => { const f = focusable(); return f.length ? f[f.length - 1] : el; };
    const prevOverflow = document.body.style.overflow;
    document.body.style.overflow = "hidden";
    const prev = document.activeElement;
    first().focus();
    const onKey = (e) => {
      if (e.key === "Escape") { e.preventDefault(); onClose(); return; }
      if (e.key !== "Tab") return;
      const f = focusable();
      if (!f.length) { e.preventDefault(); return; }
      if (e.shiftKey) {
        if (document.activeElement === f[0]) { e.preventDefault(); f[f.length - 1].focus(); }
      } else {
        if (document.activeElement === f[f.length - 1]) { e.preventDefault(); f[0].focus(); }
      }
    };
    document.addEventListener("keydown", onKey);
    return () => { document.body.style.overflow = prevOverflow; document.removeEventListener("keydown", onKey); if (prev && prev.focus) prev.focus(); };
  }, [active, onClose]);
  return ref;
}

// =====================================================
// GlassCard — 3-tier card system
//   tier="hero"    — solid paper bg, pop shadow, 28px radius, rainbow border, hover lift
//   tier="primary" — slightly opaque glass, 20px radius, 24px pad, no hover lift
//   tier="inline"  — no shadow, no blur, hairline bottom border only
// Legacy props (hero, rainbow) still supported for backward compat.
// =====================================================
function GlassCard({ children, padding, radius, style = {}, hero = false, rainbow = false, tier: tierProp, className, ...rest }) {
  const [hover, setHover] = useState(false);
  // Resolve tier: explicit prop wins, then legacy hero flag, then default "primary"
  const tier = tierProp || (hero ? "hero" : "primary");
  const isHero = tier === "hero";
  const isInline = tier === "inline";

  // Tier-specific defaults
  const resolvedRadius = radius != null ? radius : (isHero ? 28 : isInline ? 0 : 20);
  const resolvedPadding = padding != null ? padding : (isHero ? 28 : isInline ? 0 : 24);

  // Shadows per tier
  const tierShadows = {
    hero: {
      base: "0 1px 0 rgba(255,252,245,0.95) inset, 0 0 0 0.5px rgba(26,22,19,0.04) inset, 0 24px 60px -16px rgba(60,60,90,0.22), 0 2px 6px rgba(0,0,0,0.05)",
      hover: "0 1px 0 rgba(255,252,245,0.95) inset, 0 0 0 0.5px rgba(199,154,58,0.18) inset, 0 36px 84px -16px rgba(26,22,19,0.28), 0 10px 30px -8px rgba(199,154,58,0.22)",
    },
    primary: {
      base: "0 1px 0 rgba(255,252,245,0.9) inset, 0 8px 24px -8px rgba(60,60,90,0.16), 0 1px 2px rgba(0,0,0,0.04)",
      hover: "0 1px 0 rgba(255,252,245,0.9) inset, 0 8px 24px -8px rgba(60,60,90,0.16), 0 1px 2px rgba(0,0,0,0.04)",
    },
    inline: { base: "none", hover: "none" },
  };
  const shadows = tierShadows[tier] || tierShadows.primary;

  const cardStyle = {
    position: "relative",
    background: isHero
      ? "var(--bg-paper)"
      : isInline
        ? "transparent"
        : "rgba(255,252,245,0.78)",
    border: isInline
      ? "none"
      : rainbow ? "1px solid transparent" : "1px solid rgba(26,22,19,0.07)",
    borderBottom: isInline ? "1px solid var(--bg-hairline)" : undefined,
    backdropFilter: isInline ? "none" : "blur(16px) saturate(140%)",
    WebkitBackdropFilter: isInline ? "none" : "blur(16px) saturate(140%)",
    borderRadius: resolvedRadius,
    padding: resolvedPadding,
    boxShadow: hover ? shadows.hover : shadows.base,
    // Only hero cards lift on hover
    transform: (isHero && hover) ? "translateY(-2px)" : "translateY(0)",
    transition: "transform 380ms cubic-bezier(0.22,1,0.36,1), box-shadow 380ms cubic-bezier(0.22,1,0.36,1)",
    overflow: isInline ? "visible" : "hidden",
    ...style,
  };
  // Corner accent for hero cards — soft gold bloom in the top-right
  const corner = hero ? (
    <div aria-hidden="true" style={{
      position: "absolute", top: -60, right: -60, width: 220, height: 220,
      borderRadius: "50%",
      background: "radial-gradient(closest-side, rgba(199,154,58,0.30), rgba(199,154,58,0))",
      filter: "blur(8px)",
      pointerEvents: "none",
      zIndex: 0,
    }}/>
  ) : null;
  // Slow gradient sweep along the top edge for hero — like a scan line at rest
  const topSheen = hero ? (
    <div aria-hidden="true" style={{
      position: "absolute", top: 0, left: 12, right: 12, height: 1,
      background: "linear-gradient(90deg, transparent 0%, rgba(199,154,58,0.55) 20%, rgba(28,44,90,0.55) 50%, rgba(110,19,32,0.55) 80%, transparent 100%)",
      opacity: 0.85,
      pointerEvents: "none",
      zIndex: 2,
    }}/>
  ) : null;
  const inner = (
    <>
      {corner}
      {topSheen}
      <div style={{ position: "relative", zIndex: 1 }}>{children}</div>
    </>
  );
  if (rainbow) {
    return (
      <div
        className={className}
        style={{ position: "relative", borderRadius: radius, height: "100%" }}
        onMouseEnter={() => setHover(true)}
        onMouseLeave={() => setHover(false)}
      >
        {/* jewel-tone border ring (masked) — animated gradient angle */}
        <div className="gc-border-anim" style={{
          position: "absolute", inset: 0, borderRadius: radius,
          padding: 1.5,
          background: "linear-gradient(var(--gc-angle, 120deg), #6e1320 0%, #1c2c5a 50%, #c79a3a 100%)",
          WebkitMask: "linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0)",
          mask: "linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0)",
          WebkitMaskComposite: "xor", maskComposite: "exclude",
          pointerEvents: "none",
          zIndex: 3,
        }}></div>
        <div className={className + "-inner"} style={{ ...cardStyle, height: "100%", boxSizing: "border-box" }} {...rest}>{inner}</div>
      </div>
    );
  }
  return (
    <div
      className={className}
      style={cardStyle}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      {...rest}
    >{inner}</div>
  );
}

// =====================================================
// NavPill — top-centre floating nav
// =====================================================
function NavPill({ active, onChange }) {
  const [openMenu, setOpenMenu] = useState(null);
  const [menuPos, setMenuPos] = useState(null);
  const navRef = useRef(null);
  const menuRef = useRef(null);

  // Map child screens to parent group
  const childToParent = {
    bruno: "training", schedule: "training",
    "micro-injuries": "health", allergies: "health", hydration: "health",
  };
  const activeParent = childToParent[active] || active;

  const tabs = [
    { id: "dashboard", label: "Today" },
    { id: "training", label: "Next up", children: [
      { id: "bruno", label: "Lessons" },
      { id: "schedule", label: "Schedule" },
      { id: "meals", label: "Meals" },
    ]},
    { id: "health", label: "Allergies", children: [
      { id: "micro-injuries", label: "Injuries" },
      { id: "allergies", label: "Allergies" },
      { id: "hydration", label: "Hydration" },
    ]},
    { id: "editor", label: "Messages" },
    { id: "techniquelibrary", label: "Library" },
    { id: "problems", label: "Issues" },
  ];

  // Close dropdown on outside click
  useEffect(() => {
    if (!openMenu) return;
    const close = (e) => {
      const clickedNav = navRef.current && navRef.current.contains(e.target);
      const clickedMenu = menuRef.current && menuRef.current.contains(e.target);
      if (!clickedNav && !clickedMenu) {
        setOpenMenu(null);
        setMenuPos(null);
      }
    };
    document.addEventListener("mousedown", close);
    return () => document.removeEventListener("mousedown", close);
  }, [openMenu]);

  // Arrow-key navigation within tablist
  const handleTabKeyDown = (e, idx) => {
    const flatTabs = tabs;
    let next = idx;

            return (

                key={o.id}
                onClick={() => { onChange(o.id); setOpen(false); }}
                style={{

      `}</style>

// Shared store for the upcoming-problems list.
// Both the Dashboard tile and the full Problems page read/write this.

const PROBLEMS_DEFAULT = [
  {
    id: "spider-lasso",
    name: "Spider / lasso guard",
    tier: "urgent",
    description: "Keep getting stuck flat on my back when they double-sleeve. Can't break grips before they swing the lasso in, and once it's set my hip movement dies. Need a clean grip-fight sequence and a way to stand up safely without getting elevated.",
  },
  {
    id: "dlr-entries",
    name: "De la Riva entries",
    tier: "high",
    description: "When standing in their guard, I keep stepping into the DLR hook on autopilot. Need to learn to recognize the hand-fight cue earlier and either kill the hook or change levels first.",
  },
  {
    id: "passing-closed",
    name: "Passing closed guard",
    tier: "med",
    description: "Posture breaks down within 20 seconds. I bring my elbows in too early and they trap them. Want to drill a slower, posture-first opening — knee in, hand on belt, no rush.",
  },
  {
    id: "double-leg",
    name: "Double-leg finishes",
    tier: "low",
    description: "Penetration step is fine but my finish is sloppy — I drop my head and they sprawl on me. Need to commit to corner / drive the far hip.",
  },
];

const PROBLEMS_TIERS = [
  { id: "low",    label: "Low"    },
  { id: "med",    label: "Med"    },
  { id: "high",   label: "High"   },
  { id: "urgent", label: "Urgent" },
];

const problemsTierColor = (tier) => ({
  urgent: "var(--accent-critical)",
  high:   "#8b1f37",
  med:    "#1c2c5a",
  low:    "var(--ink-faint)",
}[tier]);

const problemsTierRank = (tier) => ({ urgent: 0, high: 1, med: 2, low: 3 }[tier]);

// In-memory cache + cross-component subscribers
let _problemsCache = null;
let _pinnedCache = null;
const _problemsListeners = new Set();

function _readLS(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (raw) return JSON.parse(raw);
  } catch {}
  return fallback;
}
function _writeLS(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

function getProblems() {
  if (_problemsCache === null) _problemsCache = _readLS("problems_list_v2", []);
  return _problemsCache;
}
function getPinned() {
  if (_pinnedCache === null) _pinnedCache = _readLS("problems_pinned_v2", []);
  return _pinnedCache;
}
function setProblems(next) {
  _problemsCache = typeof next === "function" ? next(getProblems()) : next;
  _writeLS("problems_list_v2", _problemsCache);
  _problemsListeners.forEach((fn) => fn());
}
function setPinned(next) {
  _pinnedCache = typeof next === "function" ? next(getPinned()) : next;
  _writeLS("problems_pinned_v2", _pinnedCache);
  _problemsListeners.forEach((fn) => fn());
}
function subscribeProblems(fn) {
  _problemsListeners.add(fn);
  return () => _problemsListeners.delete(fn);
}

// React hook — re-renders any consumer when the store changes
function useProblemsStore() {
  const [, force] = React.useState(0);
  React.useEffect(() => subscribeProblems(() => force((n) => n + 1)), []);
  return {
    problems: getProblems(),
    pinned: getPinned(),
    setProblems,
    setPinned,
  };
}

// Sort helper used by both views: pinned first, then by chosen mode.
// mode: "priority" (urgent → low), "newest", "oldest", "az", "za"
function sortProblems(problems, pinned, mode = "priority") {
  const cmp = (a, b) => {
    if (mode === "priority") return problemsTierRank(a.tier) - problemsTierRank(b.tier);
    if (mode === "az")       return a.name.localeCompare(b.name);
    if (mode === "za")       return b.name.localeCompare(a.name);
    if (mode === "newest") {
      // higher index = added later (push appends)
      return problems.indexOf(b) - problems.indexOf(a);
    }
    if (mode === "oldest") {
      return problems.indexOf(a) - problems.indexOf(b);
    }
    return 0;
  };
  return [
    ...pinned.map((id) => problems.find((p) => p.id === id)).filter(Boolean),
    ...problems.filter((p) => !pinned.includes(p.id)).slice().sort(cmp),
  ];
}

const PROBLEMS_SORT_OPTIONS = [
  { id: "priority", label: "Priority" },
  { id: "newest",   label: "Newest first" },
  { id: "oldest",   label: "Oldest first" },
  { id: "az",       label: "A–Z" },
  { id: "za",       label: "Z–A" },
];

window.PROBLEMS_DEFAULT = PROBLEMS_DEFAULT;
window.PROBLEMS_TIERS = PROBLEMS_TIERS;
window.problemsTierColor = problemsTierColor;
window.problemsTierRank = problemsTierRank;
window.useProblemsStore = useProblemsStore;
window.sortProblems = sortProblems;
window.PROBLEMS_SORT_OPTIONS = PROBLEMS_SORT_OPTIONS;

    const id = "log-" + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);

    <div className="hy-page" style={{ minHeight: "100vh", paddingTop: 96, paddingBottom: 120, paddingLeft: "clamp(16px, 4vw, 24px)", paddingRight: "clamp(16px, 4vw, 24px)" }}>
      <div style={{ maxWidth: 1140, margin: "0 auto" }}>
        <button onClick={onBack} className="hy-back-btn" style={{

          fontSize: 13, color: "var(--stripe-faint)", marginBottom: 20,

        <div className="hy-hero-card stripe-card" style={{
          position: "relative", overflow: "hidden",
          padding: 36, borderRadius: 28,
          marginBottom: 24,
          minHeight: 0,
          cursor: "default",
          animation: "none",
        }}>

          <div className="hy-hero-grid" style={{ position: "relative", display: "grid", gridTemplateColumns: "minmax(0,1fr) 260px", gap: 28, alignItems: "stretch", zIndex: 1 }}>
            <div style={{ minWidth: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>
                <span className="stripe-pill">Hydration · today</span>
                {streak > 0 && (
                  <div style={{
                    display: "inline-flex", alignItems: "center", gap: 6,
                    padding: "4px 11px 4px 9px", borderRadius: 999,
                    background: "rgba(99,91,255,0.10)",
                    border: "1px solid rgba(99,91,255,0.22)",
                    fontSize: 11, fontWeight: 800, letterSpacing: "0",

                    <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c1 4-3 6-3 10a3 3 0 0 0 6 0c0-2-1-3-2-4 0 1.5-1 2-2 2.5C12 8 14 6 12 2z"/></svg>
                    {streak}-day streak
                  </div>
                )}
              </div>

              <div style={{ display: "flex", alignItems: "baseline", flexWrap: "wrap", columnGap: 14, rowGap: 4, marginBottom: 8 }}>
                <span style={{
                  position: "relative",
                  fontFamily: "Inter, var(--font-display)", fontSize: "clamp(54px, 9vw, 92px)", fontWeight: 900,
                  letterSpacing: "-0.05em", lineHeight: 1, color: "var(--stripe-ink)",
                  whiteSpace: "nowrap",
                }}>{formatHydrationAmount(total)}</span>
                <button onClick={() => { setGoalDraft(goal); setGoalEditing(true); }} style={{
                  background: "transparent", border: "none", padding: 0, cursor: "pointer",
                  fontFamily: "Inter, var(--font-text)", fontSize: 18, fontWeight: 700,
                  color: "var(--stripe-faint)", letterSpacing: "-0.01em", whiteSpace: "nowrap",
                }}>of {formatHydrationAmount(goal)} goal</button>
              </div>
              <div style={{ fontSize: 13, color: "var(--stripe-faint)", marginBottom: 20, fontWeight: 700 }}>
                {remaining > 0
                  ? `${formatHydrationAmount(remaining)} to go · ${pct}% of goal`
                  : `Goal hit — +${formatHydrationAmount(total - goal)} over`}
              </div>

              {/* Stripe meter — cyan→mint gradient on dark track (matches Dashboard) */}
              <div className="stripe-meter" style={{
                height: 10, marginBottom: 22,
                background: "rgba(10,37,64,0.10)",
              }}>
                <span style={{
                  width: `${pct}%`,
                  background: pct >= 100
                    ? "linear-gradient(90deg, var(--stripe-mint), #19a07a)"
                    : "linear-gradient(90deg, var(--stripe-cyan), var(--stripe-mint))",
                }} />

                  </button>

                      <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Custom
                  </span>

                  onClick={() => {
                    const last = displayLog.find(e => !isBotEntry(e.id));
                    if (last) removeEntry(last.id);
                  }}
                  style={{
                    display: "inline-flex", alignItems: "center", gap: 6,
                    minHeight: 44, padding: "0 16px", borderRadius: 999,
                    fontFamily: "Inter, var(--font-text)", fontSize: 13, fontWeight: 700,

                    background: "transparent",
                    border: "1px solid var(--stripe-line)",
                    cursor: "pointer",
                    transition: "all 160ms cubic-bezier(0.32,0.72,0,1)",

                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M3 7v6h6"/>
                    <path d="M3 13a9 9 0 1 0 3-7.7L3 8"/>
                  </svg>
                  Undo last
                </button>}
                <button
                  onClick={() => { if (log.length === 0) return; clearArmed ? doClear() : armClear(); }}
                  disabled={log.length === 0}
                  style={{
                    display: "inline-flex", alignItems: "center", gap: 6,
                    minHeight: 44, padding: "0 16px", borderRadius: 999,
                    fontFamily: "Inter, var(--font-text)", fontSize: 13, fontWeight: 700,
                    color: log.length === 0
                      ? "rgba(255,92,154,0.45)"

                    background: clearArmed && log.length > 0 ? "var(--stripe-pink)" : "transparent",
                    border: clearArmed && log.length > 0
                      ? "1px solid var(--stripe-pink)"
                      : "1px solid rgba(255,92,154,0.32)",
                    cursor: log.length === 0 ? "not-allowed" : "pointer",
                    opacity: log.length === 0 ? 0.55 : 1,
                    transition: "all 180ms cubic-bezier(0.32,0.72,0,1)",
                  }}
                  title="Remove every entry today">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
                    <path d="M10 11v6M14 11v6"/>
                  </svg>
                  {clearArmed && log.length > 0 ? "Tap again to confirm" : "Clear all"}

              </div>
            </div>

            {/* Bottle visual on the right — keep the big 280x330 BottleVisual */}
            <div style={{ justifySelf: "center", display: "flex", alignItems: "center" }}>
