<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f7fa">
    <title>{% block title %}BJJ Bot{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    {% if session.logged_in and not hide_nav %}
    <nav class="nav-pill" aria-label="primary">
        <span class="nav-logo" aria-hidden="true">✦</span>
        <div class="nav-tabs">
            <a href="{{ url_for('home') }}"
               class="nav-tab {% if request.endpoint == 'home' %}active{% endif %}">Dashboard</a>
            <a href="{{ url_for('editor') }}"
               class="nav-tab {% if request.endpoint == 'editor' %}active{% endif %}">Editor</a>
        </div>
        <a href="{{ url_for('logout') }}" class="nav-logout">Logout</a>
    </nav>
    {% endif %}
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
