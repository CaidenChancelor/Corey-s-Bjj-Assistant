{% extends "base.html" %}
{% block title %}Live data access — BJJ Bot{% endblock %}
{% block body_class %}auth-bg{% endblock %}
{% block content %}
<div class="login-shell">
    <div class="login-card">
        <div class="login-logo" aria-hidden="true">✦</div>
        <h1 class="login-title">Live data access</h1>
        <p class="login-sub">Open the BJJ Bot dashboard</p>
        <form method="POST" action="{{ url_for('login') }}" class="login-form">
            <input type="password" name="password" placeholder="Password"
                   autofocus required autocomplete="current-password"
                   style="font-size: 16px;">
            <button type="submit" class="btn btn-primary">Continue</button>
            {% if error %}
            <p class="login-error">{{ error }}</p>
            {% endif %}
        </form>
    </div>
</div>
{% endblock %}
